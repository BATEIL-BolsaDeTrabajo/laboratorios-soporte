<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesion | BATEIL</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/bateil-theme.css?v=4">
  <style>
    body.login-page {
      display: grid;
      place-items: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    body.login-page::after {
      display: none;
    }

    .login-shell {
      width: min(1050px, 100%);
      min-height: 560px;
      display: grid;
      grid-template-columns: 0.92fr 1.08fr;
      overflow: hidden;
      background: var(--bateil-white);
      border: 1px solid var(--bateil-border);
      border-radius: 28px;
      box-shadow: var(--bateil-shadow);
    }

    .login-brand {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 560px;
      padding: clamp(2rem, 5vw, 3.7rem);
      color: var(--bateil-white);
      background:
        linear-gradient(180deg, rgba(248, 196, 0, 0.12), transparent 18rem),
        var(--bateil-black);
    }

    .login-brand::before {
      content: "";
      width: 74%;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--bateil-yellow), rgba(248, 196, 0, 0.14));
    }

    .login-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      margin-top: 2.5rem;
      color: var(--bateil-white);
      font-weight: 900;
      letter-spacing: 0;
    }

    .login-badge span:first-child {
      display: inline-grid;
      place-items: center;
      min-width: 86px;
      height: 38px;
      color: var(--bateil-black);
      background: var(--bateil-yellow);
      border-radius: 999px;
      font-size: 0.92rem;
    }

    .login-brand h1 {
      margin: 2rem 0 0.75rem;
      font-size: clamp(2.1rem, 4vw, 3.25rem);
      font-weight: 900;
    }

    .login-brand p {
      max-width: 28rem;
      margin: 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 1.15rem;
      line-height: 1.5;
    }

    .login-mascot {
      align-self: center;
      width: min(260px, 62%);
      margin-top: 1.5rem;
      filter: drop-shadow(0 26px 34px rgba(0, 0, 0, 0.34));
    }

    .login-panel {
      display: flex;
      align-items: center;
      padding: clamp(2rem, 6vw, 4.2rem);
    }

    .login-form-wrap {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }

    .login-form-wrap h2 {
      margin-bottom: 0.35rem;
      font-size: clamp(2rem, 4vw, 2.65rem);
      font-weight: 900;
    }

    .login-form-wrap .lead {
      color: var(--bateil-muted);
      font-size: 1.12rem;
    }

    .login-panel .form-label {
      color: var(--bateil-ink);
      font-weight: 700;
    }

    .login-panel .form-control {
      min-height: 48px;
      background: #eef3fb;
      border-color: #dce3ee;
    }

    .login-submit {
      min-height: 50px;
      margin-top: 0.35rem;
      color: var(--bateil-white) !important;
      background: var(--bateil-black) !important;
      border-color: var(--bateil-black) !important;
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.2);
    }

    .login-submit:hover {
      color: var(--bateil-black) !important;
      background: var(--bateil-yellow) !important;
      border-color: var(--bateil-yellow) !important;
    }

    .login-tip {
      margin-top: 1.35rem;
      color: var(--bateil-muted);
    }

    @media (max-width: 860px) {
      body.login-page {
        display: block;
        padding: 1rem;
      }

      .login-shell {
        grid-template-columns: 1fr;
        min-height: auto;
        border-radius: 20px;
      }

      .login-brand {
        min-height: auto;
        padding: 2rem;
      }

      .login-mascot {
        width: 150px;
        align-self: flex-start;
      }
    }
  </style>
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-brand" aria-label="Bienvenida BATEIL">
      <div>
        <div class="login-badge">
          <span>BATEIL</span>
          <span>Soporte</span>
        </div>
        <h1>Bienvenido</h1>
        <p>Inicia sesion para gestionar tickets, reservas, usuarios y procesos internos.</p>
      </div>
      <img class="login-mascot" src="/assets/benito-bateil.png" alt="Benito, mascota BATEIL">
    </section>

    <section class="login-panel">
      <div class="login-form-wrap">
        <h2>Iniciar sesion</h2>
        <p class="lead mb-4">Usa tu correo institucional.</p>

        <form id="loginForm">
          <div class="mb-3">
            <label for="correo" class="form-label">Correo institucional</label>
            <input type="email" id="correo" class="form-control" autocomplete="email" required>
          </div>
          <div class="mb-4">
            <label for="contrasena" class="form-label">Contrasena</label>
            <input type="password" id="contrasena" class="form-control" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn login-submit w-100">Entrar</button>
        </form>

        <div id="mensaje" class="mt-3 text-danger text-center fw-semibold"></div>
        <p class="login-tip">Tip: si tu usuario aun no esta activo, solicitalo al administrador.</p>
      </div>
    </section>
  </main>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const correo = document.getElementById("correo").value;
      const contrasena = document.getElementById("contrasena").value;
      const mensaje = document.getElementById("mensaje");

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ correo, "contrase\u00f1a": contrasena })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem("token", data.token);

          const payload = JSON.parse(atob(data.token.split(".")[1]));
          const roles = payload.roles;

          localStorage.setItem("usuario", JSON.stringify({
            roles,
            menuPermissions: payload.menuPermissions,
            nombre: payload.nombre,
            email: payload.email,
            _id: payload.id
          }));

          if (roles.includes("admin")) {
            window.location.href = "dashboard.html";
          } else if (roles.includes("soporte") || roles.includes("mantenimiento")) {
            window.location.href = "panel-soporte.html";
          } else {
            window.location.href = "crear-ticket.html";
          }
        } else {
          mensaje.textContent = data.mensaje || "Credenciales incorrectas";
        }
      } catch (error) {
        mensaje.textContent = "Error de conexion con el servidor.";
      }
    });
  </script>
</body>
</html>
