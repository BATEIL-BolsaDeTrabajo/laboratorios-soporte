<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seguimiento Academico</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/toasts.css">
  <link rel="stylesheet" href="/css/bateil-theme.css?v=6">
  <style>
    body { background: #f4f6f8; }
    .tracking-shell { max-width: 100%; padding: 0 18px 28px; }
    .tracking-toolbar, .summary-item, .sheet-frame {
      background: #fff;
      border: 1px solid #dde3ea;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(18, 38, 63, .05);
    }
    .tracking-toolbar { padding: 14px; }
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 10px;
      margin: 14px 0;
    }
    .summary-item { padding: 10px 12px; }
    .summary-label { color: #667085; font-size: .78rem; line-height: 1.1; }
    .summary-value { color: #152238; font-size: 1.2rem; font-weight: 700; }
    .sheet-frame { overflow: hidden; }
    .sheet-scroll {
      max-height: calc(100vh - 310px);
      min-height: 360px;
      overflow-x: auto;
      overflow-y: auto;
      scrollbar-gutter: stable;
    }
    .tracking-table {
      border-collapse: separate;
      border-spacing: 0;
      font-size: .82rem;
      min-width: 1240px;
      width: max-content;
    }
    .tracking-table th, .tracking-table td {
      border-right: 1px solid #d9dee7;
      border-bottom: 1px solid #d9dee7;
      padding: 4px 7px;
      height: 30px;
      white-space: nowrap;
      vertical-align: middle;
    }
    .tracking-table thead th {
      position: sticky;
      top: 0;
      z-index: 6;
      background: #f8fafc;
      color: #172033;
      font-weight: 700;
      text-align: center;
      overflow: visible;
    }
    .subject-header {
      height: 52px;
      min-width: 104px;
      max-width: 118px;
      padding: 6px 6px !important;
      writing-mode: horizontal-tb;
      transform: none;
      text-align: center !important;
      line-height: 1.1;
      white-space: normal !important;
      overflow-wrap: anywhere;
      word-break: normal;
    }
    .col-no { min-width: 46px; text-align: center; }
    .col-matricula { min-width: 104px; }
    .col-nombre { min-width: 292px; max-width: 292px; overflow: hidden; text-overflow: ellipsis; }
    .sticky-no, .sticky-matricula, .sticky-nombre { position: sticky; background: #fff; z-index: 4; }
    thead .sticky-no, thead .sticky-matricula, thead .sticky-nombre { z-index: 8; background: #f8fafc; }
    .sticky-no { left: 0; }
    .sticky-matricula { left: 46px; }
    .sticky-nombre { left: 150px; box-shadow: 3px 0 0 rgba(15, 23, 42, .08); }
    .grade-cell { min-width: 104px; text-align: center; font-variant-numeric: tabular-nums; }
    .grade-fail { background: #ef6b6b; color: #111827; }
    .grade-risk { background: #f2df74; color: #111827; }
    .grade-good { background: #87c77a; color: #0f172a; }
    .summary-cell { min-width: 78px; text-align: center; font-variant-numeric: tabular-nums; }
    .action-cell { min-width: 120px; }
    .projection-cell { min-width: 128px; text-align: center; }
    .print-cell { min-width: 110px; text-align: center; }
    .comments-cell, .agreements-cell {
      min-width: 270px;
      max-width: 360px;
      color: #334155;
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .comment-history, .agreement-history { max-height: 230px; overflow: auto; }
    .projection-table th, .projection-table td { vertical-align: middle; }
    .projection-table td { font-variant-numeric: tabular-nums; }
    .projection-status { min-width: 112px; }
    @media (max-width: 900px) {
      .summary-strip { grid-template-columns: repeat(2, minmax(130px, 1fr)); }
      .tracking-shell { padding-left: 10px; padding-right: 10px; }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="tracking-shell">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <div>
        <h3 class="mb-0 fw-bold">Seguimiento Academico</h3>
        <div class="text-muted small">Concentrado de calificaciones por ciclo y grupo</div>
      </div>
      <form id="form-importar" class="d-flex flex-wrap align-items-end gap-2" enctype="multipart/form-data">
        <input type="hidden" id="ciclo-importar" name="ciclo">
        <datalist id="ciclos-sugeridos"></datalist>
        <div>
          <label class="form-label small mb-1" for="archivo">Concentrado</label>
          <input class="form-control form-control-sm" id="archivo" name="archivo" type="file" accept=".xlsx,.xls" required>
        </div>
        <button class="btn btn-warning btn-sm fw-semibold" type="submit">
          <i class="fa-solid fa-file-arrow-up me-1" aria-hidden="true"></i>Subir Concentrado
        </button>
      </form>
    </div>

    <section class="tracking-toolbar">
      <div class="row g-3 align-items-end">
        <div class="col-md-4 col-lg-3">
          <label class="form-label mb-1" for="filtro-ciclo">Ciclo Escolar</label>
          <select class="form-select" id="filtro-ciclo"></select>
        </div>
        <div class="col-md-4 col-lg-3">
          <label class="form-label mb-1" for="filtro-grupo">Grupo</label>
          <select class="form-select" id="filtro-grupo"></select>
        </div>
        <div class="col-md-4 col-lg-3">
          <label class="form-label mb-1" for="filtro-parcial">Parcial</label>
          <select class="form-select" id="filtro-parcial"></select>
        </div>
        <div class="col-md-4 col-lg-3">
          <button id="btn-consultar" class="btn btn-primary w-100" type="button">
            <i class="fa-solid fa-filter me-1" aria-hidden="true"></i>Aplicar filtros
          </button>
        </div>
      </div>
    </section>

    <section class="summary-strip" aria-label="Resumen">
      <div class="summary-item"><div class="summary-label">Alumnos</div><div class="summary-value" id="res-alumnos">0</div></div>
      <div class="summary-item"><div class="summary-label">Materias</div><div class="summary-value" id="res-materias">0</div></div>
      <div class="summary-item"><div class="summary-label">Promedio grupo</div><div class="summary-value" id="res-promedio">0.0</div></div>
      <div class="summary-item"><div class="summary-label">Con reprobadas</div><div class="summary-value" id="res-riesgo">0</div></div>
    </section>

    <section class="sheet-frame">
      <div class="sheet-scroll">
        <table class="tracking-table" id="tabla-seguimiento">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="modal fade" id="comentariosModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h5 class="modal-title mb-0">Comentarios de seguimiento</h5>
            <div class="text-muted small" id="comentario-alumno"></div>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div class="comment-history border rounded p-2 mb-3" id="comentario-historial"></div>
          <label class="form-label" for="comentario-texto">Nuevo comentario</label>
          <textarea class="form-control" id="comentario-texto" rows="4" placeholder="Escribe la observacion..."></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-guardar-comentario">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="acuerdosModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h5 class="modal-title mb-0">Acuerdos</h5>
            <div class="text-muted small" id="acuerdo-alumno"></div>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div class="agreement-history border rounded p-2 mb-3" id="acuerdo-historial"></div>
          <label class="form-label" for="acuerdo-texto">Nuevo acuerdo</label>
          <textarea class="form-control" id="acuerdo-texto" rows="4" placeholder="Escribe el acuerdo platicado con el papá..."></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-guardar-acuerdo">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="proyeccionModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h5 class="modal-title mb-0">Proyección académica</h5>
            <div class="text-muted small" id="proyeccion-alumno"></div>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div class="d-flex flex-wrap gap-2 mb-3" id="proyeccion-resumen"></div>
          <div class="table-responsive">
            <table class="table table-sm table-bordered align-middle projection-table mb-0">
              <thead class="table-light" id="proyeccion-head"></thead>
              <tbody id="proyeccion-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/toasts.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const tabla = document.getElementById('tabla-seguimiento');
    let comentariosModal;
    let acuerdosModal;
    let proyeccionModal;
    let registrosActuales = [];
    let registroComentario = null;
    let registroAcuerdo = null;

    function toast(texto, tipo = 'info') {
      if (window.mostrarToast) window.mostrarToast(texto, tipo);
      else alert(texto);
    }

    function jsonHeaders() {
      return { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' };
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function claseCalificacion(valor) {
      if (valor === null || valor === undefined || valor === '') return '';
      const numero = Number(valor);
      if (numero < 70) return 'grade-fail';
      if (numero >= 70 && numero <= 75) return 'grade-risk';
      if (numero >= 76 && numero <= 100) return 'grade-good';
      return '';
    }

    function ultimoComentario(registro) {
      const comentarios = registro.comentarios || [];
      return comentarios.length ? comentarios[comentarios.length - 1].texto : '';
    }

    function ultimoAcuerdo(registro) {
      const acuerdos = registro.acuerdos || [];
      return acuerdos.length ? acuerdos[acuerdos.length - 1].texto : '';
    }

    function accionAutomatica(materiasReprobadas) {
      return Number(materiasReprobadas || 0) > 3 ? 'CITA' : 'MENSAJE';
    }

    function llenarSelect(select, valores, placeholder) {
      select.innerHTML = `<option value="">${placeholder}</option>`;
      valores.forEach((valor) => {
        const option = document.createElement('option');
        option.value = valor;
        option.textContent = valor;
        select.appendChild(option);
      });
    }

    async function cargarFiltros(mantenerSeleccion = true) {
      const cicloPrevio = document.getElementById('filtro-ciclo').value;
      const grupoPrevio = document.getElementById('filtro-grupo').value;
      const parcialPrevio = document.getElementById('filtro-parcial').value;
      const params = new URLSearchParams();
      if (cicloPrevio) params.append('ciclo', cicloPrevio);
      if (grupoPrevio) params.append('grupo', grupoPrevio);
      if (parcialPrevio) params.append('parcial', parcialPrevio);

      const query = params.toString();
      const url = query ? `/api/seguimiento-academico/filtros?${query}` : '/api/seguimiento-academico/filtros';
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      const cicloSelect = document.getElementById('filtro-ciclo');
      const grupoSelect = document.getElementById('filtro-grupo');
      const parcialSelect = document.getElementById('filtro-parcial');

      llenarSelect(cicloSelect, data.ciclos || [], 'Selecciona ciclo');
      llenarSelect(grupoSelect, data.grupos || [], 'Todos los grupos');
      llenarSelect(parcialSelect, data.parciales || [], 'Todos los parciales');

      const datalist = document.getElementById('ciclos-sugeridos');
      datalist.innerHTML = '';
      (data.ciclos || []).forEach((ciclo) => {
        const option = document.createElement('option');
        option.value = ciclo;
        datalist.appendChild(option);
      });

      const ciclos = data.ciclos || [];
      const grupos = data.grupos || [];
      const parciales = data.parciales || [];

      if (mantenerSeleccion && ciclos.includes(cicloPrevio)) cicloSelect.value = cicloPrevio;
      else if ((data.ciclos || []).length) cicloSelect.value = data.ciclos[0];
      if (mantenerSeleccion && grupos.includes(grupoPrevio)) grupoSelect.value = grupoPrevio;
      if (mantenerSeleccion && parciales.includes(parcialPrevio)) parcialSelect.value = parcialPrevio;
      else if ((data.parciales || []).length) parcialSelect.value = data.parciales[0];
    }

    async function cargarDatos() {
      const ciclo = document.getElementById('filtro-ciclo').value;
      const grupo = document.getElementById('filtro-grupo').value;
      const parcial = document.getElementById('filtro-parcial').value;
      const params = new URLSearchParams();
      if (ciclo) params.append('ciclo', ciclo);
      if (grupo) params.append('grupo', grupo);
      if (parcial) params.append('parcial', parcial);

      const res = await fetch(`/api/seguimiento-academico?${params.toString()}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      if (!res.ok) {
        toast(data.error || 'No se pudo consultar el seguimiento', 'danger');
        return;
      }

      registrosActuales = data.registros || [];
      renderTabla(data.materias || [], registrosActuales);
      renderResumen(data.materias || [], registrosActuales);
    }

    function limpiarConsulta() {
      registrosActuales = [];
      tabla.querySelector('thead').innerHTML = '';
      tabla.querySelector('tbody').innerHTML = '';
      renderResumen([], []);
    }

    function renderResumen(materias, registros) {
      const total = registros.length;
      const promedio = total ? registros.reduce((sum, reg) => sum + (Number(reg.promedio) || 0), 0) / total : 0;
      const riesgo = registros.filter((reg) => Number(reg.materiasReprobadas) > 0).length;
      document.getElementById('res-alumnos').textContent = total;
      document.getElementById('res-materias').textContent = materias.length;
      document.getElementById('res-promedio').textContent = promedio.toFixed(1);
      document.getElementById('res-riesgo').textContent = riesgo;
    }

    function renderTabla(materias, registros) {
      tabla.querySelector('thead').innerHTML = `
        <tr>
          <th class="col-no sticky-no">No.</th>
          <th class="col-matricula sticky-matricula">Matricula</th>
          <th class="col-nombre sticky-nombre">Nombre del Alumno(a)</th>
          ${materias.map((materia) => `<th class="subject-header" title="${escapeHtml(materia)}">${escapeHtml(materia)}</th>`).join('')}
          <th class="subject-header">REP. PROBADAS</th>
          <th class="summary-cell">PROMEDIO</th>
          <th class="action-cell">ACCION</th>
          <th class="projection-cell">PROYECCIÓN</th>
          <th class="comments-cell">COMENTARIOS DE SEGUIMIENTO</th>
          <th class="agreements-cell">ACUERDOS</th>
          <th class="print-cell">IMPRIMIR</th>
        </tr>
      `;

      if (!registros.length) {
        tabla.querySelector('tbody').innerHTML = `<tr><td colspan="${materias.length + 10}" class="text-center text-muted py-4">Sin registros para los filtros seleccionados.</td></tr>`;
        return;
      }

      tabla.querySelector('tbody').innerHTML = registros.map((registro, index) => {
        const mapa = new Map((registro.materias || []).map((item) => [item.materia, item.calificacion]));
        const comentario = ultimoComentario(registro);
        const acuerdo = ultimoAcuerdo(registro);
        const accion = accionAutomatica(registro.materiasReprobadas);
        return `
          <tr data-id="${registro._id}">
            <td class="col-no sticky-no">${index + 1}</td>
            <td class="col-matricula sticky-matricula">${escapeHtml(registro.matricula)}</td>
            <td class="col-nombre sticky-nombre" title="${escapeHtml(registro.nombre)}">${escapeHtml(registro.nombre)}</td>
            ${materias.map((materia) => {
              const valor = mapa.has(materia) ? mapa.get(materia) : '';
              return `<td class="grade-cell ${claseCalificacion(valor)}">${valor ?? ''}</td>`;
            }).join('')}
            <td class="summary-cell">${registro.materiasReprobadas ?? 0}</td>
            <td class="summary-cell">${Number(registro.promedio || 0).toFixed(1)}</td>
            <td class="action-cell">
              <select class="form-select form-select-sm accion-select" data-id="${registro._id}" disabled>
                <option value="CITA"${accion === 'CITA' ? ' selected' : ''}>CITA</option>
                <option value="MENSAJE"${accion === 'MENSAJE' ? ' selected' : ''}>MENSAJE</option>
              </select>
            </td>
            <td class="projection-cell">
              <button class="btn btn-sm btn-outline-primary fw-semibold proyeccion-trigger" type="button" data-id="${registro._id}">
                Proyección
              </button>
            </td>
            <td class="comments-cell comentario-trigger" data-id="${registro._id}" title="${escapeHtml(comentario || 'Agregar comentario')}">${escapeHtml(comentario || 'Agregar comentario')}</td>
            <td class="agreements-cell acuerdo-trigger" data-id="${registro._id}" title="${escapeHtml(acuerdo || 'Agregar acuerdo')}">${escapeHtml(acuerdo || 'Agregar acuerdo')}</td>
            <td class="print-cell">
              <button class="btn btn-sm btn-outline-dark fw-semibold imprimir-trigger" type="button" data-id="${registro._id}">
                Imprimir
              </button>
            </td>
          </tr>
        `;
      }).join('');
    }

    async function guardarAccion(id, accion) {
      const res = await fetch(`/api/seguimiento-academico/${id}/accion`, {
        method: 'PATCH',
        headers: jsonHeaders(),
        body: JSON.stringify({ accion })
      });
      const data = await res.json();
      if (!res.ok) {
        toast(data.error || 'No se pudo guardar la accion', 'danger');
        return;
      }
      const registro = registrosActuales.find((item) => item._id === id);
      if (registro) registro.accion = data.accion;
      toast('Accion guardada', 'success');
    }

    function abrirComentarios(id) {
      registroComentario = registrosActuales.find((item) => item._id === id);
      if (!registroComentario) return;
      document.getElementById('comentario-alumno').textContent = `${registroComentario.matricula} - ${registroComentario.nombre}`;
      document.getElementById('comentario-texto').value = '';
      renderHistorialComentarios(registroComentario);
      comentariosModal.show();
    }

    function renderHistorialComentarios(registro) {
      const contenedor = document.getElementById('comentario-historial');
      const comentarios = registro.comentarios || [];
      if (!comentarios.length) {
        contenedor.innerHTML = '<div class="text-muted small">Sin comentarios guardados.</div>';
        return;
      }
      contenedor.innerHTML = comentarios.slice().reverse().map((comentario) => {
        const fecha = new Date(comentario.fecha).toLocaleString('es-MX', {
          year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
        });
        return `
          <div class="border-bottom pb-2 mb-2">
            <div class="small text-muted">${escapeHtml(comentario.usuarioNombre || 'Usuario')} - ${fecha}</div>
            <div>${escapeHtml(comentario.texto)}</div>
          </div>
        `;
      }).join('');
    }

    async function guardarComentario() {
      if (!registroComentario) return;
      const texto = document.getElementById('comentario-texto').value.trim();
      if (!texto) {
        toast('Escribe un comentario antes de guardar', 'warning');
        return;
      }
      const res = await fetch(`/api/seguimiento-academico/${registroComentario._id}/comentarios`, {
        method: 'POST',
        headers: jsonHeaders(),
        body: JSON.stringify({ texto })
      });
      const data = await res.json();
      if (!res.ok) {
        toast(data.error || 'No se pudo guardar el comentario', 'danger');
        return;
      }
      const index = registrosActuales.findIndex((item) => item._id === data._id);
      if (index !== -1) registrosActuales[index] = data;
      registroComentario = data;
      renderHistorialComentarios(data);
      document.getElementById('comentario-texto').value = '';
      const cell = document.querySelector(`.comentario-trigger[data-id="${data._id}"]`);
      if (cell) cell.textContent = ultimoComentario(data) || 'Agregar comentario';
      toast('Comentario guardado', 'success');
    }

    function abrirAcuerdos(id) {
      registroAcuerdo = registrosActuales.find((item) => item._id === id);
      if (!registroAcuerdo) return;
      document.getElementById('acuerdo-alumno').textContent = `${registroAcuerdo.matricula} - ${registroAcuerdo.nombre}`;
      document.getElementById('acuerdo-texto').value = '';
      renderHistorialAcuerdos(registroAcuerdo);
      acuerdosModal.show();
    }

    function renderHistorialAcuerdos(registro) {
      const contenedor = document.getElementById('acuerdo-historial');
      const acuerdos = registro.acuerdos || [];
      if (!acuerdos.length) {
        contenedor.innerHTML = '<div class="text-muted small">Sin acuerdos guardados.</div>';
        return;
      }
      contenedor.innerHTML = acuerdos.slice().reverse().map((acuerdo) => {
        const fecha = new Date(acuerdo.fecha).toLocaleString('es-MX', {
          year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
        });
        return `
          <div class="border-bottom pb-2 mb-2">
            <div class="small text-muted">${escapeHtml(acuerdo.usuarioNombre || 'Usuario')} - ${fecha}</div>
            <div>${escapeHtml(acuerdo.texto)}</div>
          </div>
        `;
      }).join('');
    }

    async function guardarAcuerdo() {
      if (!registroAcuerdo) return;
      const texto = document.getElementById('acuerdo-texto').value.trim();
      if (!texto) {
        toast('Escribe un acuerdo antes de guardar', 'warning');
        return;
      }
      const res = await fetch(`/api/seguimiento-academico/${registroAcuerdo._id}/acuerdos`, {
        method: 'POST',
        headers: jsonHeaders(),
        body: JSON.stringify({ texto })
      });
      const data = await res.json();
      if (!res.ok) {
        toast(data.error || 'No se pudo guardar el acuerdo', 'danger');
        return;
      }
      const index = registrosActuales.findIndex((item) => item._id === data._id);
      if (index !== -1) registrosActuales[index] = data;
      registroAcuerdo = data;
      renderHistorialAcuerdos(data);
      document.getElementById('acuerdo-texto').value = '';
      const cell = document.querySelector(`.acuerdo-trigger[data-id="${data._id}"]`);
      if (cell) cell.textContent = ultimoAcuerdo(data) || 'Agregar acuerdo';
      toast('Acuerdo guardado', 'success');
    }

    function renderListaImpresion(items, textoVacio) {
      if (!items || !items.length) return `<p class="empty">${escapeHtml(textoVacio)}</p>`;
      return items.map((item) => {
        const fecha = item.fecha ? new Date(item.fecha).toLocaleString('es-MX', {
          year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
        }) : '';
        return `
          <article class="entry">
            <div class="meta">${escapeHtml(item.usuarioNombre || 'Usuario')}${fecha ? ` - ${escapeHtml(fecha)}` : ''}</div>
            <div class="text">${escapeHtml(item.texto)}</div>
          </article>
        `;
      }).join('');
    }

    function imprimirSeguimiento(id) {
      const registro = registrosActuales.find((item) => item._id === id);
      if (!registro) return;

      const ventana = window.open('', '_blank', 'width=900,height=700');
      if (!ventana) {
        toast('Permite las ventanas emergentes para imprimir', 'warning');
        return;
      }

      const fechaImpresion = new Date().toLocaleString('es-MX', {
        year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
      });

      ventana.document.write(`
        <!DOCTYPE html>
        <html lang="es">
        <head>
          <meta charset="UTF-8">
          <title>Seguimiento academico - ${escapeHtml(registro.matricula)}</title>
          <style>
            * { box-sizing: border-box; }
            body { color: #111827; font-family: Arial, sans-serif; margin: 32px; }
            h1 { font-size: 22px; margin: 0 0 6px; }
            h2 { border-bottom: 1px solid #d1d5db; font-size: 17px; margin: 26px 0 12px; padding-bottom: 6px; }
            .muted { color: #6b7280; font-size: 12px; }
            .student { border: 1px solid #d1d5db; border-radius: 6px; margin-top: 18px; padding: 14px; }
            .grid { display: grid; gap: 8px 18px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .label { color: #6b7280; display: block; font-size: 11px; text-transform: uppercase; }
            .value { font-size: 14px; font-weight: 700; }
            .entry { border: 1px solid #e5e7eb; border-radius: 6px; margin-bottom: 10px; padding: 10px 12px; }
            .meta { color: #6b7280; font-size: 12px; margin-bottom: 5px; }
            .text { font-size: 14px; line-height: 1.45; white-space: pre-wrap; }
            .empty { color: #6b7280; font-style: italic; }
            @media print {
              body { margin: 18mm; }
            }
          </style>
        </head>
        <body>
          <h1>Seguimiento academico</h1>
          <div class="muted">Impreso: ${escapeHtml(fechaImpresion)}</div>
          <section class="student">
            <div class="grid">
              <div><span class="label">Alumno</span><span class="value">${escapeHtml(registro.nombre)}</span></div>
              <div><span class="label">Matricula</span><span class="value">${escapeHtml(registro.matricula)}</span></div>
              <div><span class="label">Ciclo</span><span class="value">${escapeHtml(registro.ciclo || '')}</span></div>
              <div><span class="label">Grupo</span><span class="value">${escapeHtml(registro.grupo || '')}</span></div>
              <div><span class="label">Parcial</span><span class="value">${escapeHtml(registro.parcial || '')}</span></div>
              <div><span class="label">Promedio</span><span class="value">${Number(registro.promedio || 0).toFixed(1)}</span></div>
            </div>
          </section>
          <h2>Comentarios de seguimiento</h2>
          ${renderListaImpresion(registro.comentarios || [], 'Sin comentarios de seguimiento guardados.')}
          <h2>Acuerdos</h2>
          ${renderListaImpresion(registro.acuerdos || [], 'Sin acuerdos guardados.')}
          <script>
            window.addEventListener('load', () => {
              window.print();
            });
          <\/script>
        </body>
        </html>
      `);
      ventana.document.close();
    }

    function badgeEstado(estado) {
      const clases = {
        'Extra directo': 'text-bg-danger',
        Extra: 'text-bg-danger',
        Aprobado: 'text-bg-success',
        'Posible extraordinario': 'text-bg-warning',
        'En proyeccion': 'text-bg-primary'
      };
      return `<span class="badge ${clases[estado] || 'text-bg-secondary'} projection-status">${escapeHtml(estado)}</span>`;
    }

    function formatearNumero(valor) {
      if (valor === null || valor === undefined || valor === '') return '-';
      const numero = Number(valor);
      return Number.isFinite(numero) ? String(numero) : '-';
    }

    async function abrirProyeccion(id) {
      const res = await fetch(`/api/seguimiento-academico/${id}/proyeccion`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      if (!res.ok) {
        toast(data.error || 'No se pudo consultar la proyección', 'danger');
        return;
      }

      const alumno = data.alumno || {};
      document.getElementById('proyeccion-alumno').textContent =
        `${alumno.matricula || ''} - ${alumno.nombre || ''} | ${alumno.grupo || ''} | ${alumno.ciclo || ''}`;

      const parcialesPrevios = Array.from({ length: data.parcialNumero || 0 }, (_, index) => `PARCIAL ${index + 1}`);
      document.getElementById('proyeccion-resumen').innerHTML = `
        <span class="badge text-bg-light border">Parcial actual: ${escapeHtml(data.parcialActual || '-')}</span>
        <span class="badge text-bg-light border">Meta mínima: ${data.minimoAprobar || 280} puntos</span>
      `;

      document.getElementById('proyeccion-head').innerHTML = `
        <tr>
          <th>Materia</th>
          ${parcialesPrevios.map((parcial) => `<th>${escapeHtml(parcial)}</th>`).join('')}
          <th>Acumulado</th>
          <th>Promedio cargado</th>
          <th>Faltan</th>
          <th>Parciales restantes</th>
          <th>Mínimo por parcial</th>
          <th>Estado</th>
        </tr>
      `;

      const proyeccion = data.proyeccion || [];
      const totalColumnasProyeccion = parcialesPrevios.length + 7;
      document.getElementById('proyeccion-body').innerHTML = proyeccion.length
        ? proyeccion.map((item) => `
          <tr>
            <td class="fw-semibold">${escapeHtml(item.materia)}</td>
            ${parcialesPrevios.map((parcial) => `<td class="text-center">${formatearNumero(item.calificaciones?.[parcial])}</td>`).join('')}
            <td class="text-center">${formatearNumero(item.acumulado)}</td>
            <td class="text-center">${formatearNumero(item.promedioParciales)}</td>
            <td class="text-center">${formatearNumero(item.puntosFaltantes)}</td>
            <td>${escapeHtml((item.parcialesRestantes || []).join(', ') || 'Ninguno')}</td>
            <td class="text-center fw-semibold">${formatearNumero(item.requeridoPorParcial)}</td>
            <td>${badgeEstado(item.estado)}</td>
          </tr>
        `).join('')
        : `<tr><td colspan="${totalColumnasProyeccion}" class="text-center text-muted py-4">Sin materias para proyectar.</td></tr>`;

      proyeccionModal.show();
    }

    async function importarConcentrado(event) {
      event.preventDefault();
      const formData = new FormData(event.currentTarget);
      const res = await fetch('/api/seguimiento-academico/importar', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: formData
      });
      const data = await res.json();
      if (!res.ok) {
        toast(data.error || 'No se pudo importar el concentrado', 'danger');
        return;
      }
      toast(`${data.mensaje}. Registros: ${data.registros}`, 'success');
      document.getElementById('form-importar').reset();
      await cargarFiltros(false);
      document.getElementById('filtro-ciclo').value = data.ciclo;
      await cargarFiltros(true);
      document.getElementById('filtro-grupo').value = data.grupo;
      document.getElementById('filtro-parcial').value = data.parcial;
      await cargarDatos();
    }

    document.getElementById('form-importar').addEventListener('submit', importarConcentrado);
    document.getElementById('btn-consultar').addEventListener('click', cargarDatos);
    document.getElementById('filtro-ciclo').addEventListener('change', async () => {
      limpiarConsulta();
      await cargarFiltros(true);
    });
    document.getElementById('filtro-grupo').addEventListener('change', async () => {
      limpiarConsulta();
      await cargarFiltros(true);
    });
    document.getElementById('filtro-parcial').addEventListener('change', limpiarConsulta);
    document.getElementById('btn-guardar-comentario').addEventListener('click', guardarComentario);
    document.getElementById('btn-guardar-acuerdo').addEventListener('click', guardarAcuerdo);
    tabla.addEventListener('change', (event) => {
      if (event.target.classList.contains('accion-select')) guardarAccion(event.target.dataset.id, event.target.value);
    });
    tabla.addEventListener('click', (event) => {
      const imprimirTrigger = event.target.closest('.imprimir-trigger');
      if (imprimirTrigger) {
        imprimirSeguimiento(imprimirTrigger.dataset.id);
        return;
      }
      const proyeccionTrigger = event.target.closest('.proyeccion-trigger');
      if (proyeccionTrigger) {
        abrirProyeccion(proyeccionTrigger.dataset.id);
        return;
      }
      const trigger = event.target.closest('.comentario-trigger');
      if (trigger) {
        abrirComentarios(trigger.dataset.id);
        return;
      }
      const acuerdoTrigger = event.target.closest('.acuerdo-trigger');
      if (acuerdoTrigger) abrirAcuerdos(acuerdoTrigger.dataset.id);
    });
    document.addEventListener('DOMContentLoaded', async () => {
      comentariosModal = new bootstrap.Modal(document.getElementById('comentariosModal'));
      acuerdosModal = new bootstrap.Modal(document.getElementById('acuerdosModal'));
      proyeccionModal = new bootstrap.Modal(document.getElementById('proyeccionModal'));
      await cargarFiltros(false);
      limpiarConsulta();
    });
  </script>
</body>
</html>
