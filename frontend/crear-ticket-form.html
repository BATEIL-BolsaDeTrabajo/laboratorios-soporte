<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crear Ticket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/toasts.css" rel="stylesheet">
  <style>
    .ticket-create {
      max-width: 980px;
    }

    .ticket-hero {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      padding: 1.5rem;
      color: var(--bateil-white, #fff);
      background:
        linear-gradient(135deg, rgba(248, 196, 0, 0.2), transparent 45%),
        var(--bateil-black, #0b0b0d);
      border-bottom: 5px solid var(--bateil-yellow, #f8c400);
      border-radius: 8px;
      box-shadow: var(--bateil-shadow, 0 18px 45px rgba(17, 24, 39, 0.12));
    }

    .ticket-hero h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 900;
    }

    .ticket-hero p {
      max-width: 38rem;
      margin: 0.35rem 0 0;
      color: rgba(255, 255, 255, 0.72);
      font-size: 1.05rem;
    }

    .ticket-hero img {
      width: clamp(86px, 12vw, 128px);
      filter: drop-shadow(0 16px 22px rgba(0, 0, 0, 0.32));
    }

    .step-section {
      margin-bottom: 1rem;
      padding: 1.25rem;
      background: #fff;
      border: 1px solid var(--bateil-border, rgba(17, 24, 39, 0.12));
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
    }

    .step-title {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 1rem;
      font-weight: 900;
    }

    .step-number {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      flex: 0 0 34px;
      color: var(--bateil-black, #0b0b0d);
      background: var(--bateil-yellow, #f8c400);
      border-radius: 999px;
      font-weight: 900;
    }

    .area-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }

    .area-card {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 0.85rem;
      min-height: 92px;
      padding: 1rem;
      border: 2px solid #d7dbe2;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }

    .area-card:hover {
      border-color: rgba(248, 196, 0, 0.72);
      transform: translateY(-1px);
    }

    .area-card.active {
      border-color: var(--bateil-yellow, #f8c400);
      box-shadow: 0 0 0 4px rgba(248, 196, 0, 0.18);
    }

    .area-card .form-check-input {
      width: 1.2rem;
      height: 1.2rem;
      margin: 0;
    }

    .area-card-title {
      display: block;
      font-weight: 900;
    }

    .area-card-copy {
      display: block;
      margin-top: 0.15rem;
      color: var(--bateil-muted, #646b76);
      font-size: 0.95rem;
    }

    .ticket-panel {
      border-top: 4px solid var(--bateil-yellow, #f8c400);
      box-shadow: none;
    }

    .submit-actions {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 0.75rem;
    }

    .invalid-feedback {
      font-weight: 700;
    }

    @media (max-width: 768px) {
      .ticket-hero,
      .area-options,
      .submit-actions {
        grid-template-columns: 1fr;
      }

      .ticket-hero img {
        justify-self: start;
      }
    }
  </style>
</head>
<body class="bg-light">
  <div id="navbar-container"></div>

  <main class="container ticket-create py-4">
    <section class="ticket-hero" aria-label="Crear ticket">
      <div>
        <h1 id="form-title">Crear Ticket</h1>
        <p id="form-subtitle">Reporta una falla y la canalizamos al area correcta para darle seguimiento.</p>
      </div>
      <img src="/assets/benito-bateil.png" alt="Benito BATEIL">
    </section>

    <section class="step-section">
      <div class="step-title">
        <span class="step-number">1</span>
        <span>Ubicacion y datos del reporte</span>
      </div>

      <div id="wrap-contexto" class="mb-3">
        <label id="contexto-label" class="form-label fw-semibold">Tipo de solicitud en Sistemas</label>
        <select id="contextoSistemas" class="form-select">
          <option value="laboratorio">Área</option>
          <option value="otro">Otra ubicación</option>
        </select>
      </div>

      <div id="wrap-sis-lab" class="card card-body ticket-panel mb-3">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Área</label>
            <select id="lab" class="form-select">
              <option value="">Selecciona...</option>
              <optgroup label="Oficinas y áreas de atención">
                <option>Dirección</option>
                <option>Subdirección</option>
                <option>Coordinación</option>
                <option>Psicología</option>
                <option>Subdirección Administrativa</option>
                <option>Caja</option>
                <option>Vida Estudiantil</option>
                <option>Recepción</option>
                <option>Lobby</option>
                <option>Vinculación</option>
                <option>Auxiliar Administrativo</option>
                <option>Control Escolar</option>
              </optgroup>
              <optgroup label="Laboratorios y audiovisual">
                <option>Laboratorio A</option>
                <option>Laboratorio B</option>
                <option>Laboratorio C</option>
                <option>Laboratorio D</option>
                <option>Laboratorio de Química</option>
                <option>Audiovisual</option>
              </optgroup>
              <optgroup label="Salones antiguos">
                <option>Salón Antiguo 1</option>
                <option>Salón Antiguo 2</option>
                <option>Salón Antiguo 3</option>
                <option>Salón Antiguo 4</option>
                <option>Salón Antiguo 5</option>
              </optgroup>
              <optgroup label="Edificio A">
                <option>Salón A1</option>
                <option>Salón A2</option>
                <option>Salón A3</option>
                <option>Salón A4</option>
                <option>Salón A5</option>
              </optgroup>
              <optgroup label="Edificio B">
                <option>Salón B1</option>
                <option>Salón B2</option>
                <option>Salón B3</option>
                <option>Salón B4</option>
                <option>Salón B5</option>
              </optgroup>
              <optgroup label="Edificio C">
                <option>Salón C1</option>
                <option>Salón C2</option>
                <option>Salón C3</option>
                <option>Salón C4</option>
                <option>Salón C5</option>
              </optgroup>
              <optgroup label="Talleres">
                <option>Taller de Mecatrónica</option>
                <option>Taller de Soldadura</option>
                <option>Taller de Combustión</option>
                <option>Taller de Máquinas</option>
              </optgroup>
              <optgroup label="Baños">
                <option>Baño A</option>
                <option>Baño B</option>
                <option>Baño C</option>
                <option>Baño Antiguo</option>
              </optgroup>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Equipo (Etiqueta)</label>
            <input id="equipo" class="form-control" placeholder="Ej. PC-03">
          </div>
          <div class="col-12">
            <label class="form-label">Tipo de falla (Sistemas / Área)</label>
            <select id="tipoFallaSisLab" class="form-select"></select>
          </div>
        </div>
      </div>

      <div id="wrap-sis-otro" class="card card-body ticket-panel mb-3 d-none">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Ubicacion</label>
            <input id="ubicacionOtro" class="form-control" placeholder="Ej. Direccion, Biblioteca, etc.">
          </div>
          <div class="col-md-6">
            <label class="form-label">Tipo de falla (Sistemas / Otros)</label>
            <select id="tipoFallaSisOtro" class="form-select"></select>
          </div>
        </div>
      </div>

      <div id="wrap-mant" class="card card-body ticket-panel mb-3 d-none">
        <div class="row g-3">
          <div id="wrap-mant-area" class="col-md-6">
            <label class="form-label">Área</label>
            <select id="salon" class="form-select"></select>
          </div>
          <div id="wrap-mant-otro" class="col-md-6 d-none">
            <label class="form-label">Otra ubicación</label>
            <input id="salonOtro" class="form-control" placeholder="Escribe el área o la ubicación">
          </div>
          <div class="col-md-6">
            <label class="form-label">Tipo de falla (Mantenimiento)</label>
            <select id="tipoFallaMant" class="form-select"></select>
          </div>
        </div>
      </div>
    </section>

    <section class="step-section">
      <div class="step-title">
        <span class="step-number">2</span>
        <span>Descripcion</span>
      </div>
      <label class="form-label">Descripcion detallada</label>
      <textarea id="descripcion" class="form-control" rows="5" placeholder="Cuentanos el problema con detalle..."></textarea>
    </section>

    <div id="mensaje-form" class="alert d-none" role="alert"></div>

    <div class="submit-actions">
      <button id="btnLimpiar" class="btn btn-outline-dark btn-lg" type="button">Limpiar</button>
      <button id="btnEnviar" class="btn btn-primary btn-lg" type="button">Enviar Ticket</button>
    </div>
  </main>

  <script src="js/navbar.js"></script>
  <script src="js/toasts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.href = "login.html";
    }

    const CATALOGOS = {
      sistemasLab: [
        "No enciende",
        "Sin imagen / monitor",
        "Sin internet (solo ese equipo)",
        "Teclado / mouse fallando",
        "Software no abre",
        "No imprime",
        "Otra (especificar)"
      ],
      sistemasOtro: [
        "No tengo internet (area/oficina)",
        "Formateo / reinstalacion",
        "Correo / Office 365",
        "Impresora compartida",
        "Problema con proyector",
        "Otra (especificar)"
      ],
      mantenimiento: [
        "No funciona aire acondicionado",
        "No hay luz electrica",
        "Contacto / apagador danado",
        "Vidrio / puerta danada",
        "Silla / mesa rota",
        "Fuga de agua",
        "Otra (especificar)"
      ]
    };

    function llenarOpciones(select, items) {
      select.innerHTML = '<option value="">Selecciona...</option>' +
        items.map(x => `<option>${x}</option>`).join('');
    }

    llenarOpciones(document.getElementById('tipoFallaSisLab'), CATALOGOS.sistemasLab);
    llenarOpciones(document.getElementById('tipoFallaSisOtro'), CATALOGOS.sistemasOtro);
    llenarOpciones(document.getElementById('tipoFallaMant'), CATALOGOS.mantenimiento);

    // Sistemas y Mantenimiento comparten el mismo catálogo de áreas.
    document.getElementById('salon').innerHTML = document.getElementById('lab').innerHTML;

    const params = new URLSearchParams(window.location.search);
    const selectedArea = params.get('area');
    if (!['sistemas', 'mantenimiento'].includes(selectedArea)) {
      window.location.href = 'crear-ticket.html';
    }

    const wrapContexto = document.getElementById('wrap-contexto');
    const contextoLabel = document.getElementById('contexto-label');
    const contextoSistemas = document.getElementById('contextoSistemas');
    const wrapSisLab = document.getElementById('wrap-sis-lab');
    const wrapSisOtro = document.getElementById('wrap-sis-otro');
    const wrapMant = document.getElementById('wrap-mant');
    const wrapMantArea = document.getElementById('wrap-mant-area');
    const wrapMantOtro = document.getElementById('wrap-mant-otro');
    const btnEnviar = document.getElementById('btnEnviar');
    const mensajeForm = document.getElementById('mensaje-form');

    function refrescarUI() {
      const area = selectedArea;

      if (area === 'sistemas') {
        document.getElementById('form-title').textContent = 'Ticket de Soporte';
        document.getElementById('form-subtitle').textContent = 'Reporta fallas de equipos, áreas, internet o software.';
        contextoLabel.textContent = 'Tipo de solicitud en Sistemas';
        wrapContexto.classList.remove('d-none');
        wrapMant.classList.add('d-none');

        const ctx = contextoSistemas.value;
        wrapSisLab.classList.toggle('d-none', ctx !== 'laboratorio');
        wrapSisOtro.classList.toggle('d-none', ctx !== 'otro');
      } else {
        document.getElementById('form-title').textContent = 'Ticket de Mantenimiento';
        document.getElementById('form-subtitle').textContent = 'Reporta fallas de espacios, mobiliario, energia, clima o instalaciones.';
        contextoLabel.textContent = 'Tipo de solicitud en Mantenimiento';
        wrapContexto.classList.remove('d-none');
        wrapSisLab.classList.add('d-none');
        wrapSisOtro.classList.add('d-none');
        wrapMant.classList.remove('d-none');

        const ctx = contextoSistemas.value;
        wrapMantArea.classList.toggle('d-none', ctx !== 'laboratorio');
        wrapMantOtro.classList.toggle('d-none', ctx !== 'otro');
      }
    }

    contextoSistemas.addEventListener('change', refrescarUI);
    refrescarUI();

    function limpiarErrores() {
      mensajeForm.className = 'alert d-none';
      mensajeForm.textContent = '';
      document.querySelectorAll('.is-invalid').forEach(el => {
        el.classList.remove('is-invalid');
        delete el.dataset.focused;
      });
      document.querySelectorAll('.invalid-feedback[data-auto="true"]').forEach(el => el.remove());
    }

    function mostrarMensaje(texto, tipo = 'danger') {
      mensajeForm.className = 'alert d-none';
      mensajeForm.textContent = '';
      window.mostrarToast(texto, tipo);
    }

    function marcarInvalido(el, mensaje) {
      if (!el) return;
      el.classList.add('is-invalid');
      const feedback = document.createElement('div');
      feedback.className = 'invalid-feedback';
      feedback.dataset.auto = 'true';
      feedback.textContent = mensaje;
      el.insertAdjacentElement('afterend', feedback);
      if (!document.querySelector('.is-invalid[data-focused="true"]')) {
        el.dataset.focused = 'true';
        el.focus();
      }
    }

    function validarCampo(el, mensaje) {
      if (!el.value.trim()) {
        marcarInvalido(el, mensaje);
        return false;
      }
      return true;
    }

    function setEnviando(enviando) {
      btnEnviar.disabled = enviando;
      btnEnviar.textContent = enviando ? 'Enviando...' : 'Enviar Ticket';
    }

    document.getElementById('btnLimpiar').addEventListener('click', () => {
      limpiarErrores();
      contextoSistemas.value = 'laboratorio';
      document.getElementById('lab').value = '';
      document.getElementById('equipo').value = '';
      document.getElementById('tipoFallaSisLab').value = '';
      document.getElementById('ubicacionOtro').value = '';
      document.getElementById('tipoFallaSisOtro').value = '';
      document.getElementById('salon').value = '';
      document.getElementById('salonOtro').value = '';
      document.getElementById('tipoFallaMant').value = '';
      document.getElementById('descripcion').value = '';
      refrescarUI();
    });

    btnEnviar.addEventListener('click', async () => {
      limpiarErrores();
      const area = selectedArea;
      const descripcion = document.getElementById('descripcion').value.trim();

      const payload = {
        area,
        tipo: null,
        laboratorio: null,
        equipo: null,
        ubicacion: null,
        salon: null,
        tipoFalla: null,
        descripcion
      };

      if (area === 'sistemas') {
        const ctx = contextoSistemas.value;
        payload.tipo = ctx;

        if (ctx === 'laboratorio') {
          payload.laboratorio = document.getElementById('lab').value || null;
          payload.equipo = document.getElementById('equipo').value.trim() || null;
          payload.tipoFalla = document.getElementById('tipoFallaSisLab').value || null;

          let ok = true;
          ok = validarCampo(document.getElementById('lab'), 'Selecciona un área.') && ok;
          ok = validarCampo(document.getElementById('equipo'), 'Escribe la etiqueta del equipo.') && ok;
          ok = validarCampo(document.getElementById('tipoFallaSisLab'), 'Selecciona el tipo de falla.') && ok;
          if (!ok) return mostrarMensaje('Revisa los campos marcados para enviar el ticket.');
        } else {
          payload.ubicacion = document.getElementById('ubicacionOtro').value.trim() || null;
          payload.tipoFalla = document.getElementById('tipoFallaSisOtro').value || null;

          let ok = true;
          ok = validarCampo(document.getElementById('ubicacionOtro'), 'Indica la ubicacion.') && ok;
          ok = validarCampo(document.getElementById('tipoFallaSisOtro'), 'Selecciona el tipo de falla.') && ok;
          if (!ok) return mostrarMensaje('Revisa los campos marcados para enviar el ticket.');
        }
      } else {
        const ctx = contextoSistemas.value;
        const campoUbicacion = ctx === 'laboratorio'
          ? document.getElementById('salon')
          : document.getElementById('salonOtro');

        payload.tipo = ctx;
        payload.salon = campoUbicacion.value.trim() || null;
        payload.tipoFalla = document.getElementById('tipoFallaMant').value || null;

        let ok = true;
        const mensajeUbicacion = ctx === 'laboratorio'
          ? 'Selecciona un área.'
          : 'Escribe el área o la ubicación.';
        ok = validarCampo(campoUbicacion, mensajeUbicacion) && ok;
        ok = validarCampo(document.getElementById('tipoFallaMant'), 'Selecciona el tipo de falla.') && ok;
        if (!ok) return mostrarMensaje('Revisa los campos marcados para enviar el ticket.');
      }

      if (!descripcion) {
        marcarInvalido(document.getElementById('descripcion'), 'Escribe la descripcion detallada.');
        return mostrarMensaje('Revisa los campos marcados para enviar el ticket.');
      }

      try {
        setEnviando(true);
        const res = await fetch('/api/tickets', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const t = await res.text();
          throw new Error(t || 'No se pudo crear el ticket');
        }

        mostrarMensaje('Ticket creado correctamente.', 'success');
        document.getElementById('descripcion').value = '';
        if (payload.area === 'sistemas' && payload.tipo === 'laboratorio') {
          document.getElementById('equipo').value = '';
        }
      } catch (err) {
        console.error(err);
        mostrarMensaje('Error: ' + err.message);
      } finally {
        setEnviando(false);
      }
    });
  </script>
  <script src="/socket.io/socket.io.js"></script>
</body>
</html>
