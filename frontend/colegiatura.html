<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colegiatura</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{
      background:#f5f6f8;
    }

    .tabla-colegiatura-wrap{
      max-height: 70vh;
      overflow: auto;
      border: 1px solid #dcdfe3;
      border-radius: 8px;
      background: #fff;
    }

    .tabla-colegiatura{
      min-width: 1650px;
      margin: 0;
    }

    .tabla-colegiatura thead th{
      position: sticky;
      top: 0;
      z-index: 4;
      background: #ffffff;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      vertical-align: middle;
      border-bottom: 2px solid #cfd4da;
    }

    .tabla-colegiatura tbody td{
      font-size: 13px;
      vertical-align: middle;
      white-space: nowrap;
    }

    .tabla-colegiatura tbody tr:nth-child(even){
      background: #fcfcfd;
    }

    /* Columna número */
    .tabla-colegiatura td.num-col,
    .tabla-colegiatura th.num-col{
      position: sticky;
      left: 0;
      min-width: 60px;
      max-width: 60px;
      width: 60px;
      text-align: center;
      font-weight: 700;
      background: #fff;
      z-index: 3;
    }

    .tabla-colegiatura thead th.num-col{
      z-index: 6;
    }

    /* Columna nombre */
    .tabla-colegiatura td.nombre-col,
    .tabla-colegiatura th.nombre-col{
      position: sticky;
      left: 60px;
      min-width: 250px;
      max-width: 250px;
      text-align: left;
      white-space: normal;
      background: #fff;
      z-index: 3;
    }

    .tabla-colegiatura thead th.nombre-col{
      z-index: 6;
    }

    /* Columna grupo */
    .tabla-colegiatura td.grupo-col,
    .tabla-colegiatura th.grupo-col{
      position: sticky;
      left: 310px;
      min-width: 80px;
      max-width: 80px;
      text-align: center;
      background: #fff;
      z-index: 3;
    }

    .tabla-colegiatura thead th.grupo-col{
      z-index: 6;
    }

    .tabla-colegiatura td.mes-col,
    .tabla-colegiatura th.mes-col{
      min-width: 64px;
      max-width: 64px;
      text-align: center;
      font-weight: 700;
    }

    .tabla-colegiatura td.asistencia-col,
    .tabla-colegiatura th.asistencia-col{
      min-width: 150px;
    }

    .tabla-colegiatura td.motivo-col,
    .tabla-colegiatura th.motivo-col{
      min-width: 180px;
    }

    .tabla-colegiatura td.notas-acad-col,
    .tabla-colegiatura th.notas-acad-col,
    .tabla-colegiatura td.notas-admin-col,
    .tabla-colegiatura th.notas-admin-col{
      min-width: 240px;
      white-space: normal;
    }

    .tabla-colegiatura .estado-si{
      background: #d9f2d9;
      color: #1d5e20;
      font-weight: 700;
    }

    .tabla-colegiatura .estado-no{
      background: #ffd9d9;
      color: #8a1f1f;
      font-weight: 700;
    }

    .tabla-colegiatura .asistencia-regular{
      background: #dff0d8;
      color: #256029;
      font-weight: 700;
    }

    .tabla-colegiatura .asistencia-irregular{
      background: #fde7b2;
      color: #8a5a00;
      font-weight: 700;
    }

    .tabla-colegiatura textarea.form-control,
    .tabla-colegiatura input.form-control,
    .tabla-colegiatura select.form-select{
      font-size: 12px;
    }

    .tabla-colegiatura textarea.form-control{
      min-height: 58px;
      resize: vertical;
    }

    .resumen-card{
      border: 1px solid #dcdfe3;
      border-radius: 8px;
      background: #fff;
      padding: 16px;
    }

    .resumen-grid{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .resumen-item{
      border: 1px solid #e3e6ea;
      border-radius: 8px;
      padding: 10px 12px;
      background: #fafbfc;
    }

    .resumen-item .titulo{
      font-size: 12px;
      color: #6c757d;
      text-transform: uppercase;
      font-weight: 700;
    }

    .resumen-item .valor{
      font-size: 18px;
      font-weight: 700;
      margin-top: 4px;
    }

    .resumen-item .detalle{
      font-size: 12px;
      margin-top: 4px;
    }
  </style>
</head>

<div id="navbar-container"></div>

<body>
  <div class="container py-4">
    <h2 class="mb-4">Control de colegiatura</h2>

    <div class="card mb-3">
      <div class="card-body row g-2">

        <div class="col-md-2">
          <label class="form-label">Ciclo</label>
          <select id="selectCycle" class="form-select"></select>
        </div>

        <div class="col-md-2">
          <label class="form-label">Mes</label>
          <select id="selectMonth" class="form-select"></select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Archivo Excel de caja</label>
          <input type="file" id="fileCaja" class="form-control" accept=".xlsx,.xls">
        </div>

        <div class="col-md-1 d-flex align-items-end">
          <button class="btn btn-success w-100" id="btnImport">
            Subir
          </button>
        </div>

        <div class="col-md-2 d-flex align-items-end">
          <button class="btn btn-primary w-100" id="btnLoad">
            Cargar tabla
          </button>
        </div>

        <div class="col-md-4">
          <label class="form-label">Buscar</label>
          <input type="text" id="search" class="form-control" placeholder="Nombre o matrícula">
        </div>

        <div class="col-md-2">
          <label class="form-label">Grupo</label>
          <select id="filterGrupo" class="form-select">
            <option value="">Todos los grupos</option>
          </select>
        </div>

        <div class="col-md-2 d-flex align-items-end">
          <button class="btn btn-success w-100" id="btnExportExcel">
            Exportar Excel
          </button>
        </div>

      </div>
    </div>

    <div id="summary" class="mb-3"></div>

    <div class="card">
      <div class="card-body">
        <div class="tabla-colegiatura-wrap">
          <table class="table table-bordered table-sm tabla-colegiatura align-middle mb-0" id="tabla">
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <script src="js/colegiatura.js"></script>
  <script src="js/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
