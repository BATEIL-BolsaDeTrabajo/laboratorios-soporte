<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Autoticket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/toasts.css" rel="stylesheet">
  <link href="css/bateil-theme.css" rel="stylesheet">
  <style>
    .autoticket { max-width: 840px; }
    .autoticket-hero { padding: 1.5rem; color: #fff; background: linear-gradient(135deg, rgba(248,196,0,.22), transparent 48%), #0b0b0d; border-bottom: 5px solid #f8c400; border-radius: 8px; }
    .autoticket-hero h1 { margin: 0; font-weight: 900; }
    .autoticket-hero p { margin: .35rem 0 0; color: rgba(255,255,255,.75); }
    .form-card { margin-top: 1.5rem; padding: 1.5rem; background: #fff; border: 1px solid rgba(17,24,39,.12); border-radius: 8px; box-shadow: 0 12px 30px rgba(17,24,39,.08); }
  </style>
</head>
<body class="bg-light">
  <div id="navbar-container"></div>
  <main class="container autoticket py-4">
    <section class="autoticket-hero">
      <h1>Autoticket</h1>
      <p>Registra una atención ya solucionada para que la persona solicitante pueda revisarla y cerrar el ticket.</p>
    </section>
    <section class="form-card">
      <div class="mb-4">
        <label for="solicitante" class="form-label fw-semibold">Persona que solicitó el apoyo</label>
        <select id="solicitante" class="form-select"><option value="">Cargando personas...</option></select>
        <div class="invalid-feedback">Selecciona a la persona que solicitó el apoyo.</div>
      </div>
      <div class="mb-4">
        <label for="descripcion" class="form-label fw-semibold">Problema que se solucionó</label>
        <textarea id="descripcion" class="form-control" rows="6" maxlength="3000" placeholder="Describe el problema atendido y la solución aplicada."></textarea>
        <div class="invalid-feedback">Describe el problema que se solucionó.</div>
      </div>
      <div class="d-flex gap-2 justify-content-end">
        <button id="btnLimpiar" class="btn btn-outline-dark" type="button">Limpiar</button>
        <button id="btnGuardar" class="btn btn-primary" type="button">Registrar autoticket resuelto</button>
      </div>
    </section>
  </main>
  <script src="js/navbar.js"></script>
  <script src="js/toasts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.replace('/login.html');

    const solicitante = document.getElementById('solicitante');
    const descripcion = document.getElementById('descripcion');
    const btnGuardar = document.getElementById('btnGuardar');
    const headers = { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` };

    function errorCampo(campo, invalido) { campo.classList.toggle('is-invalid', invalido); }
    function escaparHtml(valor) {
      return String(valor).replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' })[char]);
    }

    async function cargarSolicitantes() {
      try {
        const res = await fetch('/api/users/autoticket-solicitantes', { headers });
        if (res.status === 401 || res.status === 403) {
          window.mostrarToast('No tienes permiso para registrar autotickets.', 'danger');
          setTimeout(() => window.location.replace('/'), 1200);
          return;
        }
        const data = await res.json();
        if (!res.ok) throw new Error(data.mensaje || 'No se pudo cargar la lista de personas.');
        solicitante.innerHTML = '<option value="">Selecciona una persona...</option>' + data.usuarios.map(u =>
          `<option value="${u._id}">${escaparHtml(u.nombre || u.correo)}</option>`
        ).join('');
      } catch (error) {
        solicitante.innerHTML = '<option value="">No fue posible cargar las personas</option>';
        window.mostrarToast(error.message, 'danger');
      }
    }

    document.getElementById('btnLimpiar').addEventListener('click', () => {
      solicitante.value = '';
      descripcion.value = '';
      errorCampo(solicitante, false);
      errorCampo(descripcion, false);
    });

    btnGuardar.addEventListener('click', async () => {
      const solicitanteId = solicitante.value;
      const problema = descripcion.value.trim();
      errorCampo(solicitante, !solicitanteId);
      errorCampo(descripcion, !problema);
      if (!solicitanteId || !problema) return;

      try {
        btnGuardar.disabled = true;
        btnGuardar.textContent = 'Registrando...';
        const res = await fetch('/api/tickets/autoticket', { method: 'POST', headers, body: JSON.stringify({ solicitanteId, descripcion: problema }) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'No se pudo registrar el autoticket.');
        window.mostrarToast(data.mensaje, 'success');
        solicitante.value = '';
        descripcion.value = '';
      } catch (error) {
        window.mostrarToast(error.message, 'danger');
      } finally {
        btnGuardar.disabled = false;
        btnGuardar.textContent = 'Registrar autoticket resuelto';
      }
    });
    cargarSolicitantes();
  </script>
</body>
</html>
