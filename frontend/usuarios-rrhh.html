<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Usuarios - RR.HH.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .acciones-contacto {
      display: grid;
      gap: 0.35rem;
      min-width: 98px;
    }

    .saldo-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border: 1px solid #dee2e6;
      border-radius: 0.375rem;
      overflow: hidden;
    }

    .saldo-col {
      min-width: 0;
    }

    .saldo-col + .saldo-col {
      border-left: 1px solid #dee2e6;
    }

    .saldo-col__header {
      background: #050505;
      color: #fff;
      font-weight: 700;
      padding: 0.55rem 0.75rem;
    }

    .saldo-col__body {
      padding: 0.75rem;
      background: #fff;
    }

    @media (max-width: 576px) {
      .saldo-grid {
        grid-template-columns: 1fr;
      }

      .saldo-col + .saldo-col {
        border-left: 0;
        border-top: 1px solid #dee2e6;
      }
    }
  </style>
</head>
<body class="bg-light">
  <div id="navbar-container"></div>
  <div class="container mt-4">
    <h4 class="mb-3"><i class="fa-solid fa-users me-2 text-primary" aria-hidden="true"></i>Gestión de Vacaciones por Usuario</h4>

    <div class="mb-3">
      <input type="text" id="filtroUsuarios" class="form-control" placeholder="Buscar por nombre, puesto o departamento..." aria-label="Buscar por nombre, puesto o departamento" />
    </div>

    <table class="table table-bordered table-sm">
      <thead class="table-dark">
        <tr>
          <th>Nombre</th>
          <th>Rol</th>
          <th>Fecha de Ingreso</th>
          <th>Días por aniversario</th>
          <th>Prestacion por aniversario</th>
          <th>Puesto</th>
          <th>Departamento</th>
          <th>Actualizar</th>
          <th>Contacto</th>
        </tr>
      </thead>
      <tbody id="tabla-usuarios"></tbody>
    </table>
  </div>

  <div class="modal fade" id="modalEditarDias" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Editar saldos de vacaciones</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="dias-user-id">
          <p class="fw-semibold mb-3" id="dias-usuario-nombre"></p>
          <div class="saldo-grid">
            <div class="saldo-col">
              <div class="saldo-col__header">Dias Disponibles</div>
              <div class="saldo-col__body">
                <input type="number" class="form-control" id="editor-dias-disponibles" min="0" step="1">
              </div>
            </div>
            <div class="saldo-col">
              <div class="saldo-col__header">Dias de Prestacion</div>
              <div class="saldo-col__body">
                <input type="number" class="form-control" id="editor-dias-prestacion" min="0" step="1">
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btnGuardarDias" onclick="guardarDiasUsuario()">Guardar dias</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalContacto" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Datos de contacto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="contacto-user-id">
          <div class="mb-3">
            <label class="form-label" for="contacto-nombre">Nombre</label>
            <input type="text" class="form-control" id="contacto-nombre">
          </div>
          <div class="mb-3">
            <label class="form-label" for="contacto-correo">Correo electronico</label>
            <input type="email" class="form-control" id="contacto-correo" placeholder="usuario@bateil.edu.mx">
          </div>
          <div class="mb-0">
            <label class="form-label" for="contacto-whatsapp">WhatsApp</label>
            <input type="tel" class="form-control" id="contacto-whatsapp" placeholder="521...">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btnGuardarContacto" onclick="guardarContacto()">Guardar contacto</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("token");
    const usuariosPorId = {};
    let modalContacto = null;
    let modalEditarDias = null;

    function escapeHtml(valor) {
      return String(valor ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function cargarUsuarios() {
      const contenedor = document.getElementById("tabla-usuarios");
      contenedor.innerHTML = "";

      try {
        const res = await fetch("/api/users", {
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await res.json();

        data.forEach((u) => {
          usuariosPorId[u._id] = u;
          const departamentoActual = String(u.departamento || "").trim().toLowerCase();
          const fila = document.createElement("tr");
          fila.innerHTML = `
            <td>
              <input type="text" class="form-control form-control-sm" id="nombre-${u._id}" value="${escapeHtml(u.nombre)}">
            </td>
            <td>${escapeHtml(u.roles?.[0])}</td>
            <td>
              <input type="date" class="form-control form-control-sm" id="fecha-${u._id}" value="${u.fechaIngreso ? new Date(u.fechaIngreso).toISOString().split("T")[0] : ""}">
            </td>
            <td>
              <input type="number" class="form-control form-control-sm" id="dias-${u._id}" value="${u.diasVacacionesAnuales ?? u.diasVacacionesDisponibles ?? 22}">
            </td>
            <td>
              <input type="number" class="form-control form-control-sm" id="prestacion-${u._id}" value="${u.diasVacacionesPrestacionAnuales ?? u.diasVacacionesPrestacion ?? 0}">
            </td>
            <td>
              <input type="text" class="form-control form-control-sm" id="puesto-${u._id}" value="${escapeHtml(u.puesto)}">
            </td>
            <td>
              <select class="form-select form-select-sm" id="depto-${u._id}">
                <option value="administrativo" ${departamentoActual === "administrativo" ? "selected" : ""}>administrativo</option>
                <option value="academico" ${departamentoActual === "academico" ? "selected" : ""}>academico</option>
              </select>
            </td>
            <td>
              <button class="btn btn-sm btn-primary" onclick="actualizar('${u._id}')"><i class="fa-solid fa-floppy-disk me-1" aria-hidden="true"></i>Guardar</button>
            </td>
            <td>
              <div class="acciones-contacto">
                <button class="btn btn-sm btn-outline-secondary" onclick="abrirContacto('${u._id}')">Contacto</button>
                <button class="btn btn-sm btn-warning" onclick="abrirEditorDias('${u._id}')">Editar</button>
              </div>
            </td>
          `;
          contenedor.appendChild(fila);
        });

      } catch (err) {
        alert("Error al cargar usuarios.");
      }
    }

    async function actualizar(id) {
      const nombre = document.getElementById(`nombre-${id}`).value.trim();
      const fecha = document.getElementById(`fecha-${id}`).value;
      const dias = document.getElementById(`dias-${id}`).value;
      const diasPrestacion = document.getElementById(`prestacion-${id}`).value;
      const puesto = document.getElementById(`puesto-${id}`).value;
      const departamento = document.getElementById(`depto-${id}`).value;

      if (!nombre) {
        alert("El nombre no puede quedar vacio.");
        return;
      }

      try {
        const res = await fetch(`/api/users/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({
            nombre,
            fechaIngreso: fecha,
            diasVacacionesAnuales: Number(dias),
            diasVacacionesPrestacionAnuales: Number(diasPrestacion),
            puesto,
            departamento,
          }),
        });

        const result = await res.json();
        if (res.ok) {
          usuariosPorId[id] = {
            ...usuariosPorId[id],
            nombre,
            fechaIngreso: fecha,
            diasVacacionesAnuales: Number(dias),
            diasVacacionesPrestacionAnuales: Number(diasPrestacion),
            puesto,
            departamento,
          };
          alert("Usuario actualizado.");
        } else {
          alert("Error: " + result.mensaje);
        }
      } catch (err) {
        alert("Error de red.");
      }
    }

    function abrirContacto(id) {
      const usuario = usuariosPorId[id];
      if (!usuario) return;

      document.getElementById("contacto-user-id").value = id;
      document.getElementById("contacto-nombre").value = usuario.nombre || "";
      document.getElementById("contacto-correo").value = usuario.correo || "";
      document.getElementById("contacto-whatsapp").value = usuario.telefonoWhatsapp || "";

      modalContacto ||= new bootstrap.Modal(document.getElementById("modalContacto"));
      modalContacto.show();
    }

    function abrirEditorDias(id) {
      const usuario = usuariosPorId[id];
      if (!usuario) return;

      document.getElementById("dias-user-id").value = id;
      document.getElementById("dias-usuario-nombre").textContent = usuario.nombre || "";
      document.getElementById("editor-dias-disponibles").value = usuario.diasVacacionesDisponibles ?? 0;
      document.getElementById("editor-dias-prestacion").value = usuario.diasVacacionesPrestacion ?? 0;

      modalEditarDias ||= new bootstrap.Modal(document.getElementById("modalEditarDias"));
      modalEditarDias.show();
    }

    async function guardarDiasUsuario() {
      const id = document.getElementById("dias-user-id").value;
      const diasDisponibles = Number(document.getElementById("editor-dias-disponibles").value || 0);
      const diasVacacionesPrestacion = Number(document.getElementById("editor-dias-prestacion").value || 0);
      const boton = document.getElementById("btnGuardarDias");

      if (diasDisponibles < 0 || diasVacacionesPrestacion < 0) {
        alert("Los dias no pueden ser negativos.");
        return;
      }

      boton.disabled = true;
      try {
        const res = await fetch(`/api/users/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({
            diasVacacionesDisponibles: diasDisponibles,
            diasVacacionesPrestacion,
          }),
        });
        const data = await res.json();

        if (!res.ok) {
          alert(data.mensaje || "Error al actualizar dias");
          return;
        }

        usuariosPorId[id] = {
          ...usuariosPorId[id],
          diasVacacionesDisponibles: diasDisponibles,
          diasVacacionesPrestacion,
        };

        modalEditarDias?.hide();
        alert(data.mensaje || "Dias actualizados correctamente");
      } catch (err) {
        alert("Error de red");
      } finally {
        boton.disabled = false;
      }
    }

    async function guardarContacto() {
      const id = document.getElementById("contacto-user-id").value;
      const nombre = document.getElementById("contacto-nombre").value.trim();
      const correo = document.getElementById("contacto-correo").value.trim();
      const telefonoWhatsapp = document.getElementById("contacto-whatsapp").value.trim();
      const boton = document.getElementById("btnGuardarContacto");

      if (!nombre) {
        alert("Escribe el nombre del usuario");
        return;
      }

      boton.disabled = true;
      try {
        const res = await fetch(`/api/users/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ nombre, correo, telefonoWhatsapp })
        });
        const data = await res.json();

        if (!res.ok) {
          alert(data.mensaje || "Error al actualizar contacto");
          return;
        }

        modalContacto?.hide();
        await cargarUsuarios();
        alert(data.mensaje || "Contacto actualizado correctamente");
      } catch (err) {
        alert("Error de red");
      } finally {
        boton.disabled = false;
      }
    }

    document.getElementById("filtroUsuarios").addEventListener("input", function () {
      const filtro = this.value.toLowerCase();
      const filas = document.querySelectorAll("#tabla-usuarios tr");

      filas.forEach((fila) => {
        const valores = Array.from(fila.querySelectorAll("input, select"))
          .map((campo) => campo.value)
          .join(" ");
        const texto = `${fila.innerText} ${valores}`.toLowerCase();
        fila.style.display = texto.includes(filtro) ? "" : "none";
      });
    });

    cargarUsuarios();
  </script>
  <script src="js/navbar.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
