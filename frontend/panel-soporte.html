<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Trabajo - Soporte & Mantenimiento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/toasts.css" rel="stylesheet" />
  <style>
    :root{
      --panel-bg:#f5f7fb;
      --card-shadow:0 10px 30px rgba(15,23,42,.08);
      --soft-border:1px solid rgba(15,23,42,.08);
    }

    body { background:var(--panel-bg) !important; }

    .filters-wrap,
    .toolbar-wrap,
    .summary-wrap,
    .ticket-card {
      background:#fff;
      border-radius:18px;
      box-shadow:var(--card-shadow);
      border:var(--soft-border);
    }

    .filters-wrap,
    .toolbar-wrap,
    .summary-wrap { padding:16px; }

    .kpi {
      border-radius:16px;
      padding:16px;
      text-align:center;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
      transition:transform .18s ease, box-shadow .18s ease, outline-color .18s ease;
      outline:3px solid transparent;
      cursor:pointer;
    }
    .kpi:hover { transform:translateY(-2px); }
    .kpi .label { font-weight:700; opacity:.92; font-size:.92rem; }
    .kpi .value { font-size:2rem; font-weight:800; line-height:1; }
    .kpi-total    { background:#1E73FF; color:#fff; }
    .kpi-proceso  { background:#FFC107; color:#111; }
    .kpi-espera   { background:#747c84; color:#fff; }
    .kpi-resueltos{ background:#03A9F4; color:#fff; }
    .kpi-cerrados { background:#4CAF50; color:#fff; }
    .kpi-excedido { background:#E53935; color:#fff; }

    .ticket-card{
      overflow:hidden;
      height:100%;
      transition:transform .18s ease, box-shadow .18s ease;
    }
    .ticket-card:hover{
      transform:translateY(-3px);
      box-shadow:0 14px 28px rgba(15,23,42,.12);
    }

    .ticket-topbar{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:14px;
    }

    .ticket-title{
      font-size:1.15rem;
      font-weight:800;
      margin:0;
    }

    .ticket-folio{
      font-size:.95rem;
      font-weight:700;
      color:#334155;
    }

    .ticket-status-chip{
      border-radius:999px;
      padding:.45rem .7rem;
      font-size:.8rem;
      font-weight:800;
      display:inline-flex;
      align-items:center;
      white-space:nowrap;
    }

    .status-abierto { background:#fff1db; color:#9a5b00; }
    .status-en-proceso { background:#fff5cc; color:#8a6a00; }
    .status-en-espera-de-material { background:#eceff3; color:#475569; }
    .status-resuelto { background:#e0f2fe; color:#075985; }
    .status-cerrado { background:#dcfce7; color:#166534; }
    .status-tiempo-excedido { background:#fee2e2; color:#b91c1c; }

    .meta-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px 16px;
      margin-bottom:14px;
    }

    .meta-item{
      background:rgba(248,250,252,.9);
      border:1px solid rgba(148,163,184,.2);
      border-radius:12px;
      padding:10px 12px;
      min-height:56px;
    }
    .meta-item .meta-label{
      display:block;
      font-size:.78rem;
      text-transform:uppercase;
      letter-spacing:.04em;
      color:#64748b;
      margin-bottom:3px;
      font-weight:700;
    }
    .meta-item .meta-value{
      font-size:.95rem;
      font-weight:600;
      color:#0f172a;
      word-break:break-word;
    }

    .description-box{
      background:#f8fafc;
      border:1px solid rgba(148,163,184,.2);
      border-radius:12px;
      padding:12px;
      margin-bottom:14px;
      min-height:72px;
      white-space:pre-wrap;
    }

    .section-label{
      font-weight:800;
      font-size:.9rem;
      color:#334155;
      margin-bottom:6px;
    }

    .action-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:8px;
    }

    .ticket-action-btn{
      background:#ffc107 !important;
      border-color:#ffc107 !important;
      color:#000 !important;
      font-weight:700;
    }
    .ticket-action-btn:hover,
    .ticket-action-btn:focus{
      background:#e0a800 !important;
      border-color:#d39e00 !important;
      color:#000 !important;
    }

    .small-muted{
      color:#64748b;
      font-size:.88rem;
    }

    .loading-box{
      background:#fff;
      border-radius:18px;
      border:2px dashed rgba(148,163,184,.35);
      padding:30px;
      text-align:center;
      color:#64748b;
    }

    @media (max-width: 767.98px) {
      .meta-grid, .action-grid { grid-template-columns:1fr; }
      .ticket-topbar{ flex-direction:column; }
    }
  </style>
</head>
<body class="bg-light">

  <!-- NAVBAR -->
  <div id="navbar-container"></div>

  <div class="container py-4">
    <h2 class="text-center mb-2"><i class="fa-solid fa-headset me-2 text-primary" aria-hidden="true"></i>Panel de Trabajo</h2>

    <!-- Conmutador de panel visible (se muestra solo si el usuario puede ver ambos) -->
    <div id="panel-switch" class="d-flex justify-content-center gap-2 mb-4 d-none">
      <button id="btn-soporte" class="btn btn-outline-primary btn-sm">Soporte</button>
      <button id="btn-mantenimiento" class="btn btn-outline-primary btn-sm">Mantenimiento</button>
    </div>

    <!-- ======== PANEL SOPORTE (Sistemas) ======== -->
    <section id="sec-soporte" class="mb-5">
      <h4 class="mb-3"><i class="fa-solid fa-laptop-code me-2 text-primary" aria-hidden="true"></i>Soporte (Sistemas)</h4>

      <!-- Filtros -->
      <div class="filters-wrap mb-4">
      <div class="row g-3 align-items-end">
        <div class="col-md-3">
          <label class="form-label">Filtrar por estatus</label>
          <select id="filtroS-estatus" class="form-select">
            <option value="">Todos los estados</option>
            <option>En proceso</option>
            <option>En espera de material</option>
            <option>Resuelto</option>
            <option>Tiempo excedido</option>
            <option>Cerrado</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Buscar ticket</label>
          <input id="filtroS-busqueda" type="text" class="form-control" placeholder="Buscar por descripcion o solicitante...">
        </div>
        <div class="col-md-2">
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="filtroS-mios">
            <label class="form-check-label" for="filtroS-mios">
              Solo asignados a mi
            </label>
          </div>
        </div>
      </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-6 col-md-2">
          <div class="kpi kpi-total kpiS-filter" data-estado="">
            <div class="label">Total</div>
            <div id="kpiS-total" class="value">0</div>
          </div>
        </div>
        <div class="col-6 col-md-2">
          <div class="kpi kpi-proceso kpiS-filter" data-estado="En proceso">
            <div class="label">En proceso</div>
            <div id="kpiS-proceso" class="value">0</div>
          </div>
        </div>
        <!-- KPI: En espera -->
        <div class="col-6 col-md-2">
          <div class="kpi kpi-espera kpiS-filter" data-estado="En espera de material">
            <div class="label">En espera</div>
            <div id="kpiS-espera" class="value">0</div>
          </div>
        </div>
        <div class="col-6 col-md-2">
          <!-- Azul cielo con texto blanco -->
          <div class="kpi kpi-resueltos kpiS-filter" data-estado="Resuelto">
            <div class="label">Resueltos</div>
            <div id="kpiS-resueltos" class="value">0</div>
          </div>
        </div>
        <!-- Rojo con texto blanco -->
        <div class="col-6 col-md-2">
          <div class="kpi kpi-excedido kpiS-filter" data-estado="Tiempo excedido">
            <div class="label">Excedido</div>
            <div id="kpiS-excedido" class="value">0</div>
          </div>
        </div>
        <div class="col-6 col-md-2">
          <div class="kpi kpi-cerrados kpiS-filter" data-estado="Cerrado">
            <div class="label">Cerrados</div>
            <div id="kpiS-cerrados" class="value">0</div>
          </div>
        </div>
      </div>

      <div id="tickets-soporte" class="row g-3"></div>
    </section>

    <hr>

    <!-- ======== PANEL MANTENIMIENTO (General) ======== -->
    <section id="sec-mantenimiento" class="mt-5">
      <h4 class="mb-3"><i class="fa-solid fa-screwdriver-wrench me-2 text-warning" aria-hidden="true"></i>Mantenimiento (General)</h4>

      <!-- Filtros -->
      <div class="filters-wrap mb-4">
      <div class="row g-3 align-items-end">
        <div class="col-md-3">
          <label class="form-label">Filtrar por estatus</label>
          <select id="filtroM-estatus" class="form-select">
            <option value="">Todos los estados</option>
            <option>En proceso</option>
            <option>En espera de material</option>
            <option>Resuelto</option>
            <option>Tiempo excedido</option>
            <option>Cerrado</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Buscar ticket</label>
          <input id="filtroM-busqueda" type="text" class="form-control" placeholder="Buscar por descripcion o solicitante...">
        </div>
        <div class="col-md-2">
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="filtroM-mios">
            <label class="form-check-label" for="filtroM-mios">
              Solo asignados a mi
            </label>
          </div>
        </div>
      </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-6 col-md-2">
          <div class="kpi kpi-total kpiM-filter" data-estado="">
            <div class="label">Total</div>
            <div id="kpiM-total" class="value">0</div>
          </div>
        </div>
        <div class="col-6 col-md-2">
          <div class="kpi kpi-proceso kpiM-filter" data-estado="En proceso">
            <div class="label">En proceso</div>
            <div id="kpiM-proceso" class="value">0</div>
          </div>
        </div>
        <!-- KPI: En espera -->
        <div class="col-6 col-md-2">
          <div class="kpi kpi-espera kpiM-filter" data-estado="En espera de material">
            <div class="label">En espera</div>
            <div id="kpiM-espera" class="value">0</div>
          </div>
        </div>
        <div class="col-6 col-md-2">
          <div class="kpi kpi-resueltos kpiM-filter" data-estado="Resuelto">
            <div class="label">Resueltos</div>
            <div id="kpiM-resueltos" class="value">0</div>
          </div>
        </div>
        <!-- Rojo con texto blanco -->
        <div class="col-6 col-md-2">
          <div class="kpi kpi-excedido kpiM-filter" data-estado="Tiempo excedido">
            <div class="label">Excedido</div>
            <div id="kpiM-excedido" class="value">0</div>
          </div>
        </div>
        <div class="col-6 col-md-2">
          <div class="kpi kpi-cerrados kpiM-filter" data-estado="Cerrado">
            <div class="label">Cerrados</div>
            <div id="kpiM-cerrados" class="value">0</div>
          </div>
        </div>
      </div>

      <div id="tickets-mantenimiento" class="row g-3"></div>
    </section>
  </div>

  <!-- ========== MODAL COMENTARIOS (ya con listado) ========== -->
  <div class="modal fade" id="modalComentarios" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="comentarios-titulo">Comentarios</h5>
          <button class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div class="table-responsive">
            <table class="table table-sm table-bordered">
              <thead class="table-light">
                <tr>
                  <th style="width:180px">Fecha</th>
                  <th style="width:220px">Usuario</th>
                  <th>Comentario</th>
                </tr>
              </thead>
              <tbody id="comentarios-tbody">
                <tr><td colspan="3" class="text-center text-muted">Sin comentarios.</td></tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/toasts.js"></script>
  <script>
    // ================== CONFIG BASE ==================
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "login.html";

    // Roles / permisos
    function rolesActuales() {
      try {
        const u = JSON.parse(localStorage.getItem('usuario') || '{}');
        let r = Array.isArray(u.roles) ? u.roles : (u.rol ? [u.rol] : []);
        if (!r.length) {
          const t = localStorage.getItem('token');
          if (t && t.split('.').length === 3) {
            const p = JSON.parse(atob(t.split('.')[1]));
            r = Array.isArray(p.roles) ? p.roles : (p.rol ? [p.rol] : []);
          }
        }
        return r.filter(Boolean).map(x => String(x).trim().toLowerCase());
      } catch { return []; }
    }
    function esAdminActual() { return rolesActuales().includes('admin'); }

    // Obtener el ID del usuario actual
    function idUsuarioActual() {
      try {
        const u = JSON.parse(localStorage.getItem('usuario') || '{}');
        if (u._id) return String(u._id);
        const t = localStorage.getItem('token');
        if (t && t.split('.').length === 3) {
          const p = JSON.parse(atob(t.split('.')[1]));
          if (p.id || p._id || p.uid) return String(p.id || p._id || p.uid);
        }
      } catch {}
      return null;
    }
    const USUARIO_ID = idUsuarioActual();

    // Visibilidad de paneles + persistencia
    const PANEL_KEY = 'panel_visible'; // 'S' | 'M'
    function setPanelVisible(pref){
      const secS = document.getElementById('sec-soporte');
      const secM = document.getElementById('sec-mantenimiento');
      if (pref === 'S') { secS.classList.remove('d-none'); secM.classList.add('d-none'); }
      else              { secM.classList.remove('d-none'); secS.classList.add('d-none'); }
      localStorage.setItem(PANEL_KEY, pref);
      document.getElementById('btn-soporte')?.classList.toggle('btn-primary', pref==='S');
      document.getElementById('btn-soporte')?.classList.toggle('btn-outline-primary', pref!=='S');
      document.getElementById('btn-mantenimiento')?.classList.toggle('btn-primary', pref==='M');
      document.getElementById('btn-mantenimiento')?.classList.toggle('btn-outline-primary', pref!=='M');
    }

    function ajustarPanelesPorRol() {
      const roles = rolesActuales();
      const esAdmin = roles.includes('admin');
      const tieneS = roles.includes('soporte');
      const tieneM = roles.includes('mantenimiento');
      const secS = document.getElementById('sec-soporte');
      const secM = document.getElementById('sec-mantenimiento');
      const switcher = document.getElementById('panel-switch');

      if (esAdmin || (tieneS && tieneM)) {
        switcher.classList.remove('d-none');
        const pref = localStorage.getItem(PANEL_KEY) || 'S';
        setPanelVisible(pref);
      } else if (tieneS) {
        secM.classList.add('d-none'); secS.classList.remove('d-none');
        localStorage.setItem(PANEL_KEY, 'S');
      } else if (tieneM) {
        secS.classList.add('d-none'); secM.classList.remove('d-none');
        localStorage.setItem(PANEL_KEY, 'M');
      } else {
        secS.classList.add('d-none'); secM.classList.add('d-none');
      }

      document.getElementById('btn-soporte')?.addEventListener('click', ()=> setPanelVisible('S'));
      document.getElementById('btn-mantenimiento')?.addEventListener('click', ()=> setPanelVisible('M'));
    }
    ajustarPanelesPorRol();

    // ================== KPI helpers ==================
    function calcKPIs(tickets){
      const by = s => tickets.filter(t => esMismoEstatus(t.estatus, s)).length;

      const total     = tickets.length;
      const abiertos  = by("Abierto");
      const proceso   = by("En proceso");
      const espera    = by("En espera de material");
      const resueltos = by("Resuelto");
      const excedido  = tickets.filter(t => esTicketExcedido(t)).length;
      const cerrados  = by("Cerrado");

      return { total, abiertos, proceso, espera, resueltos, cerrados, excedido };
    }


    function renderKPIs(kpi, prefijo){
      document.getElementById(`${prefijo}-total`).textContent     = kpi.total;
      document.getElementById(`${prefijo}-proceso`).textContent   = kpi.proceso;
      const esperaEl = document.getElementById(`${prefijo}-espera`);
      const exc = document.getElementById(`${prefijo}-excedido`);
      if (exc) exc.textContent = kpi.excedido || 0;
      if (esperaEl) esperaEl.textContent = kpi.espera;
      document.getElementById(`${prefijo}-resueltos`).textContent = kpi.resueltos;
      document.getElementById(`${prefijo}-cerrados`).textContent  = kpi.cerrados;
    }

    // ----------- Ubicacion dinamica y badges -----------
    function textoUbicacion(t){
      const tipo = (t.tipo || '').toLowerCase();
      const subtipo = (t.subtipo || '').toLowerCase();
      if (tipo === 'sistemas') {
        if (subtipo === 'laboratorio') {
          const eq = t.equipo ? ` - Equipo: ${t.equipo}` : '';
          return `Laboratorio: ${t.laboratorio || '-'}${eq}`;
        }
        return `Ubicacion: ${t.ubicacion || '-'}`;
      }
      if (tipo === 'mantenimiento') {
        return `Salon/Area: ${t.salon || '-'}`;
      }
      return '';
    }
    function badgeEstatus(estatus){
      const cls = `status-${String(estatus || '').toLowerCase().replace(/[^a-z0-9]+/g, '-')}`;
      return `<span class="ticket-status-chip ${cls}">${estatus || 'Sin estatus'}</span>`;
    }

    // ================== formateador de fechas ==================
    function fmtFecha(dt){
      if(!dt) return '-';
      const d = new Date(dt);
      const pad = n => String(n).padStart(2,'0');
      return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    // ================== Render de tarjetas ==================
function renderTarjetas(tickets, contId){
  const c = document.getElementById(contId);
  c.innerHTML = "";
  const admin = esAdminActual();

  if (!tickets.length) {
    c.innerHTML = `
      <div class="col-12">
        <div class="loading-box">No hay tickets con los filtros seleccionados.</div>
      </div>`;
    return;
  }

  tickets.forEach(t => {
    const esC = t.estatus === "Cerrado";

    const ops = admin
      ? ["En proceso","En espera de material","Resuelto","Cerrado"]
      : ["En proceso","En espera de material","Resuelto"];

    const enEspera = t.estatus === 'En espera de material';
    const tieneMaterial = !!(t.requiereMaterial && t.requiereMaterial.trim());

    c.innerHTML += `
      <div class="col-md-6">
        <div class="ticket-card">
          <div class="card-body p-3 p-lg-4">
            <div class="ticket-topbar">
              <div>
                <div class="ticket-folio">${t.folio || '—'}</div>
                <h5 class="ticket-title">Área: ${t.tipo || '—'}</h5>
                <div class="small-muted">${textoUbicacion(t) || 'Sin ubicación especificada'}</div>
              </div>
              <div class="d-flex flex-column gap-2 align-items-end">
                ${badgeEstatus(t.estatus)}
                <span class="badge ${
                  (t.prioridad==='Alta') ? 'bg-danger' :
                  (t.prioridad==='Media') ? 'bg-warning text-dark' :
                  (t.prioridad==='Baja')  ? 'bg-primary' : 'bg-secondary'
                }">${t.prioridad || 'Sin prioridad'}</span>
              </div>
            </div>

            <div class="meta-grid">
              <div class="meta-item">
                <span class="meta-label">Solicitado</span>
                <div class="meta-value">${fmtFecha(t.fechaCreacion || t.createdAt)}</div>
              </div>
              <div class="meta-item">
                <span class="meta-label">Inicio</span>
                <div class="meta-value">${fmtFecha(t.fechaInicio)}</div>
              </div>
              <div class="meta-item">
                <span class="meta-label">Finalización</span>
                <div class="meta-value">${fmtFecha(t.fechaCierre)}</div>
              </div>
              <div class="meta-item">
                <span class="meta-label">Creado por</span>
                <div class="meta-value">${t.creadoPor?.nombre || '—'}</div>
              </div>
              <div class="meta-item">
                <span class="meta-label">Asignado a</span>
                <div class="meta-value">${t.asignadoA?.nombre || 'Sin asignar'}</div>
              </div>
              <div class="meta-item">
                <span class="meta-label">Material</span>
                <div class="meta-value">${t.requiereMaterial || 'Ninguno'}</div>
              </div>
            </div>

            <div class="description-box">
              <div class="section-label">Descripción detallada</div>
              <div>${t.descripcion || 'Sin descripción'}</div>
            </div>

            <div class="row g-2 align-items-start mb-3">
              <div class="col-12 col-md-6">
                <label class="form-label">Estatus:</label>
                <select class="form-select"
                        id="estatus-${t._id}"
                        onchange="onChangeEstatus('${t._id}')"
                        ${esC ? "disabled" : ""}>
                  ${ops.map(o => `<option ${t.estatus===o?"selected":""}>${o}</option>`).join("")}
                </select>
              </div>

              <div class="col-12 col-md-6">
                <div id="wrap-material-edit-${t._id}" class="${enEspera ? '' : 'd-none'}">
                  <label class="form-label">Requiere material:</label>
                  <textarea class="form-control"
                            id="material-${t._id}"
                            placeholder="Material requerido"
                            rows="1"
                            ${enEspera ? '' : 'disabled'}>${t.requiereMaterial || ''}</textarea>
                  <div class="form-text">Editable únicamente cuando el estatus está en espera.</div>
                </div>

                <div id="wrap-material-read-${t._id}" class="${(!enEspera && tieneMaterial) ? '' : 'd-none'}">
                  <label class="form-label">Material requerido (histórico):</label>
                  <div class="form-control" style="min-height: 38px; white-space:pre-wrap;" aria-readonly="true">
                    ${t.requiereMaterial || ''}
                  </div>
                </div>
              </div>
            </div>

            <label class="form-label">Resolución del problema:</label>
            <textarea class="form-control mb-3" id="resolucion-${t._id}" rows="2" placeholder="Describe cómo se resolvió" ${esC ? "disabled" : ""}>${t.resolucion || ''}</textarea>

            <label class="form-label">Comentario interno:</label>
            <textarea class="form-control mb-3"
                      id="comentario-${t._id}"
                      rows="2"
                      placeholder="Agrega notas internas, avances, etc."></textarea>

            <div class="mb-3">
              <label class="form-label">Evidencia del trabajo realizado (foto):</label>
              <input type="file"
                     class="form-control"
                     id="file-evidencia-${t._id}"
                     accept="image/*"
                     ${esC ? 'disabled' : ''}>
              <div class="form-text">Sube imágenes JPG, PNG, etc. (se guardan en la carpeta del ticket en Drive).</div>
            </div>

            <div class="action-grid">
              <button class="btn ticket-action-btn"
                      onclick="actualizarTicket('${t._id}')"
                      ${esC ? "disabled" : ""}>Guardar cambios</button>

              ${ (t.estatus === 'En espera de material' && !esC)
                  ? `<button class="btn ticket-action-btn"
                             onclick="reanudarTicket('${t._id}')">Reanudar</button>`
                  : '' }

              <button class="btn ticket-action-btn"
                      onclick="asignarmeTicket('${t._id}')"
                      ${(esC || t.asignadoA) ? "disabled" : ""}>Asignarme</button>

              <button class="btn ticket-action-btn"
                      onclick="guardarComentario('${t._id}', '${t.folio || ''}', '${t.tipo || ''}')">
                Guardar comentario
              </button>

              <button class="btn ticket-action-btn"
                      onclick="verComentarios('${t._id}', '${t.folio || ''}', '${t.tipo || ''}')">
                Comentarios
              </button>

              <button class="btn ticket-action-btn"
                      onclick="subirEvidencia('${t._id}')"
                      ${esC ? "disabled" : ""}>
                Subir evidencia
              </button>
            </div>
          </div>
        </div>
      </div>`;
  });
}
    // Mostrar/ocultar material segun estatus
    function onChangeEstatus(id){
      const sel  = document.getElementById(`estatus-${id}`);
      const edit = document.getElementById(`wrap-material-edit-${id}`);
      const read = document.getElementById(`wrap-material-read-${id}`);
      const ta   = document.getElementById(`material-${id}`);
      if(!sel || !edit || !read || !ta) return;
      const enEspera = sel.value === 'En espera de material';

      edit.classList.toggle('d-none', !enEspera);
      ta.disabled = !enEspera;

      const tieneMaterial = !!(ta.value && ta.value.trim());
      read.classList.toggle('d-none', enEspera || !tieneMaterial);
    }

    async function reanudarTicket(id){
      const sel = document.getElementById(`estatus-${id}`);
      if (sel) {
        sel.value = 'En proceso';
        onChangeEstatus(id);
      }
      await actualizarTicket(id);
    }

    async function actualizarTicket(id){
      let e   = document.getElementById(`estatus-${id}`)?.value;
      const taM = document.getElementById(`material-${id}`);
      const rs  = document.getElementById(`resolucion-${id}`)?.value || '';

      const m = (e === 'En espera de material' && taM) ? (taM.value || '') : '';

      if ((e === 'Resuelto' || e === 'Cerrado') && !rs.trim()){
        alert('Para marcar como Resuelto o Cerrado, agrega la resolucion del problema.');
        return;
      }
      if (e === 'En espera de material' && (!m || !m.trim())){
        alert('Indica el material requerido para poner el ticket en espera.');
        return;
      }

      const r=await fetch(`/api/tickets/${id}`,{
        method:"PUT",
        headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},
        body:JSON.stringify({estatus:e,requiereMaterial:m,resolucion:rs})
      });
      const d=await r.json().catch(()=>({}));
      if(!r.ok){ alert(d.mensaje||d.error||'No se pudo actualizar el ticket'); return; }

      if (taM) taM.disabled = true;
      cargar();
    }

    async function asignarmeTicket(id){
      const r=await fetch(`/api/tickets/${id}`,{
        method:"PUT",
        headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},
        body:JSON.stringify({asignar:true})
      });
      const d=await r.json();alert(d.mensaje||"Asignado");cargar();
    }

    // ======= NUEVO: guardar comentario interno (usa el mismo array comentariosAdmin) =======
    async function guardarComentario(id, folio='', tipo=''){
      const ta = document.getElementById(`comentario-${id}`);
      if (!ta) return;
      const texto = (ta.value || '').trim();
      if (!texto){
        alert('Escribe un comentario antes de guardar.');
        return;
      }

      try{
        const r = await fetch(`/api/tickets/${id}/comentarios-admin`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ texto })
        });
        const d = await r.json().catch(()=>({}));
        if (!r.ok){
          alert(d.mensaje || d.error || 'No se pudo guardar el comentario');
          return;
        }
        ta.value = '';
        // Abrir/actualizar modal de comentarios con el nuevo registro
        verComentarios(id, folio, tipo);
      }catch(err){
        console.error(err);
        alert('Error al guardar el comentario');
      }
    }

    // ======= Ver comentarios en modal =======
    async function verComentarios(id, folio='', tipo=''){
      try{
        const r = await fetch(`/api/tickets/${id}`, { headers:{Authorization:`Bearer ${token}`} });
        if(!r.ok){ alert('No se pudieron cargar los comentarios'); return; }
        const t = await r.json();
        const rows = (t.comentariosAdmin || [])
          .slice()
          .sort((a,b)=> new Date(a.fecha) - new Date(b.fecha));

        document.getElementById('comentarios-titulo').textContent =
          `Comentarios - ${folio || 'Folio -'} (${tipo || '-'})`;

        const tb = document.getElementById('comentarios-tbody');
        if (!rows.length){
          tb.innerHTML = `<tr><td colspan="3" class="text-center text-muted">Sin comentarios.</td></tr>`;
        } else {
          tb.innerHTML = rows.map(c => `
            <tr>
              <td>${fmtFecha(c.fecha)}</td>
              <td>${c.usuarioNombre || '-'}</td>
              <td style="white-space:pre-wrap">${(c.texto || '').trim()}</td>
            </tr>
          `).join('');
        }

        const el = document.getElementById('modalComentarios');
        (new bootstrap.Modal(el)).show();
      }catch(e){
        console.error(e);
        alert('Error al cargar comentarios');
      }
    }

    // ========= SUBIR EVIDENCIA (foto) A GOOGLE DRIVE =========
async function subirEvidencia(id){
  const input = document.getElementById(`file-evidencia-${id}`);
  if (!input) {
    alert('No se encontro el control de archivo.');
    return;
  }

  if (!input.files || !input.files[0]) {
    alert('Selecciona una imagen antes de subir la evidencia.');
    return;
  }

  const archivo = input.files[0];
  const formData = new FormData();
  formData.append('file', archivo);

  try {
    const resp = await fetch(`/api/tickets/${id}/evidencias`, {
      method: 'POST',
      headers: {
        Authorization: `Bearer ${token}`   // NO pongas Content-Type, fetch lo hace con FormData
      },
      body: formData
    });

    const data = await resp.json().catch(() => ({}));

    if (!resp.ok || data.ok === false) {
      console.error('Error al subir evidencia:', data);
      alert(data.mensaje || data.error || 'No se pudo subir la evidencia.');
      return;
    }

    // Limpia el input
    input.value = '';

    alert('Evidencia subida correctamente.');

    // Opcional: recargar los tickets para reflejar cambios en evidencias/historial
    if (typeof cargar === 'function') {
      cargar();
    }
  } catch (err) {
    console.error('Error de red al subir evidencia:', err);
    alert('Ocurrio un error al subir la evidencia.');
  }
}






    // ================== Carga y memoria de filtros ==================
    let todosTickets = [];
    let kpiGlobal = { S:null, M:null };

    const STORAGE_KEYS = {
      S: { est:'filtroS_estatus', q:'filtroS_busqueda', m:'filtroS_mios' },
      M: { est:'filtroM_estatus', q:'filtroM_busqueda', m:'filtroM_mios' }
    };

    function saveFilters(pref){
      const k = STORAGE_KEYS[pref];
      localStorage.setItem(k.est, document.getElementById(`filtro${pref}-estatus`).value);
      localStorage.setItem(k.q,   document.getElementById(`filtro${pref}-busqueda`).value);
      if (k.m) {
        const chk = document.getElementById(`filtro${pref}-mios`);
        if (chk) localStorage.setItem(k.m, chk.checked ? '1' : '0');
      }
    }
    function loadFilters(pref){
      const k = STORAGE_KEYS[pref];
      const est = localStorage.getItem(k.est) ?? '';
      const q   = localStorage.getItem(k.q)   ?? '';
      document.getElementById(`filtro${pref}-estatus`).value = est;
      document.getElementById(`filtro${pref}-busqueda`).value = q;
      if (k.m) {
        const v = localStorage.getItem(k.m);
        const chk = document.getElementById(`filtro${pref}-mios`);
        if (chk) chk.checked = (v === '1');
      }
    }
    function filtrarLista(pref, base){
      const tipo = pref==="S"?"Sistemas":"Mantenimiento";
      const estado = document.getElementById(`filtro${pref}-estatus`).value.trim();
      const q = document.getElementById(`filtro${pref}-busqueda`).value.toLowerCase();
      const soloMios = document.getElementById(`filtro${pref}-mios`)?.checked;
      return base.filter(t=>{
        if(t.tipo!==tipo) return false;
        if (estado) {
          // Si el filtro es "Tiempo excedido", usamos la logica del ticket excedido
          if (esTiempoExcedido(estado)) {
            if (!esTicketExcedido(t)) return false;
          } else {
            // Para los demas estados, comparacion normal tolerante
            if (!esMismoEstatus(t.estatus, estado)) return false;
          }
        }


        // Solo los tickets asignados al usuario actual
        if (soloMios && USUARIO_ID) {
          const asignado = (t.asignadoA && (t.asignadoA._id || t.asignadoA.id)) || t.asignadoA || '';
          if (String(asignado) !== USUARIO_ID) return false;
        }

        if(q){
          const txt = `${t.descripcion||''} ${t.creadoPor?.nombre||''} ${t.folio||''}`.toLowerCase();
          if (!txt.includes(q)) return false;
        }
        return true;
      }).sort(ordenarTicketsRecientes);
    }

    function ordenarTicketsRecientes(a, b){
      const fechaA = new Date(a.fechaCreacion || a.createdAt || 0).getTime();
      const fechaB = new Date(b.fechaCreacion || b.createdAt || 0).getTime();
      if (fechaA !== fechaB) return fechaB - fechaA;
      return String(b.folio || b._id || '').localeCompare(String(a.folio || a._id || ''));
    }

    function refrescar(){
      const soporte = todosTickets.filter(t=>t.tipo==="Sistemas");
      const mant    = todosTickets.filter(t=>t.tipo==="Mantenimiento");

      kpiGlobal.S = calcKPIs(soporte);
      kpiGlobal.M = calcKPIs(mant);

      loadFilters('S');
      loadFilters('M');

      const listaS = filtrarLista('S', todosTickets);
      const listaM = filtrarLista('M', todosTickets);

      renderKPIs(kpiGlobal.S, 'kpiS');
      renderKPIs(kpiGlobal.M, 'kpiM');

      renderTarjetas(listaS, 'tickets-soporte');
      renderTarjetas(listaM, 'tickets-mantenimiento');
    }

    async function cargar(){
      try {
        const r=await fetch("/api/tickets",{headers:{Authorization:`Bearer ${token}`}});
        const data = await r.json().catch(() => null);

        if(!r.ok){
          const mensaje = data?.mensaje || data?.error || `No se pudieron cargar los tickets. Codigo ${r.status}`;
          console.error('Error /api/tickets', r.status, data);
          mostrarToast(mensaje, r.status === 401 ? 'warning' : 'danger');
          document.getElementById('tickets-soporte').innerHTML = `<div class="col-12"><div class="loading-box">${mensaje}</div></div>`;
          document.getElementById('tickets-mantenimiento').innerHTML = '';
          return;
        }

        todosTickets=(Array.isArray(data) ? data : []).sort(ordenarTicketsRecientes);
        refrescar();
      } catch (error) {
        console.error('Error conectando /api/tickets', error);
        const mensaje = 'No se pudo conectar con el servidor de tickets.';
        mostrarToast(mensaje, 'danger');
        document.getElementById('tickets-soporte').innerHTML = `<div class="col-12"><div class="loading-box">${mensaje}</div></div>`;
        document.getElementById('tickets-mantenimiento').innerHTML = '';
      }
    }

    // CLICK EN TARJETAS KPI PARA FILTRAR (Soporte y Mantenimiento)
    function initKpiClicks() {
      // Soporte (S)
      document.querySelectorAll('.kpiS-filter').forEach(card => {
        card.style.cursor = 'pointer';
        card.addEventListener('click', () => {
          const estado = card.dataset.estado || '';
          const sel = document.getElementById('filtroS-estatus');
          if (!sel) return;
          sel.value = estado;
          saveFilters('S');
          aplicarFiltros('S');
        });
      });

      // Mantenimiento (M)
      document.querySelectorAll('.kpiM-filter').forEach(card => {
        card.style.cursor = 'pointer';
        card.addEventListener('click', () => {
          const estado = card.dataset.estado || '';
          const sel = document.getElementById('filtroM-estatus');
          if (!sel) return;
          sel.value = estado;
          saveFilters('M');
          aplicarFiltros('M');
        });
      });
    }

    // Eventos
    document.getElementById('filtroS-estatus').addEventListener('change', ()=>{ saveFilters('S'); aplicarFiltros('S'); });
    document.getElementById('filtroS-busqueda').addEventListener('input', ()=>{ aplicarFiltrosDebounced('S'); });
    document.getElementById('filtroS-mios').addEventListener('change', ()=>{ saveFilters('S'); aplicarFiltros('S'); });

    document.getElementById('filtroM-estatus').addEventListener('change', ()=>{ saveFilters('M'); aplicarFiltros('M'); });
    document.getElementById('filtroM-busqueda').addEventListener('input', ()=>{ aplicarFiltrosDebounced('M'); });
    document.getElementById('filtroM-mios').addEventListener('change', ()=>{ saveFilters('M'); aplicarFiltros('M'); });

    function aplicarFiltros(pref){ saveFilters(pref); refrescar(); }
    function aplicarFiltrosDebounced(pref){
      clearTimeout(window[`__panel_${pref}_debounce`]);
      window[`__panel_${pref}_debounce`] = setTimeout(() => aplicarFiltros(pref), 250);
    }
    function resetFiltros(pref){
      document.getElementById(`filtro${pref}-estatus`).value = '';
      document.getElementById(`filtro${pref}-busqueda`).value = '';
      const chk = document.getElementById(`filtro${pref}-mios`);
      if (chk) chk.checked = false;
      saveFilters(pref); refrescar();
    }

    // Normaliza cualquier texto de estatus
    function normEstatus(s) {
      return (s || '').toString().trim().toLowerCase();
    }

    // Detecta si es "tiempo excedido" aunque venga escrito diferente
    function esTiempoExcedido(s) {
      const n = normEstatus(s);
      return n === 'tiempo excedido' || n === 'excedido';
    }

    // Compara dos estatus de forma tolerante
    function esMismoEstatus(a, b) {
      if (esTiempoExcedido(a) && esTiempoExcedido(b)) return true;
      return normEstatus(a) === normEstatus(b);
    }
    // Devuelve true si el ticket esta en tiempo excedido
    function esTicketExcedido(t) {
      if (!t) return false;

      // 1) Por texto de estatus
      if (esTiempoExcedido(t.estatus)) return true;

      // 2) Por flags booleanos que pueda mandar el backend
      if (t.tiempoExcedido === true) return true;
      if (t.tiempo_excedido === true) return true;
      if (t.excedido === true) return true;

      return false;
    }

    // Inicializar
    initKpiClicks();
    cargar();
  </script>
