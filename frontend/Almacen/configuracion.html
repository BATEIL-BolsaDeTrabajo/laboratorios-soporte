<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Configuración de Almacén</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div id="navbar-container"></div>
  <main class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <div><h2 class="mb-1"><i class="fa-solid fa-gear me-2 text-primary" aria-hidden="true"></i>Configuración de Almacén</h2><p class="text-muted mb-0">Gestiona las opciones de los formularios de inventario.</p></div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-dark" type="button" onclick="sincronizar()">Sincronizar valores existentes</button>
        <button class="btn btn-primary" type="button" onclick="abrirNuevo()">Agregar valor</button>
      </div>
    </div>
    <section class="card mb-3"><div class="card-body"><div class="row g-3 align-items-end">
      <div class="col-md-5"><label class="form-label" for="tipo">Catálogo</label><select id="tipo" class="form-select">
        <option value="categoria">Categorías de producto</option><option value="unidadMedida">Unidades de medida</option><option value="departamento">Departamentos</option><option value="tipoSalida">Tipos de salida</option>
      </select></div>
      <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="inactivos"><label class="form-check-label" for="inactivos">Mostrar valores desactivados</label></div></div>
    </div></div></section>
    <section class="table-responsive bg-white border rounded-2"><table class="table table-bordered table-hover align-middle mb-0"><thead class="table-light"><tr><th>Nombre</th><th class="text-center">Orden</th><th>Estado</th><th>Actualizado</th><th class="text-end">Acciones</th></tr></thead><tbody id="filas"><tr><td colspan="5" class="text-center text-muted">Cargando...</td></tr></tbody></table></section>
  </main>
  <div class="modal fade" id="modal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><form id="form">
    <div class="modal-header"><h5 class="modal-title" id="titulo">Agregar valor</h5><button class="btn-close" type="button" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><input type="hidden" id="id"><div class="mb-3"><label class="form-label" for="nombre">Nombre</label><input class="form-control" id="nombre" maxlength="100" required></div><div><label class="form-label" for="orden">Orden</label><input class="form-control" id="orden" type="number" min="0" value="0" required></div></div>
    <div class="modal-footer"><button class="btn btn-outline-secondary" type="button" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary" type="submit">Guardar</button></div>
  </form></div></div></div>
  <script src="../js/navbar.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token=localStorage.getItem('token'); if(!token) window.location.href='/login.html';
    const filas=document.getElementById('filas'); let datos=[];
    const esc=(v)=>String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
    async function cargar(){const p=new URLSearchParams({tipo:document.getElementById('tipo').value});if(document.getElementById('inactivos').checked)p.append('incluirInactivos','true');const r=await fetch('/api/almacen/catalogos?'+p,{headers:{Authorization:'Bearer '+token}});if(r.status===401)return window.location.href='/login.html';const d=await r.json().catch(()=>({}));if(!r.ok){filas.innerHTML='<tr><td colspan="5" class="text-center text-danger">No se pudo cargar el catálogo.</td></tr>';return;}datos=d.catalogos||[];filas.innerHTML=datos.length?datos.map(x=>`<tr><td>${esc(x.nombre)}</td><td class="text-center">${x.orden}</td><td><span class="badge ${x.activo?'bg-success':'bg-secondary'}">${x.activo?'Activo':'Inactivo'}</span></td><td>${x.updatedAt?new Date(x.updatedAt).toLocaleString('es-MX'):'-'}</td><td class="text-end"><button class="btn btn-sm btn-outline-dark" onclick="editar('${x._id}')">Editar</button> <button class="btn btn-sm ${x.activo?'btn-outline-danger':'btn-outline-success'}" onclick="estado('${x._id}',${!x.activo})">${x.activo?'Desactivar':'Activar'}</button></td></tr>`).join(''):'<tr><td colspan="5" class="text-center text-muted">No hay valores registrados.</td></tr>';}
    function abrirNuevo(){document.getElementById('form').reset();document.getElementById('id').value='';document.getElementById('orden').value=0;document.getElementById('titulo').textContent='Agregar valor';bootstrap.Modal.getOrCreateInstance(document.getElementById('modal')).show();}
    function editar(id){const x=datos.find(i=>i._id===id);if(!x)return;document.getElementById('id').value=x._id;document.getElementById('nombre').value=x.nombre;document.getElementById('orden').value=x.orden;document.getElementById('titulo').textContent='Editar valor';bootstrap.Modal.getOrCreateInstance(document.getElementById('modal')).show();}
    document.getElementById('form').addEventListener('submit',async e=>{e.preventDefault();const id=document.getElementById('id').value;const body={tipo:document.getElementById('tipo').value,nombre:document.getElementById('nombre').value,orden:Number(document.getElementById('orden').value)};const r=await fetch(id?'/api/almacen/catalogos/'+id:'/api/almacen/catalogos',{method:id?'PUT':'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify(body)});const d=await r.json().catch(()=>({}));if(!r.ok)return alert(d.mensaje||'No se pudo guardar.');bootstrap.Modal.getInstance(document.getElementById('modal')).hide();cargar();});
    async function estado(id,activo){const r=await fetch('/api/almacen/catalogos/'+id+'/estado',{method:'PATCH',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({activo})});const d=await r.json().catch(()=>({}));if(!r.ok)return alert(d.mensaje||'No se pudo actualizar.');cargar();}
    async function sincronizar(){const r=await fetch('/api/almacen/catalogos/sincronizar',{method:'POST',headers:{Authorization:'Bearer '+token}});const d=await r.json().catch(()=>({}));if(!r.ok)return alert(d.mensaje||'No se pudo sincronizar.');alert('Valores nuevos: '+(d.agregados||0));cargar();}
    document.getElementById('tipo').addEventListener('change',cargar);document.getElementById('inactivos').addEventListener('change',cargar);document.addEventListener('DOMContentLoaded',cargar);
  </script>
</body></html>
