<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Salidas - Almacén</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">

  <!-- NAVBAR -->
  <div id="navbar-container"></div>

  <div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2><i class="fa-solid fa-arrow-right-from-bracket me-2 text-danger" aria-hidden="true"></i>Salidas del almacén</h2>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-success" type="button" onclick="exportarSalidas()">Exportar Excel</button>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalSalida" onclick="prepararNuevaSalida()">
          + Registrar salida
        </button>
      </div>
    </div>

    <!-- FILTROS -->
    <div class="card mb-3">
      <div class="card-body">
        <div class="row g-3">

          <div class="col-md-3">
            <label class="form-label">Producto</label>
            <select id="filtroProducto" class="form-select">
              <option value="">Todos</option>
            </select>
          </div>

          <div class="col-md-3">
            <label class="form-label">Persona</label>
            <input type="text" id="filtroPersona" class="form-control">
          </div>

          <div class="col-md-3">
            <label class="form-label">Departamento</label>
            <input type="text" id="filtroDepartamento" class="form-control">
          </div>

          <div class="col-md-3">
            <label class="form-label">Buscar</label>
            <input type="search" id="filtroBusqueda" class="form-control" placeholder="Producto, persona o comentario">
          </div>

          <div class="col-md-2">
            <label class="form-label">Desde</label>
            <input type="date" id="filtroDesde" class="form-control">
          </div>

          <div class="col-md-2">
            <label class="form-label">Hasta</label>
            <input type="date" id="filtroHasta" class="form-control">
          </div>

          <div class="col-md-1 d-flex align-items-end">
            <button class="btn btn-dark w-100" onclick="cargarSalidas()">Filtrar</button>
          </div>

        </div>
      </div>
    </div>

    <!-- TABLA -->
    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle" id="tablaSalidas">
        <thead class="table-light">
          <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Entregado a</th>
            <th>Departamento</th>
            <th>Tipo de salida</th>
            <th>Comentarios</th>
            <th>Fecha</th>
            <th>Realizado por</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="8" class="text-center text-muted">Cargando...</td></tr>
        </tbody>
      </table>
    </div>

    <div id="paginacionSalidas" class="d-flex justify-content-between align-items-center mt-3"></div>

  </div>

  <!-- MODAL SALIDA -->
  <div class="modal fade" id="modalSalida" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">

        <form id="formSalida">
          <div class="modal-header">
            <h5 class="modal-title">Registrar salida</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">

            <div class="mb-3">
              <label class="form-label">Producto</label>
              <select id="salidaProducto" class="form-select" required></select>
            </div>

            <div class="mb-3">
              <label class="form-label">Cantidad</label>
              <input type="number" id="salidaCantidad" min="1" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Entregado a</label>
              <input type="text" id="salidaPersona" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Departamento</label>
              <select id="salidaDepartamento" class="form-select" required>
                <option value="" disabled selected>Cargando departamentos...</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Tipo de salida</label>
              <select id="salidaTipo" class="form-select" required>
                <option value="" disabled selected>Seleccione...</option>
                <option value="Venta">Venta</option>
                <option value="Préstamo">Préstamo</option>
                <option value="Reemplazo">Reemplazo</option>
                <option value="Otro">Otro</option>
              </select>
            </div>

            <div class="mb-3" id="grupoOtroTipo" style="display:none;">
              <label class="form-label">Especificar otro tipo de salida</label>
              <input
                type="text"
                id="salidaTipoOtro"
                class="form-control"
                placeholder="Ej: reparación, intercambio, resguardo..."
              >
            </div>

            <div class="mb-3">
              <label class="form-label">Comentarios</label>
              <textarea id="salidaComentarios" class="form-control"></textarea>
            </div>

          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button class="btn btn-primary" type="submit">Registrar</button>
          </div>
        </form>

      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="../js/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>

    const token = localStorage.getItem("token");
    if (!token) window.location.href = "/login.html";

    const tablaBody = document.querySelector("#tablaSalidas tbody");
    let paginaActual = 1;
    const limitePagina = 25;

    function fmtFecha(dt) {
      const d = new Date(dt);
      const pad = n => String(n).padStart(2, "0");
      return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function toggleOtroTipo() {
      const tipo = document.getElementById("salidaTipo").value;
      const grupo = document.getElementById("grupoOtroTipo");
      const inputOtro = document.getElementById("salidaTipoOtro");

      if (tipo === "Otro") {
        grupo.style.display = "block";
        inputOtro.required = true;
      } else {
        grupo.style.display = "none";
        inputOtro.required = false;
        inputOtro.value = "";
      }
    }

    /** ===========================
     *  Cargar productos
     =========================== */
    async function cargarProductosSelect() {
      const res = await fetch("/api/almacen/productos-select", {
        headers: { "Authorization": "Bearer " + token }
      });

      // 🔐 si no está logueado
      if (res.status === 401) {
        window.location.href = "../login.html";
        return;
      }

      // 🚫 si no tiene permiso (por si acaso)
      if (res.status === 403) {
        alert("No tienes permiso para cargar productos.");
        return;
      }

      const data = await res.json();

      const filtro = document.getElementById("filtroProducto");
      const selectSalida = document.getElementById("salidaProducto");

      filtro.innerHTML = `<option value="">Todos</option>`;
      selectSalida.innerHTML = `<option value="" disabled selected>Seleccione...</option>`;

      (data || []).forEach(p => {
        const stock = (p.stockActual ?? 0);
        const txt = `${p.nombre} (Stock: ${stock})`;

        filtro.innerHTML += `<option value="${p._id}">${txt}</option>`;
        selectSalida.innerHTML += `<option value="${p._id}">${txt}</option>`;
      });
    }

    function llenarSelectCatalogo(selectId, valores) {
      const select = document.getElementById(selectId);
      select.innerHTML = '<option value="" disabled selected>Selecciona...</option>';

      valores.forEach((valor) => {
        const option = document.createElement('option');
        option.value = valor.nombre;
        option.textContent = valor.nombre;
        select.appendChild(option);
      });
    }

    async function cargarCatalogosSalida() {
      const headers = { "Authorization": "Bearer " + token };
      const [departamentosRes, tiposRes] = await Promise.all([
        fetch('/api/almacen/catalogos?tipo=departamento', { headers }),
        fetch('/api/almacen/catalogos?tipo=tipoSalida', { headers })
      ]);

      if (!departamentosRes.ok || !tiposRes.ok) {
        alert('No se pudieron cargar los catálogos de salida.');
        return;
      }

      const [departamentos, tipos] = await Promise.all([departamentosRes.json(), tiposRes.json()]);
      llenarSelectCatalogo('salidaDepartamento', departamentos.catalogos || []);
      llenarSelectCatalogo('salidaTipo', tipos.catalogos || []);
    }

    /** ===========================
     *  Cargar salidas
     =========================== */
    function crearParametrosSalidas(incluirPaginacion = true) {
      const params = new URLSearchParams();

      const p = document.getElementById("filtroProducto").value;
      const pers = document.getElementById("filtroPersona").value;
      const dep = document.getElementById("filtroDepartamento").value;
      const d = document.getElementById("filtroDesde").value;
      const h = document.getElementById("filtroHasta").value;
      const q = document.getElementById("filtroBusqueda").value.trim();

      if (p) params.append("productoId", p);
      if (pers) params.append("entregadoA", pers);
      if (dep) params.append("departamento", dep);
      if (d) params.append("fechaInicio", d);
      if (h) params.append("fechaFin", h);
      if (q) params.append("q", q);
      if (incluirPaginacion) {
        params.append("pagina", paginaActual);
        params.append("limite", limitePagina);
      }

      return params;
    }

    function renderizarPaginacionSalidas(paginacion) {
      const contenedor = document.getElementById("paginacionSalidas");
      if (!paginacion || !paginacion.total) {
        contenedor.innerHTML = "";
        return;
      }

      contenedor.innerHTML = `
        <span class="text-muted small">${paginacion.total} registros</span>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-secondary" type="button" onclick="cambiarPaginaSalidas(-1)" ${paginacion.pagina <= 1 ? "disabled" : ""}>Anterior</button>
          <span class="small">Página ${paginacion.pagina} de ${paginacion.totalPaginas}</span>
          <button class="btn btn-sm btn-outline-secondary" type="button" onclick="cambiarPaginaSalidas(1)" ${paginacion.pagina >= paginacion.totalPaginas ? "disabled" : ""}>Siguiente</button>
        </div>
      `;
    }

    function cambiarPaginaSalidas(delta) {
      paginaActual += delta;
      cargarSalidas(paginaActual);
    }

    async function cargarSalidas(pagina = 1) {
      paginaActual = pagina;
      const params = crearParametrosSalidas();

      const res = await fetch("/api/almacen/salidas?" + params.toString(), {
        headers: { "Authorization": "Bearer " + token }
      });

      if (res.status === 401) return window.location.href = "../login.html";

      const data = await res.json();

      tablaBody.innerHTML = "";

      if (!data.salidas.length) {
        tablaBody.innerHTML =
          `<tr><td colspan="8" class="text-center text-muted">Sin datos.</td></tr>`;
        renderizarPaginacionSalidas(data.paginacion);
        return;
      }

      data.salidas.forEach(s => {
        tablaBody.innerHTML += `
          <tr>
            <td>${s.producto?.nombre || "-"}</td>
            <td>${s.cantidad}</td>
            <td>${s.entregadoA}</td>
            <td>${s.departamento}</td>
            <td>${s.tipoSalida || "-"}</td>
            <td>${s.comentarios || "-"}</td>
            <td>${fmtFecha(s.fecha)}</td>
            <td>${s.realizadoPor?.nombre || "-"}</td>
          </tr>
        `;
      });

      renderizarPaginacionSalidas(data.paginacion);
    }

    async function exportarSalidas() {
      const res = await fetch("/api/almacen/salidas/exportar?" + crearParametrosSalidas(false).toString(), {
        headers: { "Authorization": "Bearer " + token }
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        alert(data.mensaje || "No se pudo exportar el reporte.");
        return;
      }

      const enlace = document.createElement("a");
      enlace.href = URL.createObjectURL(await res.blob());
      enlace.download = "reporte-salidas.xlsx";
      enlace.click();
      URL.revokeObjectURL(enlace.href);
    }

    /** ===========================
     *  Registrar salida
     =========================== */
    function prepararNuevaSalida() {
      document.getElementById("formSalida").reset();
      document.getElementById("grupoOtroTipo").style.display = "none";
      document.getElementById("salidaTipoOtro").required = false;
      document.getElementById("salidaTipoOtro").value = "";
    }

    document.getElementById("formSalida").addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        productoId: document.getElementById("salidaProducto").value,
        cantidad: Number(document.getElementById("salidaCantidad").value),
        entregadoA: document.getElementById("salidaPersona").value,
        departamento: document.getElementById("salidaDepartamento").value,
        tipoSalida: document.getElementById("salidaTipo").value,
        comentarios: document.getElementById("salidaComentarios").value
      };

      const res = await fetch("/api/almacen/salidas", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + token,
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      if (res.status === 401) {
        alert("Tu sesión expiró, inicia sesión nuevamente.");
        window.location.href = "../login.html";
        return;
      }

      const data = await res.json();

      if (res.ok) {
        if (data.alertaBajoStock) {
          alert("Salida registrada. ⚠ El producto quedó en bajo stock.");
        } else {
          alert("Salida registrada.");
        }

        cargarSalidas();
        bootstrap.Modal.getInstance(document.getElementById("modalSalida")).hide();
      } else {
        alert(data.mensaje || "Error al registrar la salida");
      }
    });

    /** ===========================
     *  Inicializar
     =========================== */
    document.getElementById("filtroBusqueda").addEventListener("input", () => cargarSalidas(1));
    document.getElementById("filtroPersona").addEventListener("input", () => cargarSalidas(1));
    document.getElementById("filtroDepartamento").addEventListener("input", () => cargarSalidas(1));
    document.getElementById("filtroProducto").addEventListener("change", () => cargarSalidas(1));

    document.addEventListener("DOMContentLoaded", () => {
      cargarProductosSelect();
      cargarCatalogosSalida();
      cargarSalidas();
    });

  </script>

</body>
</html>
