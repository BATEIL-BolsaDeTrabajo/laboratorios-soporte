<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catalogo Productos - Almacén</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    .tabla-scroll {
      max-height: calc(100vh - 320px);
      overflow: auto;
      border: 1px solid rgba(0,0,0,.125);
      border-radius: .5rem;
      background: #fff;
    }

    .tabla-scroll thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f8f9fa;
    }

    #modalProducto .modal-dialog {
      margin: 5.5rem auto 1.75rem;
    }

    @media (max-width: 575.98px) {
      #modalProducto .modal-dialog {
        margin-top: 4.5rem;
      }
    }
  </style>
</head>

<body class="bg-light">

  <div id="navbar-container"></div>

  <div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2><i class="fa-solid fa-boxes-stacked me-2 text-primary" aria-hidden="true"></i>Catálogo</h2>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-success" type="button" onclick="exportarProductos()">Exportar Excel</button>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalProducto" onclick="nuevoProducto()">
          + Nuevo Producto
        </button>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-3">
            <input type="text" id="filtroNombre" class="form-control" placeholder="Buscar por nombre...">
          </div>

          <div class="col-md-3">
            <input type="search" id="filtroBusqueda" class="form-control" placeholder="Buscar en catálogo...">
          </div>

          <div class="col-md-2">
            <input type="text" id="filtroCategoria" class="form-control" placeholder="Categoría...">
          </div>

          <div class="col-md-2">
            <select id="filtroEstado" class="form-select">
              <option value="">Todos</option>
              <option value="activo">Activos</option>
              <option value="inactivo">Inactivos</option>
            </select>
          </div>

          <div class="col-md-2">
            <label for="filtroFechaInicio" class="form-label mb-1">Fecha inicial</label>
            <input type="date" id="filtroFechaInicio" class="form-control">
          </div>

          <div class="col-md-2">
            <label for="filtroFechaFin" class="form-label mb-1">Fecha final</label>
            <input type="date" id="filtroFechaFin" class="form-control">
          </div>

          <div class="col-md-1 d-flex align-items-end">
            <button class="btn btn-dark w-100" onclick="cargarProductos()">Filtrar</button>
          </div>
        </div>
      </div>
    </div>

    <div class="tabla-scroll">
      <table class="table table-bordered table-hover align-middle mb-0" id="tablaProductos">
        <thead class="table-light">
          <tr>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Unidad</th>
            <th>Código</th>
            <th>Tipo de uso</th>
            <th>Stock</th>
            <th>Mínimo</th>
            <th>Estado</th>
            <th width="150">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="9" class="text-center text-muted">Cargando...</td></tr>
        </tbody>
      </table>
    </div>

    <div id="paginacionProductos" class="d-flex justify-content-between align-items-center mt-3"></div>

  </div>

  <div class="modal fade" id="modalProducto" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <form id="formProducto">
          <div class="modal-header">
            <h5 class="modal-title">Nuevo Producto</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">

            <input type="hidden" id="productoId">

            <div class="row g-3">

              <div class="col-md-6">
                <label class="form-label">Nombre</label>
                <input type="text" id="productoNombre" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Categoría</label>
                <select id="productoCategoria" class="form-select" required>
                  <option value="" disabled selected>Cargando categorías...</option>
                </select>
              </div>

              <div class="col-md-4">
                <label class="form-label">Unidad de medida</label>
                <select id="productoUnidad" class="form-select" required>
                  <option value="" disabled selected>Cargando unidades...</option>
                </select>
              </div>

              <div class="col-md-4">
                <label class="form-label">Código</label>
                <input type="text" id="productoCodigo" class="form-control" required>
              </div>

              <div class="col-md-4">
                <label class="form-label">Tipo de uso</label>
                <select id="productoTipoUso" class="form-select" required>
                  <option value="">Selecciona...</option>
                  <option value="venta">Venta</option>
                  <option value="interno">Interno</option>
                </select>
              </div>

              <div class="col-md-4">
                <label class="form-label">Stock mínimo</label>
                <input type="number" id="productoMin" class="form-control" value="0">
              </div>

              <div class="col-md-12">
                <label class="form-label">Descripción</label>
                <textarea id="productoDesc" class="form-control"></textarea>
              </div>

            </div>

          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button class="btn btn-primary" type="submit">Guardar</button>
          </div>

        </form>
      </div>
    </div>
  </div>

  <script src="../js/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "/login.html";

    const tablaBody = document.querySelector("#tablaProductos tbody");
    let paginaActual = 1;
    const limitePagina = 25;

    function getEmailFromToken(token) {
      try {
        const base64Url = token.split(".")[1];
        const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
        const payload = JSON.parse(atob(base64));
        return (payload.email || "").toLowerCase();
      } catch (e) {
        return "";
      }
    }

    function mostrarTipoUso(tipoUso) {
      if (tipoUso === "venta") return "Venta";
      if (tipoUso === "interno") return "Interno";
      return "Interno";
    }

    function cargarOpcionesCatalogo(selectId, valores, seleccionado = "") {
      const select = document.getElementById(selectId);
      select.innerHTML = `<option value="" disabled ${seleccionado ? "" : "selected"}>Selecciona...</option>`;

      valores.forEach((valor) => {
        const option = document.createElement("option");
        option.value = valor.nombre;
        option.textContent = valor.nombre;
        option.selected = valor.nombre === seleccionado;
        select.appendChild(option);
      });

      if (seleccionado && !valores.some((valor) => valor.nombre === seleccionado)) {
        const option = document.createElement("option");
        option.value = seleccionado;
        option.textContent = seleccionado + " (valor histórico)";
        option.selected = true;
        select.appendChild(option);
      }
    }

    async function cargarCatalogosProducto(categoriaSeleccionada = "", unidadSeleccionada = "") {
      const headers = { "Authorization": "Bearer " + token };
      const [categoriasRes, unidadesRes] = await Promise.all([
        fetch("/api/almacen/catalogos?tipo=categoria", { headers }),
        fetch("/api/almacen/catalogos?tipo=unidadMedida", { headers })
      ]);

      if (!categoriasRes.ok || !unidadesRes.ok) {
        alert("No se pudieron cargar los catálogos de producto.");
        return;
      }

      const [categorias, unidades] = await Promise.all([categoriasRes.json(), unidadesRes.json()]);
      cargarOpcionesCatalogo("productoCategoria", categorias.catalogos || [], categoriaSeleccionada);
      cargarOpcionesCatalogo("productoUnidad", unidades.catalogos || [], unidadSeleccionada);
    }

    function filaProducto(p) {
      const userEmail = getEmailFromToken(token);

      const correosPermitidos = [
        "jose.garcia@bateil.edu.mx",
        "rosario.gonzalez@bateil.edu.mx"
      ];

      const botonEliminar = correosPermitidos.includes(userEmail)
        ? `<button class="btn btn-sm btn-dark" onclick="eliminarDefinitivo('${p._id}')">Eliminar</button>`
        : "";

      return `
        <tr>
          <td>${p.nombre}</td>
          <td>${p.categoria}</td>
          <td>${p.unidadMedida}</td>
          <td>${p.codigo}</td>
          <td>${mostrarTipoUso(p.tipoUso)}</td>
          <td>${p.stockActual}</td>
          <td>${p.stockMinimo}</td>
          <td>${p.estado}</td>
          <td class="d-flex gap-1">
            <button class="btn btn-sm btn-warning" onclick="editarProducto('${p._id}')">Editar</button>
            <button class="btn btn-sm btn-danger" onclick="inactivarProducto('${p._id}')">Inactivar</button>
            <a class="btn btn-sm btn-info" href="/almacen/historial-producto.html?id=${p._id}">Historial</a>
            ${botonEliminar}
          </td>
        </tr>
      `;
    }

    function crearParametrosProductos(incluirPaginacion = true) {
      const nombre = document.getElementById("filtroNombre").value.trim();
      const q = document.getElementById("filtroBusqueda").value.trim();
      const categoria = document.getElementById("filtroCategoria").value.trim();
      const estado = document.getElementById("filtroEstado").value;
      const fechaInicio = document.getElementById("filtroFechaInicio").value;
      const fechaFin = document.getElementById("filtroFechaFin").value;

      if (fechaInicio && fechaFin && fechaInicio > fechaFin) {
        alert("La fecha inicial no puede ser mayor que la fecha final.");
        return null;
      }

      const params = new URLSearchParams();

      if (nombre) params.append("nombre", nombre);
      if (q) params.append("q", q);
      if (categoria) params.append("categoria", categoria);
      if (estado) params.append("estado", estado);
      if (fechaInicio) params.append("fechaInicio", fechaInicio);
      if (fechaFin) params.append("fechaFin", fechaFin);

      if (incluirPaginacion) {
        params.append("pagina", paginaActual);
        params.append("limite", limitePagina);
      }

      return params;
    }

    function renderizarPaginacionProductos(paginacion) {
      const contenedor = document.getElementById("paginacionProductos");
      if (!paginacion || !paginacion.total) {
        contenedor.innerHTML = "";
        return;
      }

      contenedor.innerHTML = `
        <span class="text-muted small">${paginacion.total} registros</span>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-secondary" type="button" onclick="cambiarPaginaProductos(-1)" ${paginacion.pagina <= 1 ? "disabled" : ""}>Anterior</button>
          <span class="small">Página ${paginacion.pagina} de ${paginacion.totalPaginas}</span>
          <button class="btn btn-sm btn-outline-secondary" type="button" onclick="cambiarPaginaProductos(1)" ${paginacion.pagina >= paginacion.totalPaginas ? "disabled" : ""}>Siguiente</button>
        </div>
      `;
    }

    function cambiarPaginaProductos(delta) {
      paginaActual += delta;
      cargarProductos();
    }

    async function cargarProductos(pagina = 1) {
      paginaActual = pagina;
      const params = crearParametrosProductos();
      if (!params) return;

      const res = await fetch("/api/almacen/productos?" + params.toString(), {
        headers: { "Authorization": "Bearer " + token }
      });

      const data = await res.json();

      tablaBody.innerHTML = "";

      if (!data.productos || !data.productos.length) {
        tablaBody.innerHTML = `<tr><td colspan="9" class="text-center text-muted">Sin datos.</td></tr>`;
        renderizarPaginacionProductos(data.paginacion);
        return;
      }

      data.productos.forEach(p => {
        tablaBody.innerHTML += filaProducto(p);
      });

      renderizarPaginacionProductos(data.paginacion);
    }

    async function exportarProductos() {
      const params = crearParametrosProductos(false);
      if (!params) return;

      const res = await fetch("/api/almacen/productos/exportar?" + params.toString(), {
        headers: { "Authorization": "Bearer " + token }
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        alert(data.mensaje || "No se pudo exportar el reporte.");
        return;
      }

      const enlace = document.createElement("a");
      enlace.href = URL.createObjectURL(await res.blob());
      enlace.download = "reporte-productos.xlsx";
      enlace.click();
      URL.revokeObjectURL(enlace.href);
    }

    function nuevoProducto() {
      document.getElementById("productoId").value = "";
      document.querySelector(".modal-title").textContent = "Nuevo Producto";
      document.getElementById("formProducto").reset();
      document.getElementById("productoTipoUso").value = "interno";
    }

    async function editarProducto(id) {
      nuevoProducto();

      const res = await fetch("/api/almacen/productos/" + id, {
        headers: { "Authorization": "Bearer " + token }
      });

      const data = await res.json();
      const p = data.producto;

      document.querySelector(".modal-title").textContent = "Editar Producto";
      document.getElementById("productoId").value = p._id;
      document.getElementById("productoNombre").value = p.nombre;
      await cargarCatalogosProducto(p.categoria, p.unidadMedida);
      document.getElementById("productoCategoria").value = p.categoria;
      document.getElementById("productoUnidad").value = p.unidadMedida;
      document.getElementById("productoCodigo").value = p.codigo;
      document.getElementById("productoTipoUso").value = p.tipoUso || "interno";
      document.getElementById("productoMin").value = p.stockMinimo;
      document.getElementById("productoDesc").value = p.descripcion || "";

      const modal = new bootstrap.Modal(document.getElementById("modalProducto"));
      modal.show();
    }

    document.getElementById("formProducto").addEventListener("submit", async (e) => {
      e.preventDefault();

      const id = document.getElementById("productoId").value;

      const payload = {
        nombre: document.getElementById("productoNombre").value,
        categoria: document.getElementById("productoCategoria").value,
        unidadMedida: document.getElementById("productoUnidad").value,
        codigo: document.getElementById("productoCodigo").value,
        tipoUso: document.getElementById("productoTipoUso").value,
        stockMinimo: Number(document.getElementById("productoMin").value),
        descripcion: document.getElementById("productoDesc").value
      };

      const url = id
        ? "/api/almacen/productos/" + id
        : "/api/almacen/productos";

      const method = id ? "PUT" : "POST";

      const res = await fetch(url, {
        method,
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json().catch(() => ({}));

      if (res.ok) {
        alert("Producto guardado.");
        cargarProductos();
        bootstrap.Modal.getInstance(document.getElementById("modalProducto")).hide();
      } else {
        alert(data.mensaje || "Error al guardar.");
      }
    });

    async function inactivarProducto(id) {
      if (!confirm("¿Marcar como inactivo?")) return;

      const res = await fetch("/api/almacen/productos/" + id, {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + token }
      });

      if (res.ok) {
        alert("Producto inactivado.");
        cargarProductos();
      } else {
        alert("Error al inactivar.");
      }
    }

    async function eliminarDefinitivo(id) {
      if (!confirm("⚠️ ¿Seguro que quieres eliminar DEFINITIVAMENTE este producto? Esta acción no se puede deshacer.")) return;

      const res = await fetch("/api/almacen/productos/eliminar-definitivo/" + id, {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + token }
      });

      const data = await res.json();

      if (res.ok) {
        alert(data.mensaje);
        cargarProductos();
      } else {
        alert(data.mensaje || "Error al eliminar.");
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      await cargarCatalogosProducto();
      cargarProductos();
    });
    document.getElementById("filtroNombre").addEventListener("input", () => cargarProductos(1));
    document.getElementById("filtroBusqueda").addEventListener("input", () => cargarProductos(1));
    document.getElementById("filtroCategoria").addEventListener("input", () => cargarProductos(1));
    document.getElementById("filtroEstado").addEventListener("change", () => cargarProductos(1));
  </script>

</body>
</html>
