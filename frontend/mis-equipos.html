<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mis Equipos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    .equipos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .equipo-card {
      border: 1px solid rgba(17, 24, 39, 0.12);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
    }

    .equipo-card-header {
      border-bottom: 4px solid #f8c400;
      background: #0b0b0d;
      color: #fff;
      border-radius: 8px 8px 0 0;
      padding: 1rem;
    }

    .equipo-dato {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: .55rem 0;
      border-bottom: 1px solid #eef0f3;
    }

    .equipo-dato:last-child {
      border-bottom: 0;
    }

    .equipo-dato strong {
      flex: 0 0 42%;
    }

    .equipo-dato span {
      text-align: right;
      overflow-wrap: anywhere;
    }

    .equipo-aceptacion {
      border-top: 1px solid #eef0f3;
      margin-top: .25rem;
      padding-top: 1rem;
    }
  </style>
</head>

<body class="bg-light">
  <div id="navbar-container"></div>

  <main class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
      <div>
        <h2 class="mb-1">Mis Equipos</h2>
        <p class="text-muted mb-0">Equipos registrados a tu nombre.</p>
      </div>
      <button class="btn btn-dark" type="button" onclick="cargarMisEquipos()">Actualizar</button>
    </div>

    <div id="estadoCarga" class="alert alert-secondary">Cargando equipos...</div>
    <section id="equiposContainer" class="equipos-grid"></section>
  </main>

  <script src="js/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "/login.html";

    const estadoLabels = {
      bueno: "Bueno",
      regular: "Regular",
      requiere_mantenimiento: "Requiere mantenimiento"
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function fmtFecha(value) {
      if (!value) return "-";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "-";
      const pad = n => String(n).padStart(2, "0");
      return `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()}`;
    }

    function renderEquipo(equipo, index) {
      const aceptado = Boolean(equipo.aceptadoPorColaborador);

      return `
        <article class="equipo-card" id="equipo-${escapeHtml(equipo._id)}">
          <div class="equipo-card-header">
            <div class="small text-warning fw-bold">Equipo ${index + 1}</div>
            <h5 class="mb-0">${escapeHtml(equipo.tipoEquipo)}</h5>
          </div>
          <div class="p-3">
            <div class="equipo-dato"><strong>Marca</strong><span>${escapeHtml(equipo.marca || "-")}</span></div>
            <div class="equipo-dato"><strong>Modelo</strong><span>${escapeHtml(equipo.modelo || "-")}</span></div>
            <div class="equipo-dato"><strong>Serie</strong><span>${escapeHtml(equipo.numeroSerie || "-")}</span></div>
            <div class="equipo-dato"><strong>Inventario</strong><span>${escapeHtml(equipo.numeroInventario || "-")}</span></div>
            <div class="equipo-dato"><strong>Estado</strong><span>${escapeHtml(estadoLabels[equipo.estadoEquipo] || equipo.estadoEquipo || "-")}</span></div>
            <div class="equipo-dato"><strong>Asignado</strong><span>${fmtFecha(equipo.fechaAsignacion)}</span></div>
            <div class="equipo-dato"><strong>Observaciones</strong><span>${escapeHtml(equipo.observaciones || "-")}</span></div>
            <div class="equipo-aceptacion">
              ${aceptado
                ? `<div class="alert alert-success py-2 mb-0">Aceptado el ${fmtFecha(equipo.fechaAceptacion)}</div>`
                : `<p class="small text-muted mb-2">Confirmo que estoy de acuerdo y acepto el equipo que Almacen me asigno.</p>
                   <button class="btn btn-warning w-100 fw-bold" type="button" onclick="aceptarEquipo('${escapeHtml(equipo._id)}', this)">Aceptar equipo asignado</button>`
              }
            </div>
          </div>
        </article>
      `;
    }

    async function aceptarEquipo(id, boton) {
      if (!confirm("Confirmas que estas de acuerdo y aceptas este equipo asignado?")) return;

      const textoOriginal = boton.textContent;
      boton.disabled = true;
      boton.textContent = "Aceptando...";

      try {
        const res = await fetch(`/api/almacen/mis-equipos/${encodeURIComponent(id)}/aceptar`, {
          method: "PATCH",
          headers: { Authorization: "Bearer " + token }
        });

        if (res.status === 401) {
          window.location.href = "/login.html";
          return;
        }

        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.mensaje || "No se pudo aceptar el equipo.");

        await cargarMisEquipos();
      } catch (err) {
        boton.disabled = false;
        boton.textContent = textoOriginal;
        alert(err.message);
      }
    }

    async function cargarMisEquipos() {
      const estado = document.getElementById("estadoCarga");
      const container = document.getElementById("equiposContainer");

      estado.className = "alert alert-secondary";
      estado.textContent = "Cargando equipos...";
      estado.style.display = "block";
      container.innerHTML = "";

      try {
        const res = await fetch("/api/almacen/mis-equipos", {
          headers: { Authorization: "Bearer " + token }
        });

        if (res.status === 401) {
          window.location.href = "/login.html";
          return;
        }

        const data = await res.json();
        if (!res.ok) throw new Error(data.mensaje || "No se pudieron cargar tus equipos.");

        const equipos = data.equipos || [];

        if (!equipos.length) {
          estado.className = "alert alert-info";
          estado.textContent = "No tienes equipos asignados actualmente.";
          return;
        }

        estado.style.display = "none";
        container.innerHTML = equipos.map(renderEquipo).join("");
      } catch (err) {
        estado.className = "alert alert-danger";
        estado.textContent = err.message;
      }
    }

    document.addEventListener("DOMContentLoaded", cargarMisEquipos);
  </script>
</body>
</html>
