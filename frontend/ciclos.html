<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ciclos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
  <div id="navbar-container"></div>
<body class="bg-light">
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="mb-0">Administración de ciclos</h2>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCycle">
        Nuevo ciclo
      </button>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-bordered align-middle" id="tablaCiclos">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Meses</th>
                <th>Activo</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalCycle" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <form id="formCycle">
          <div class="modal-header">
            <h5 class="modal-title">Nuevo ciclo</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Nombre del ciclo</label>
              <input type="text" class="form-control" id="cycleName" placeholder="Ej. 2026-1" required>
            </div>

            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" id="cycleActive">
              <label class="form-check-label" for="cycleActive">Marcar como activo</label>
            </div>

            <h6>Meses del ciclo</h6>
            <div id="monthsContainer"></div>

            <button type="button" class="btn btn-outline-secondary mt-3" id="btnAddMonth">
              Agregar mes
            </button>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-primary">Guardar ciclo</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/ciclos.js"></script>
</body>
</html>
