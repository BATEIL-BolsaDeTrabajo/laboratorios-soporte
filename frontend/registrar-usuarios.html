<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrar usuarios | BATEIL</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{
      --bateil-yellow:#f4c400;
      --bateil-black:#111111;
      --bateil-gray:#f8f9fa;
    }

    body{
      background: var(--bateil-gray);
    }

    .card-bateil{
      border: 0;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }

    .card-header-bateil{
      background: var(--bateil-black);
      color: #fff;
      border-top-left-radius: 18px !important;
      border-top-right-radius: 18px !important;
    }

    .btn-bateil{
      background: var(--bateil-yellow);
      border: none;
      color: #111;
      font-weight: 700;
    }

    .btn-bateil:hover{
      filter: brightness(.95);
      color: #111;
    }

    .required-star{
      color: #dc3545;
      font-weight: bold;
    }

    .form-text{
      font-size: .9rem;
    }
  </style>
</head>
<body>

  <div id="navbar-container"></div>

  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-9 col-xl-8">
        <div class="card card-bateil">
          <div class="card-header card-header-bateil">
            <h3 class="mb-0">Registrar usuario</h3>
          </div>

          <div class="card-body p-4">
            <div id="alerta"></div>

            <form id="formRegistrarUsuario" class="row g-3">
              <div class="col-md-6">
                <label for="nombre" class="form-label">
                  Nombre completo <span class="required-star">*</span>
                </label>
                <input type="text" class="form-control" id="nombre" required />
              </div>

              <div class="col-md-6">
                <label for="correo" class="form-label">
                  Correo institucional <span class="required-star">*</span>
                </label>
                <input type="email" class="form-control" id="correo" required />
              </div>

              <div class="col-md-6">
                <label for="contraseña" class="form-label">
                  Contraseña <span class="required-star">*</span>
                </label>
                <input type="password" class="form-control" id="contraseña" required />
              </div>

              <div class="col-md-6">
                <label for="rol" class="form-label">
                  Rol <span class="required-star">*</span>
                </label>
                <select id="rol" class="form-select" required>
                  <option value="">Seleccione un rol</option>
                  <option value="docente">Docente</option>
                  <option value="admin">Admin</option>
                  <option value="soporte">Soporte</option>
                  <option value="mantenimiento">Mantenimiento</option>
                  <option value="direccion">Dirección</option>
                  <option value="subdireccion">Subdirección</option>
                  <option value="rrhh">RRHH</option>
                  <option value="finanzas">Finanzas</option>
                  <option value="talleres">Talleres</option>
                  <option value="coordinacionD">Coordinación D</option>
                  <option value="almacen">Almacén</option>

                  <!-- nuevos -->
                  <option value="coordinador">Coordinador</option>
                  <option value="caja">Caja</option>
                </select>
                <div class="form-text">
                  Selecciona el rol principal con el que entrará al sistema.
                </div>
              </div>

              <div class="col-md-6">
                <label for="fechaIngreso" class="form-label">Fecha de ingreso</label>
                <input type="date" class="form-control" id="fechaIngreso" />
              </div>

              <div class="col-md-6">
                <label for="diasVacacionesDisponibles" class="form-label">Días de vacaciones disponibles</label>
                <input type="number" class="form-control" id="diasVacacionesDisponibles" min="0" value="0" />
              </div>

              <div class="col-md-6">
                <label for="puesto" class="form-label">Puesto</label>
                <input type="text" class="form-control" id="puesto" />
              </div>

              <div class="col-md-6">
                <label for="departamento" class="form-label">Departamento</label>
                <input type="text" class="form-control" id="departamento" />
              </div>

              <div class="col-12 d-flex gap-2 pt-2">
                <button type="submit" class="btn btn-bateil" id="btnGuardar">
                  Guardar usuario
                </button>
                <button type="reset" class="btn btn-outline-secondary">
                  Limpiar
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/navbar.js"></script>
  <script src="/js/registrar-usuarios.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
