<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Administración</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{
      --panel-bg:#f5f7fb;
      --card-shadow:0 10px 30px rgba(15,23,42,.08);
      --soft-border:1px solid rgba(15,23,42,.08);
    }

    body { background:var(--panel-bg) !important; }

    .filters-wrap,
    .toolbar-wrap,
    .summary-wrap,
    .ticket-card {
      background:#fff;
      border-radius:18px;
      box-shadow:var(--card-shadow);
      border:var(--soft-border);
    }

    .filters-wrap,
    .toolbar-wrap,
    .summary-wrap { padding:16px; }

    .sticky-filters{
      position:sticky;
      top:12px;
      z-index:10;
      backdrop-filter: blur(8px);
    }

    .kpi {
      border-radius:16px;
      padding:16px;
      text-align:center;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
      transition:transform .18s ease, box-shadow .18s ease, outline-color .18s ease;
      outline:3px solid transparent;
    }
    .kpi:hover { transform:translateY(-2px); }
    .kpi .label { font-weight:700; opacity:.92; font-size:.92rem; }
    .kpi .value { font-size:2rem; font-weight:800; line-height:1; }
    .kpi.active { outline-color:#111827; transform:translateY(-2px); }

    .kpi-total    { background:#1E73FF; color:#fff; }
    .kpi-abiertos { background:#FF9800; color:#fff; }
    .kpi-proceso  { background:#FFC107; color:#111; }
    .kpi-espera   { background:#9E9E9E !important; color:#fff !important; }
    .kpi-resueltos{ background:#03A9F4; color:#fff; }
    .kpi-cerrados { background:#4CAF50; color:#fff; }
    .kpi-excedido { background:#E53935; color:#fff; }

    .kpi-filter { cursor:pointer; }

    .bg-ticket-abierto  { background:linear-gradient(180deg,#fff8ee 0%,#ffffff 100%) !important; color:#111827 !important; }
    .bg-ticket-proceso  { background:linear-gradient(180deg,#fff8db 0%,#ffffff 100%) !important; color:#111827 !important; }
    .bg-ticket-espera   { background:linear-gradient(180deg,#f2f4f7 0%,#ffffff 100%) !important; color:#111827 !important; }
    .bg-ticket-resuelto { background:linear-gradient(180deg,#ebf8ff 0%,#ffffff 100%) !important; color:#111827 !important; }
    .bg-ticket-excedido { background:linear-gradient(180deg,#fff0ef 0%,#ffffff 100%) !important; color:#111827 !important; }
    .bg-ticket-cerrado  { background:linear-gradient(180deg,#eefbf0 0%,#ffffff 100%) !important; color:#111827 !important; }

    .ticket-card{
      overflow:hidden;
      height:100%;
      transition:transform .18s ease, box-shadow .18s ease;
    }
    .ticket-card:hover{
      transform:translateY(-3px);
      box-shadow:0 14px 28px rgba(15,23,42,.12);
    }

    .ticket-topbar{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:14px;
    }

    .ticket-title{
      font-size:1.15rem;
      font-weight:800;
      margin:0;
    }

    .ticket-folio{
      font-size:.95rem;
      font-weight:700;
      color:#334155;
    }

    .ticket-status-chip{
      border-radius:999px;
      padding:.45rem .7rem;
      font-size:.8rem;
      font-weight:800;
      display:inline-flex;
      align-items:center;
      gap:6px;
      white-space:nowrap;
    }

    .status-abierto { background:#fff1db; color:#9a5b00; }
    .status-en-proceso { background:#fff5cc; color:#8a6a00; }
    .status-en-espera-de-material { background:#eceff3; color:#475569; }
    .status-resuelto { background:#e0f2fe; color:#075985; }
    .status-cerrado { background:#dcfce7; color:#166534; }
    .status-tiempo-excedido { background:#fee2e2; color:#b91c1c; }

    .meta-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px 16px;
      margin-bottom:14px;
    }

    .meta-item{
      background:rgba(248,250,252,.9);
      border:1px solid rgba(148,163,184,.2);
      border-radius:12px;
      padding:10px 12px;
      min-height:56px;
    }
    .meta-item .meta-label{
      display:block;
      font-size:.78rem;
      text-transform:uppercase;
      letter-spacing:.04em;
      color:#64748b;
      margin-bottom:3px;
      font-weight:700;
    }
    .meta-item .meta-value{
      font-size:.95rem;
      font-weight:600;
      color:#0f172a;
      word-break:break-word;
    }

    .description-box{
      background:#f8fafc;
      border:1px solid rgba(148,163,184,.2);
      border-radius:12px;
      padding:12px;
      margin-bottom:14px;
    }

    .section-label{
      font-weight:800;
      font-size:.9rem;
      color:#334155;
      margin-bottom:6px;
    }

    .action-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:8px;
    }

    .toolbar-stats{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:space-between;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      background:#f8fafc;
      border:1px solid rgba(148,163,184,.25);
      border-radius:999px;
      padding:.45rem .75rem;
      font-weight:700;
      color:#334155;
    }

    .filters-active{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      min-height:32px;
    }

    .loading-box, .empty-box{
      background:#fff;
      border-radius:18px;
      border:2px dashed rgba(148,163,184,.35);
      padding:30px;
      text-align:center;
      color:#64748b;
    }

    .small-muted{
      color:#64748b;
      font-size:.88rem;
    }

    @media (max-width: 767.98px) {
      .meta-grid, .action-grid { grid-template-columns:1fr; }
      .ticket-topbar{ flex-direction:column; }
      .sticky-filters{ position:static; }
    }
  </style>
</head>
<body class="bg-light">
  <div id="navbar-container"></div>

  <div class="container py-4">
    <h2 class="text-center mb-4">Panel de Administración - Tickets</h2>

    <div class="filters-wrap sticky-filters mb-4">
      <div class="row g-3 align-items-end">
        <div class="col-md-3">
          <label class="form-label">Buscar ticket</label>
          <input id="busquedaTicket" type="text" class="form-control" placeholder="Folio, descripción, usuario, área...">
        </div>
        <div class="col-md-2">
          <label class="form-label">Filtrar por tipo</label>
          <select id="filtroTipo" class="form-select" onchange="cargarTickets()">
            <option value="">Todos</option>
            <option value="Sistemas">Sistemas</option>
            <option value="Mantenimiento">Mantenimiento</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Filtrar por estatus</label>
          <select id="filtroEstatus" class="form-select" onchange="cargarTickets()">
            <option value="">Todos</option>
            <option>Abierto</option>
            <option>En proceso</option>
            <option>En espera de material</option>
            <option>Resuelto</option>
            <option>Cerrado</option>
            <option>Tiempo excedido</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Filtrar por prioridad</label>
          <select id="filtroPrioridad" class="form-select" onchange="cargarTickets()">
            <option value="">Todas</option>
            <option>Alta</option>
            <option>Media</option>
            <option>Baja</option>
            <option>Sin prioridad</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Ordenar por</label>
          <select id="ordenTickets" class="form-select" onchange="cargarTickets()">
            <option value="recientes">Más recientes</option>
            <option value="antiguos">Más antiguos</option>
            <option value="prioridad">Prioridad</option>
            <option value="estatus">Estatus</option>
          </select>
        </div>
      </div>
    </div>

    <div class="row g-3 mb-4" id="kpis">
      <div class="col-6 col-md-2">
        <div class="kpi kpi-total kpi-filter" data-estado="">
          <div class="label">Total</div>
          <div id="kpi-total" class="value">0</div>
        </div>
      </div>

      <div class="col-6 col-md-2">
        <div class="kpi kpi-abiertos kpi-filter" data-estado="Abierto">
          <div class="label">Abiertos</div>
          <div id="kpi-abiertos" class="value">0</div>
        </div>
      </div>

      <div class="col-6 col-md-2">
        <div class="kpi kpi-proceso kpi-filter" data-estado="En proceso">
          <div class="label">En proceso</div>
          <div id="kpi-proceso" class="value">0</div>
        </div>
      </div>

      <div class="col-6 col-md-2">
        <div class="kpi kpi-espera kpi-filter" data-estado="En espera de material">
          <div class="label">En espera</div>
          <div id="kpi-espera" class="value">0</div>
        </div>
      </div>

      <div class="col-6 col-md-2">
        <div class="kpi kpi-resueltos kpi-filter" data-estado="Resuelto">
          <div class="label">Resueltos</div>
          <div id="kpi-resueltos" class="value">0</div>
        </div>
      </div>

      <div class="col-6 col-md-2">
        <div class="kpi kpi-cerrados kpi-filter" data-estado="Cerrado">
          <div class="label">Cerrados</div>
          <div id="kpi-cerrados" class="value">0</div>
        </div>
      </div>

      <div class="col-6 col-md-2">
        <div class="kpi kpi-excedido kpi-filter" data-estado="Tiempo excedido">
          <div class="label">Tiempo excedido</div>
          <div id="kpi-excedido" class="value">0</div>
        </div>
      </div>
    </div>

    <div class="toolbar-wrap mb-3">
      <div class="toolbar-stats">
        <div class="d-flex flex-wrap gap-2">
          <span class="chip">Mostrando <strong id="contador-filtrados">0</strong> tickets</span>
          <span class="chip">Total general <strong id="contador-total">0</strong></span>
        </div>
        <div class="d-flex flex-wrap gap-2">
          <button class="btn btn-outline-secondary btn-sm" type="button" onclick="limpiarFiltros()">Limpiar filtros</button>
          <button class="btn btn-outline-primary btn-sm" type="button" onclick="cargarTickets()">Actualizar</button>
        </div>
      </div>
      <div id="filtros-activos" class="filters-active mt-3"></div>
    </div>

    <div id="mensaje-estado" class="mb-3"></div>
    <div id="tickets" class="row g-3"></div>
  </div>


  <!-- Modal comentarios admin -->
  <div class="modal fade" id="modalComentarios" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="comentarios-titulo">Comentarios</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div class="table-responsive">
            <table class="table table-sm table-bordered">
              <thead class="table-light">
                <tr>
                  <th style="width:180px">Fecha</th>
                  <th style="width:220px">Usuario</th>
                  <th>Comentario</th>
                </tr>
              </thead>
              <tbody id="comentarios-tbody">
                <tr><td colspan="3" class="text-center text-muted">Sin comentarios.</td></tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal evidencias -->
  <div class="modal fade" id="modalEvidencias" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="evidencias-titulo">Evidencias</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div id="evidencias-body" class="row g-3"></div>
        </div>
        <div class="modal-footer">
          <a id="evidencias-carpeta"
             href="#"
             target="_blank"
             class="btn btn-outline-primary d-none">
            Abrir carpeta en Drive
          </a>
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "login.html";

    // ===== Colores por estatus =====
    const estatusColor = {
      "Abierto":               { border: "light", bg: "bg-ticket-abierto",  text: "" },
      "En proceso":            { border: "light", bg: "bg-ticket-proceso",  text: "" },
      "En espera de material": { border: "light", bg: "bg-ticket-espera",   text: "" },
      "Resuelto":              { border: "light", bg: "bg-ticket-resuelto", text: "" },
      "Cerrado":               { border: "light", bg: "bg-ticket-cerrado",  text: "" },
      "Tiempo excedido":       { border: "light", bg: "bg-ticket-excedido", text: "" }
    };

    // ===== Badge de prioridad =====
    const prioridadBadge = (p) => {
      if (!p || p === "Sin prioridad") {
        return `<span class="badge bg-secondary">Sin prioridad</span>`;
      }
      const map = { Alta: "danger", Media: "warning", Baja: "primary" };
      return `<span class="badge bg-${map[p] || "secondary"}">${p}</span>`;
    };

    const prioridadPeso = { Alta: 3, Media: 2, Baja: 1, "Sin prioridad": 0 };
    const estatusPeso = {
      "Tiempo excedido": 6,
      "Abierto": 5,
      "En proceso": 4,
      "En espera de material": 3,
      "Resuelto": 2,
      "Cerrado": 1
    };

    function statusClass(estatus = "") {
      return `status-${String(estatus).toLowerCase().replace(/[^a-z0-9]+/g, '-')}`;
    }

    function escapeHtml(texto = "") {
      return String(texto)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizarTexto(v) {
      return String(v || "")
        .normalize("NFD")
        .replace(/[̀-ͯ]/g, "")
        .toLowerCase();
    }

    function resumenActivo(label, valor) {
      return `<span class="chip">${label}: <strong>${escapeHtml(valor)}</strong></span>`;
    }

    // ===== Texto de ubicación =====
    function textoUbicacion(ticket) {
      const tipo = (ticket.tipo || "").toLowerCase();
      const subtipo = (ticket.subtipo || "").toLowerCase();

      if (tipo === "sistemas") {
        if (subtipo === "laboratorio") {
          const eq = ticket.equipo ? ` • Equipo: ${ticket.equipo}` : "";
          return `Laboratorio: ${ticket.laboratorio || "—"}${eq}`;
        }
        return `Ubicación: ${ticket.ubicacion || "—"}`;
      }

      if (tipo === "mantenimiento") {
        return `Salón/Área: ${ticket.salon || "—"}`;
      }

      return "";
    }

    // ===== Estado global =====
    let usuarios = [];
    let usuariosCargados = false;
    let todosTickets = [];

    // ✅ LOCK para evitar cargas simultáneas (bug de “desaparecen tickets”)
    let cargandoTickets = false;

    function mostrarMensaje(texto, tipo = "info") {
      const cont = document.getElementById("mensaje-estado");
      if (!cont) return;
      cont.innerHTML = `
        <div class="alert alert-${tipo} alert-dismissible fade show" role="alert">
          ${texto}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      `;
    }

    function renderLoading() {
      const contenedor = document.getElementById("tickets");
      if (!contenedor) return;
      contenedor.innerHTML = `
        <div class="col-12">
          <div class="loading-box">
            <div class="spinner-border mb-3" role="status" aria-hidden="true"></div>
            <div class="fw-semibold">Cargando tickets...</div>
          </div>
        </div>
      `;
    }

    function renderEmpty() {
      const contenedor = document.getElementById("tickets");
      if (!contenedor) return;
      contenedor.innerHTML = `
        <div class="col-12">
          <div class="empty-box">
            <div class="fs-5 fw-bold mb-2">No se encontraron tickets</div>
            <div>Ajusta los filtros o limpia la búsqueda para ver más resultados.</div>
          </div>
        </div>
      `;
    }

    function actualizarResumen(filtrados, totales) {
      const totalEl = document.getElementById("contador-total");
      const filtradosEl = document.getElementById("contador-filtrados");
      if (totalEl) totalEl.textContent = totales;
      if (filtradosEl) filtradosEl.textContent = filtrados;

      const chips = [];
      const busqueda = document.getElementById("busquedaTicket")?.value?.trim();
      const tipo = document.getElementById("filtroTipo")?.value;
      const estatus = document.getElementById("filtroEstatus")?.value;
      const prioridad = document.getElementById("filtroPrioridad")?.value;
      const orden = document.getElementById("ordenTickets")?.value;

      if (busqueda) chips.push(resumenActivo("Búsqueda", busqueda));
      if (tipo) chips.push(resumenActivo("Tipo", tipo));
      if (estatus) chips.push(resumenActivo("Estatus", estatus));
      if (prioridad) chips.push(resumenActivo("Prioridad", prioridad));
      if (orden && orden !== "recientes") {
        const etiquetas = {
          antiguos: "Más antiguos",
          prioridad: "Prioridad",
          estatus: "Estatus"
        };
        chips.push(resumenActivo("Orden", etiquetas[orden] || orden));
      }

      const host = document.getElementById("filtros-activos");
      if (host) {
        host.innerHTML = chips.length ? chips.join("") : `<span class="small-muted">Sin filtros activos.</span>`;
      }

      document.querySelectorAll(".kpi-filter").forEach((card) => {
        const estado = card.dataset.estado || "";
        card.classList.toggle("active", estado === (estatus || ""));
      });
    }

    function limpiarFiltros() {
      const ids = ["busquedaTicket", "filtroTipo", "filtroEstatus", "filtroPrioridad", "ordenTickets"];
      ids.forEach((id) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.value = id === "ordenTickets" ? "recientes" : "";
      });
      cargarTickets();
    }

    // ✅ Cargar usuarios UNA sola vez (cache)
    async function obtenerUsuarios() {
      if (usuariosCargados && Array.isArray(usuarios) && usuarios.length) return true;

      try {
        const res = await fetch("/api/users", {
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await res.json();
        if (!Array.isArray(data)) {
          mostrarMensaje("❌ No se pudieron cargar los usuarios.", "danger");
          return false;
        }
        usuarios = data;
        usuariosCargados = true;
        return true;
      } catch (e) {
        console.error(e);
        mostrarMensaje("❌ Error al conectar con el servidor de usuarios.", "danger");
        return false;
      }
    }

    function actualizarKPIs(lista) {
      const by = (st) => lista.filter((t) => t.estatus === st).length;
      document.getElementById("kpi-total").textContent = lista.length;
      document.getElementById("kpi-abiertos").textContent = by("Abierto");
      document.getElementById("kpi-proceso").textContent = by("En proceso");
      document.getElementById("kpi-espera").textContent = by("En espera de material");
      document.getElementById("kpi-resueltos").textContent = by("Resuelto");
      document.getElementById("kpi-cerrados").textContent = by("Cerrado");
      document.getElementById("kpi-excedido").textContent = by("Tiempo excedido");
    }

    // ✅ Cargar tickets con lock
    async function cargarTickets() {
      if (cargandoTickets) return;
      cargandoTickets = true;
      renderLoading();

      try {
        const usuariosOK = await obtenerUsuarios();
        if (!usuariosOK) {
          // Si falla usuarios, no bloqueamos toda la pantalla (pero sí evita acciones de asignación)
          // Aún así intentamos cargar tickets.
          console.warn("Usuarios no disponibles, continúo cargando tickets...");
        }

        const busquedaSel = (document.getElementById("busquedaTicket").value || "").trim();
        const tipoSel = document.getElementById("filtroTipo").value;
        const estatusSel = document.getElementById("filtroEstatus").value;
        const prioridadSel = document.getElementById("filtroPrioridad").value;
        const ordenSel = document.getElementById("ordenTickets").value || "recientes";

        let datos = [];
        try {
          const res = await fetch("/api/tickets", {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!res.ok) {
            mostrarMensaje("❌ No se pudieron cargar los tickets.", "danger");
            return;
          }
          datos = await res.json();
          if (!Array.isArray(datos)) datos = [];
        } catch (e) {
          console.error(e);
          mostrarMensaje("❌ Error al cargar tickets.", "danger");
          return;
        }

        todosTickets = datos;
        actualizarKPIs(todosTickets);

        let filtrados = [...todosTickets];
        if (tipoSel) filtrados = filtrados.filter((t) => t.tipo === tipoSel);
        if (estatusSel) filtrados = filtrados.filter((t) => t.estatus === estatusSel);
        if (prioridadSel) {
          filtrados = filtrados.filter((t) => (t.prioridad || "Sin prioridad") === prioridadSel);
        }
        if (busquedaSel) {
          const needle = normalizarTexto(busquedaSel);
          filtrados = filtrados.filter((t) => {
            const bag = [
              t.folio,
              t.descripcion,
              t.tipo,
              t.subtipo,
              t.salon,
              t.ubicacion,
              t.laboratorio,
              t.equipo,
              t.requiereMaterial,
              t.creadoPor?.nombre,
              t.asignadoA?.nombre,
              t.estatus,
              t.prioridad
            ].map(normalizarTexto).join(" | ");
            return bag.includes(needle);
          });
        }

        filtrados.sort((a, b) => {
          const da = new Date(a.fechaCreacion || a.createdAt || 0).getTime();
          const db = new Date(b.fechaCreacion || b.createdAt || 0).getTime();
          if (ordenSel === "antiguos") return da - db;
          if (ordenSel === "prioridad") return (prioridadPeso[b.prioridad || "Sin prioridad"] || 0) - (prioridadPeso[a.prioridad || "Sin prioridad"] || 0) || db - da;
          if (ordenSel === "estatus") return (estatusPeso[b.estatus] || 0) - (estatusPeso[a.estatus] || 0) || db - da;
          return db - da;
        });

        actualizarResumen(filtrados.length, todosTickets.length);

        const contenedor = document.getElementById("tickets");
        contenedor.innerHTML = "";

        if (!filtrados.length) {
          renderEmpty();
          return;
        }

        filtrados.forEach((ticket) => {
          const div = document.createElement("div");
          div.className = "col-md-6";

          const puedeAsignarOReasignar = ticket.estatus !== "Cerrado";
          const puedeCerrar = ticket.estatus !== "Cerrado";
          const puedePonerEnProceso = ticket.estatus !== "En proceso" && ticket.estatus !== "Cerrado";

          const candidatos = usuariosCargados
            ? usuarios.filter((u) =>
                (ticket.tipo === "Sistemas" && (u.roles || []).includes("soporte")) ||
                (ticket.tipo === "Mantenimiento" && (u.roles || []).includes("mantenimiento"))
              )
            : [];

          let asignarHTML = "";
          if (puedeAsignarOReasignar && candidatos.length) {
            const actualId = ticket.asignadoA?._id || ticket.asignadoA || "";
            const btnTxt = ticket.asignadoA ? "Reasignar" : "Asignar";
            asignarHTML = `
              <label class="form-label mt-2">Asignar/Reasignar a:</label>
              <div class="input-group">
                <select class="form-select" id="select-${ticket._id}">
                  ${candidatos.map((u) => `
                    <option value="${u._id}" ${String(u._id) === String(actualId) ? "selected" : ""}>
                      ${u.nombre}
                    </option>`).join("")}
                </select>
                <button type="button" class="btn btn-success" onclick="asignarTicket('${ticket._id}')">
                  ${btnTxt}
                </button>
              </div>
            `;
          }

          const estaAsignado = !!ticket.asignadoA;
          const selectorPrioridad = `
            <label class="form-label mt-2">Prioridad:</label>
            <div class="input-group">
              <select class="form-select" id="prio-${ticket._id}" ${!estaAsignado ? "disabled" : ""}>
                <option value="Sin prioridad" ${(ticket.prioridad ?? "Sin prioridad") === "Sin prioridad" ? "selected" : ""}>Sin prioridad</option>
                ${["Alta", "Media", "Baja"].map((p) => `
                  <option value="${p}" ${ticket.prioridad === p ? "selected" : ""}>${p}</option>`).join("")}
              </select>
              <button class="btn btn-outline-primary" type="button"
                      onclick="guardarPrioridad('${ticket._id}')" ${!estaAsignado ? "disabled" : ""}>
                Guardar
              </button>
              <span class="input-group-text" id="prio-badge-${ticket._id}">
                ${prioridadBadge(ticket.prioridad || "Sin prioridad")}
              </span>
            </div>
            ${!estaAsignado ? '<div class="form-text text-muted">Asigna el ticket para habilitar la prioridad.</div>' : ""}
          `;

          const comentariosHTML = `
            <label class="form-label mt-3">Comentarios (internos):</label>
            <textarea id="coment-${ticket._id}" class="form-control" rows="2"
                      placeholder="Agrega notas, avances o cualquier comentario">${ticket.resolucion || ""}</textarea>
          `;

          const btnGuardarComentarios = `
            <button class="btn btn-outline-secondary"
                    onclick="guardarComentarios('${ticket._id}')">
              Guardar comentarios
            </button>
          `;

          const btnVerComentarios = `
            <button class="btn btn-dark"
                    onclick="verComentarios('${ticket._id}', '${ticket.folio || ""}', '${ticket.tipo || ""}')">
              Comentarios
            </button>
          `;

          const btnEvidencias = `
            <button class="btn btn-info text-white"
                    onclick="verEvidencias('${ticket._id}')">
              Evidencias
            </button>
          `;

          const btnEnProceso = puedePonerEnProceso
            ? `<button class="btn btn-warning text-dark" onclick="ponerEnProceso('${ticket._id}')">
                 Poner en proceso
               </button>`
            : "";

          const btnExcedido =
            ticket.estatus !== "Cerrado"
              ? `<button class="btn btn-outline-danger"
                         onclick="marcarExcedido('${ticket._id}')"
                         ${ticket.estatus === "Tiempo excedido" ? "disabled" : ""}>
                   Marcar tiempo excedido
                 </button>`
              : "";

          const btnReabrir =
            ticket.estatus === "Cerrado" || ticket.estatus === "Tiempo excedido"
              ? `<button class="btn btn-outline-dark" onclick="reabrirTicket('${ticket._id}')">
                   Reabrir ticket
                 </button>`
              : "";

          let btnCerrar = "";
          if (puedeCerrar) {
            btnCerrar = `<button class="btn btn-danger" onclick="cerrarTicket('${ticket._id}')">
                          Cerrar ticket
                        </button>`;
          }

          const btnEliminar = `
            <button class="btn btn-outline-danger" onclick="eliminarTicket('${ticket._id}')">
              Eliminar ticket
            </button>
          `;

          const btnArchivar = `
            <button class="btn btn-outline-secondary" onclick="archivarTicket('${ticket._id}')">
              Archivar ticket
            </button>
          `;

          const btnRechazar = `
            <button class="btn btn-outline-warning" onclick="rechazarTicket('${ticket._id}')">
              Rechazar
            </button>
          `;

          const estilo = estatusColor[ticket.estatus] || { border: "light", bg: "bg-light", text: "text-dark" };
          const ubicacionTexto = textoUbicacion(ticket);

          div.innerHTML = `
            <div class="ticket-card ${estilo.bg}">
              <div class="card-body p-3 p-lg-4">
                <div class="ticket-topbar">
                  <div>
                    <div class="ticket-folio">${ticket.folio || "—"}</div>
                    <h5 class="ticket-title">${ticket.tipo}</h5>
                    <div class="small-muted">${ticket.subtipo || "Ticket administrativo"}</div>
                  </div>
                  <div class="d-flex flex-wrap gap-2 justify-content-end">
                    <span class="ticket-status-chip ${statusClass(ticket.estatus)}">${ticket.estatus}</span>
                    <span id="prio-header-${ticket._id}">${prioridadBadge(ticket.prioridad || "Sin prioridad")}</span>
                  </div>
                </div>

                <div class="meta-grid">
                  <div class="meta-item">
                    <span class="meta-label">Ubicación</span>
                    <div class="meta-value">${ubicacionTexto || "Sin ubicación especificada"}</div>
                  </div>
                  <div class="meta-item">
                    <span class="meta-label">Material requerido</span>
                    <div class="meta-value">${ticket.requiereMaterial || "Ninguno"}</div>
                  </div>
                  <div class="meta-item">
                    <span class="meta-label">Creado por</span>
                    <div class="meta-value">${ticket.creadoPor?.nombre || "N/A"}</div>
                  </div>
                  <div class="meta-item">
                    <span class="meta-label">Asignado a</span>
                    <div class="meta-value" id="asignado-${ticket._id}">${ticket.asignadoA?.nombre || "Sin asignar"}</div>
                  </div>
                  <div class="meta-item">
                    <span class="meta-label">Fecha</span>
                    <div class="meta-value">${fmtFecha(ticket.fechaCreacion || ticket.createdAt)}</div>
                  </div>
                  <div class="meta-item">
                    <span class="meta-label">Tipo</span>
                    <div class="meta-value">${ticket.tipo || "—"}</div>
                  </div>
                </div>

                <div class="description-box">
                  <div class="section-label">Descripción</div>
                  <div>${ticket.descripcion || "Sin descripción"}</div>
                </div>

                ${selectorPrioridad}
                ${asignarHTML}

                <div class="mt-3">
                  ${comentariosHTML}
                </div>

                <div class="action-grid mt-3">
                  ${btnGuardarComentarios}
                  ${btnEnProceso}
                  ${btnExcedido}
                  ${btnReabrir}
                  ${btnCerrar}
                  ${btnArchivar}
                  ${btnRechazar}
                  ${btnEliminar}
                  ${btnVerComentarios}
                  ${btnEvidencias}
                </div>
              </div>
            </div>
          `;
          contenedor.appendChild(div);
        });
      } finally {
        cargandoTickets = false;
      }
    }

    async function asignarTicket(id) {
      const select = document.getElementById(`select-${id}`);
      if (!select) return;

      const boton = select.parentElement.querySelector("button");
      if (boton) boton.disabled = true;

      const userId = select.value;
      const userName = select.options[select.selectedIndex].textContent;

      try {
        const res = await fetch(`/api/tickets/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
          body: JSON.stringify({ asignadoA: userId }),
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          mostrarMensaje(data.mensaje || "❌ No se pudo asignar el ticket", "danger");
          return;
        }

        mostrarMensaje(data.mensaje || `✅ Ticket asignado / reasignado a ${userName}`, "success");
        await cargarTickets();
      } catch (e) {
        console.error(e);
        mostrarMensaje("❌ Error al asignar el ticket", "danger");
      } finally {
        if (boton) boton.disabled = false;
      }
    }

    async function archivarTicket(id) {
      if (!confirm("¿Archivar este ticket? Ya no aparecerá en los listados activos.")) return;

      try {
        const res = await fetch(`/api/tickets/${id}/archivar`, {
          method: "PUT",
          headers: { Authorization: `Bearer ${token}` },
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          mostrarMensaje(data.mensaje || "❌ No se pudo archivar el ticket", "danger");
          return;
        }

        mostrarMensaje(data.mensaje || "📦 Ticket archivado ✅", "success");
        cargarTickets();
      } catch (e) {
        console.error(e);
        mostrarMensaje("❌ Error al archivar el ticket", "danger");
      }
    }

    async function rechazarTicket(id) {
      const txt = (document.getElementById(`coment-${id}`).value || "").trim();
      if (!txt) {
        mostrarMensaje("❗ Para rechazar debes escribir un comentario (motivo) en el campo de comentarios.", "warning");
        return;
      }

      if (!confirm("¿Rechazar este ticket? Se archivará y ya no aparecerá en listados activos.")) return;

      try {
        const res = await fetch(`/api/tickets/${id}/rechazar`, {
          method: "PUT",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
          body: JSON.stringify({ comentario: txt }),
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          mostrarMensaje(data.mensaje || "❌ No se pudo rechazar el ticket", "danger");
          return;
        }

        mostrarMensaje(data.mensaje || "🚫 Ticket rechazado y archivado ✅", "success");
        cargarTickets();
      } catch (e) {
        console.error(e);
        mostrarMensaje("❌ Error al rechazar el ticket", "danger");
      }
    }

    async function cerrarTicket(id) {
      const res = await fetch(`/api/tickets/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ estatus: "Cerrado" }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        mostrarMensaje(data.mensaje || "No se pudo cerrar el ticket", "danger");
        return;
      }
      mostrarMensaje(data.mensaje || "✅ Ticket cerrado", "success");
      cargarTickets();
    }

    async function reabrirTicket(id) {
      const res = await fetch(`/api/tickets/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ estatus: "Abierto" }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        mostrarMensaje(data.mensaje || "No se pudo reabrir el ticket", "danger");
        return;
      }
      mostrarMensaje("🔓 Ticket reabierto", "success");
      cargarTickets();
    }

    async function ponerEnProceso(id) {
      const res = await fetch(`/api/tickets/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ estatus: "En proceso" }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        mostrarMensaje(data.mensaje || "No se pudo poner en proceso", "danger");
        return;
      }
      mostrarMensaje("▶️ Ticket puesto en proceso", "success");
      cargarTickets();
    }

    async function marcarExcedido(id) {
      const res = await fetch(`/api/tickets/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ estatus: "Tiempo excedido" }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        mostrarMensaje(data.mensaje || "No se pudo marcar como excedido", "danger");
        return;
      }
      mostrarMensaje("⏰ Ticket marcado como tiempo excedido", "warning");
      cargarTickets();
    }

    async function eliminarTicket(id) {
      if (!confirm("¿Seguro que deseas eliminar este ticket? Esta acción no se puede deshacer.")) return;

      try {
        const res = await fetch(`/api/tickets/${id}`, {
          method: "DELETE",
          headers: { Authorization: `Bearer ${token}` },
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          mostrarMensaje(data.mensaje || data.error || "No se pudo eliminar el ticket", "danger");
          return;
        }

        mostrarMensaje(data.mensaje || "🗑️ Ticket eliminado", "success");
        cargarTickets();
      } catch (e) {
        console.error(e);
        mostrarMensaje("❌ Error al eliminar el ticket", "danger");
      }
    }

    async function guardarPrioridad(id) {
      const sel = document.getElementById(`prio-${id}`);
      const prio = sel.value || null;

      const res = await fetch(`/api/tickets/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ prioridad: prio }),
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        mostrarMensaje(data.mensaje || "❌ No se pudo actualizar la prioridad", "danger");
        return;
      }

      const badgeHost = document.getElementById(`prio-badge-${id}`);
      if (badgeHost) badgeHost.innerHTML = prioridadBadge(prio);

      const headerHost = document.getElementById(`prio-header-${id}`);
      if (headerHost) headerHost.innerHTML = prioridadBadge(prio);

      mostrarMensaje("✅ Prioridad actualizada", "success");
      await cargarTickets();
    }

    async function guardarComentarios(id) {
      const txt = (document.getElementById(`coment-${id}`).value || "").trim();
      if (!txt) {
        mostrarMensaje("Escribe un comentario", "warning");
        return;
      }

      const res = await fetch(`/api/tickets/${id}/comentarios-admin`, {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ texto: txt }),
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        mostrarMensaje(data.mensaje || "No se pudieron guardar los comentarios", "danger");
        return;
      }

      mostrarMensaje("📝 Comentario guardado", "success");
      await cargarTickets();
    }

    (function () {
      const selectEstatus = document.getElementById("filtroEstatus");
      const kpiCards = document.querySelectorAll(".kpi-filter");

      kpiCards.forEach((card) => {
        card.style.cursor = "pointer";
        card.addEventListener("click", () => {
          if (!selectEstatus) return;
          const estado = card.dataset.estado || "";
          selectEstatus.value = estado;
          cargarTickets();
        });
      });
    })();

    function fmtFecha(dt) {
      if (!dt) return "—";
      const d = new Date(dt);
      return d.toLocaleString("es-MX", {
        year: "2-digit",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    async function verComentarios(id, folio = "", tipo = "") {
      try {
        const res = await fetch(`/api/tickets/${id}/comentarios-admin`, {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (!res.ok) {
          mostrarMensaje("No se pudieron cargar los comentarios", "danger");
          return;
        }

        const rows = await res.json();

        const titulo = document.getElementById("comentarios-titulo");
        if (titulo) titulo.textContent = `Comentarios – ${folio || "Folio —"} (${tipo || "—"})`;

        const tb = document.getElementById("comentarios-tbody");
        if (!rows.length) {
          tb.innerHTML = `<tr><td colspan="3" class="text-center text-muted">Sin comentarios.</td></tr>`;
        } else {
          tb.innerHTML = rows.map((c) => `
            <tr>
              <td>${fmtFecha(c.fecha)}</td>
              <td>${c.usuarioNombre || "—"}</td>
              <td style="white-space:pre-wrap">${(c.texto || "").trim()}</td>
            </tr>`).join("");
        }

        const el = document.getElementById("modalComentarios");
        const modal = new bootstrap.Modal(el);
        modal.show();
      } catch (e) {
        console.error(e);
        mostrarMensaje("Error al cargar comentarios", "danger");
      }
    }

    function verEvidencias(id) {
      const ticket = todosTickets.find((t) => String(t._id) === String(id));
      if (!ticket) {
        mostrarMensaje("No se encontró el ticket para mostrar evidencias.", "danger");
        return;
      }

      const evidencias = Array.isArray(ticket.evidencias) ? ticket.evidencias : [];

      const titulo = document.getElementById("evidencias-titulo");
      if (titulo) titulo.textContent = `Evidencias – ${ticket.folio || "Folio —"} (${ticket.tipo || "—"})`;

      const btnCarpeta = document.getElementById("evidencias-carpeta");
      if (btnCarpeta) {
        if (ticket.driveFolderLink) {
          btnCarpeta.href = ticket.driveFolderLink;
          btnCarpeta.classList.remove("d-none");
        } else {
          btnCarpeta.classList.add("d-none");
          btnCarpeta.href = "#";
        }
      }

      const cont = document.getElementById("evidencias-body");

      if (!evidencias.length) {
        cont.innerHTML = `<div class="col-12 text-center text-muted">Sin evidencias para este ticket.</div>`;
      } else {
        cont.innerHTML = evidencias.map((ev) => {
          let imgSrc = '';

          if (ev.webContentLink) imgSrc = ev.webContentLink;
          else if (ev.fileId) imgSrc = `https://drive.google.com/uc?export=view&id=${ev.fileId}`;
          else if (ev.webViewLink) imgSrc = ev.webViewLink;

          const nombre = ev.fileName || "Evidencia";
          const fecha = ev.uploadedAt ? fmtFecha(ev.uploadedAt) : "";

          return `
            <div class="col-sm-6 col-md-4 col-lg-3">
              <div class="card h-100">
                ${imgSrc ? `<img src="${imgSrc}" class="card-img-top" alt="${nombre}">` : ""}
                <div class="card-body p-2">
                  <div class="small fw-semibold text-truncate" title="${nombre}">${nombre}</div>
                  <div class="small text-muted">${fecha}</div>
                </div>
                <div class="card-footer d-flex gap-1 p-2">
                  ${ev.webViewLink ? `<a href="${ev.webViewLink}" target="_blank" class="btn btn-sm btn-outline-primary flex-fill">Ver</a>` : ""}
                  ${ev.webContentLink ? `<a href="${ev.webContentLink}" target="_blank" class="btn btn-sm btn-outline-secondary flex-fill">Descargar</a>` : ""}
                </div>
              </div>
            </div>
          `;
        }).join("");
      }

      const el = document.getElementById("modalEvidencias");
      const modal = new bootstrap.Modal(el);
      modal.show();
    }

    (function configurarBusqueda() {
      const input = document.getElementById("busquedaTicket");
      if (!input) return;
      let t = null;
      input.addEventListener("input", () => {
        clearTimeout(t);
        t = setTimeout(() => cargarTickets(), 250);
      });
    })();

    cargarTickets();
  </script>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    (function () {
      try {
        const socket = io();

        socket.on('connect', () => {
          console.log('✅ Socket conectado en panel-admin');
        });

        socket.on('ticketsActualizados', (payload) => {
          console.log('🔄 ticketsActualizados (admin):', payload);
          if (typeof cargarTickets === 'function') cargarTickets();
        });
      } catch (e) {
        console.error('Error inicializando Socket.IO en panel-admin:', e);
      }
    })();
  </script>

  <script src="js/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
