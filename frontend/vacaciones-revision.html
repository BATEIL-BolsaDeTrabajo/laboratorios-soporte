<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Revisión de Vacaciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/toasts.css" rel="stylesheet">
</head>
<body class="bg-light">
<div id="navbar-container"></div>
  <div class="container mt-5">
    <h2 class="mb-4">🧾 Revisión de Solicitudes de Vacaciones</h2>
    <div id="mensaje"></div>

    <table class="table table-bordered table-hover" id="tablaRevision">
      <thead class="table-dark">
        <tr>
          <th>Nombre</th>
          <th>Departamento</th>
          <th>Fechas</th>
          <th>Días</th>
          <th>Motivo</th>
          <th>Revisar</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="js/toasts.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const tabla = document.querySelector('#tablaRevision tbody');
    const mensaje = document.getElementById('mensaje');

    function mostrarMensaje(texto, tipo = 'info') {
      mensaje.innerHTML = '';
      window.mostrarToast(texto, tipo);
    }

    async function cargarPendientes() {
      try {
        const res = await fetch('/api/vacaciones/pendientes', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const datos = await res.json();
        if (!res.ok) {
          mostrarMensaje(datos.mensaje || 'Error al obtener solicitudes', 'danger');
          return;
        }

        if (datos.length === 0) {
          tabla.innerHTML = `<tr><td colspan="6" class="text-center">No hay solicitudes pendientes.</td></tr>`;
          return;
        }

        datos.forEach(s => {
          const fila = document.createElement('tr');
          const nombre = s.solicitante?.nombre || '---';
          const departamento = s.solicitante?.departamento || '---';

          fila.innerHTML = `
            <td>${nombre}</td>
            <td>${departamento}</td>
            <td>${new Date(s.fechaInicio).toLocaleDateString()}<br>→ ${new Date(s.fechaFin).toLocaleDateString()}</td>
            <td>${s.diasSolicitados}</td>
            <td>${s.motivo || '-'}</td>
            <td>
              <select class="form-select form-select-sm" id="accion-${s._id}">
                <option value="">-- Acción --</option>
                <option value="Aceptado">✅ Aceptar</option>
                <option value="Rechazado">❌ Rechazar</option>
              </select>
              <input type="text" class="form-control form-control-sm mt-1" placeholder="Motivo (opcional)" id="motivo-${s._id}">
              <button class="btn btn-sm btn-primary mt-2" onclick="enviarRevision('${s._id}')">Guardar</button>
            </td>
          `;

          tabla.appendChild(fila);
        });
      } catch (err) {
        mostrarMensaje('Error de red', 'danger');
      }
    }

    async function enviarRevision(id) {
      const estatus = document.getElementById(`accion-${id}`).value;
      const motivo = document.getElementById(`motivo-${id}`).value;

      if (!estatus) {
        mostrarMensaje('Selecciona una acción', 'warning');
        return;
      }

      try {
        const res = await fetch(`/api/vacaciones/revisar/${id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ estatus, motivoRespuesta: motivo })
        });

        const data = await res.json();
        if (res.ok) {
          mostrarMensaje('Solicitud actualizada', 'success');
          setTimeout(() => location.reload(), 800);
        } else {
          mostrarMensaje(data.mensaje || 'Error al actualizar', 'danger');
        }
      } catch (err) {
        mostrarMensaje('Error de red', 'danger');
      }
    }

    cargarPendientes();
  </script>
  <script src="js/navbar.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
