<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrar Usuarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body{
      background:#f3f4f6;
    }

    .admin-users-container{
      max-width: 100%;
    }

    .users-table-shell{
      max-height: 980px;
      overflow-y: auto;
      overflow-x: hidden;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      background: #fff;
    }

    .users-table{
      table-layout: fixed;
      width: 100%;
      margin-bottom: 0;
    }

    .users-table thead th{
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .users-table td,
    .users-table th{
      min-width: 0 !important;
      overflow-wrap: anywhere;
    }

    .users-table th:nth-child(1),
    .users-table td:nth-child(1){ width: 12%; }

    .users-table th:nth-child(2),
    .users-table td:nth-child(2){ width: 18%; }

    .users-table th:nth-child(3),
    .users-table td:nth-child(3){ width: 43%; }

    .users-table th:nth-child(4),
    .users-table td:nth-child(4){ width: 14%; }

    .users-table th:nth-child(5),
    .users-table td:nth-child(5){ width: 13%; }

    .roles-wrapper{
      width: 100%;
      text-align: left;
    }

    .roles-title{
      font-size: 12px;
      font-weight: 700;
      color:#495057;
      margin-bottom:6px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .roles-dual{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:nowrap;
    }

    .roles-col{
      flex:1;
      min-width: 0;
    }

    .roles-selectbox{
      width:100%;
      min-height:118px;
      border-radius:8px;
      border:1px solid #ced4da;
      padding:5px;
      background:#fff;
    }

    .roles-actions{
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:center;
      justify-content:center;
    }

    .roles-actions .btn{
      min-width:42px;
      font-weight:bold;
    }

    .roles-extra{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .roles-extra .btn{
      white-space: nowrap;
    }

    .menu-permissions{
      margin-top:12px;
      padding-top:10px;
      border-top:1px solid #dee2e6;
    }

    .menu-role-section{
      border:1px solid #e1e5ea;
      border-radius:10px;
      overflow:hidden;
      margin-bottom:12px;
    }

    .menu-role-title{
      margin:0;
      padding:9px 14px;
      background:#f1f3f5;
      color:#343a40;
      font-size:14px;
      font-weight:700;
    }

    .menu-permissions-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:8px 14px;
      padding:12px 14px;
    }

    .menu-permissions-grid label{
      font-size:14px;
      line-height:1.25;
      cursor:pointer;
    }

    .table td,
    .table th{
      vertical-align: middle;
    }

    .pass-input{
      min-width:0;
      width:100%;
      font-size:14px;
      padding-left:8px;
      padding-right:8px;
    }

    .action-buttons{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:center;
    }

    @media (max-width: 992px){
      .container.admin-users-container{
        max-width: 100%;
      }
    }

    @media (max-width: 768px){
      .roles-dual{
        flex-wrap: wrap;
      }

      .roles-actions{
        flex-direction: row;
        width: 100%;
      }
    }
  </style>
</head>

<div id="navbar-container"></div>

<body>
  <div class="container-fluid admin-users-container py-4 px-3 px-xl-4">
    <h2 class="text-center mb-4">Administrar Usuarios</h2>
    <div id="usuarios"></div>
  </div>

  <div class="modal fade" id="modalContacto" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Datos de contacto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="contacto-user-id">
          <div class="mb-3">
            <label class="form-label" for="contacto-nombre">Usuario</label>
            <input type="text" class="form-control" id="contacto-nombre" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label" for="contacto-correo">Correo electronico</label>
            <input type="email" class="form-control" id="contacto-correo" placeholder="usuario@bateil.edu.mx">
          </div>
          <div class="mb-2">
            <label class="form-label" for="contacto-whatsapp">WhatsApp</label>
            <input type="tel" class="form-control" id="contacto-whatsapp" placeholder="521...">
            <div class="form-text">Usa lada de pais y numero, sin espacios. Ejemplo: 5217112345678.</div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btnGuardarContacto" onclick="guardarContacto()">
            Guardar contacto
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalPermisosMenu" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header bg-dark text-white">
          <div>
            <h5 class="modal-title">Opciones de menú permitidas</h5>
            <div class="small text-white-50" id="permisos-menu-usuario"></div>
          </div>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body" id="permisos-menu-contenido"></div>
        <div class="modal-footer">
          <span class="text-muted small me-auto">Los cambios se aplican al presionar Guardar en el usuario.</span>
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Listo</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("token");

    if (!token) {
      window.location.href = "login.html";
    }

    function logout() {
      localStorage.removeItem("token");
      window.location.href = "login.html";
    }

    const ROLES_DISPONIBLES = [
      { key: "docente", label: "Docente" },
      { key: "soporte", label: "Soporte" },
      { key: "mantenimiento", label: "Mantenimiento" },
      { key: "admin", label: "Admin" },
      { key: "rrhh", label: "RRHH" },
      { key: "direccion", label: "Dirección" },
      { key: "subdireccion", label: "Subdirección" },
      { key: "almacen", label: "Almacén" },
      { key: "finanzas", label: "Finanzas" },
      { key: "coordinacionD", label: "Coordinación D" },
      { key: "coordinador", label: "Coordinador" },
      { key: "caja", label: "Caja" }
    ];

    const rolesUsuarios = {};
    const permisosMenuUsuarios = {};
    const usuariosPorId = {};
    let modalContacto = null;
    let modalPermisosMenu = null;
    let usuarioPermisosMenuActual = null;

    function obtenerLabelRol(key) {
      const rol = ROLES_DISPONIBLES.find(r => r.key === key);
      return rol ? rol.label : key;
    }

    function crearOpcionesRoles(listaRoles) {
      return listaRoles.map(rol => `
        <option value="${rol.key}">${rol.label}</option>
      `).join("");
    }

    function crearOpcionesAsignadas(listaRolesKeys) {
      return listaRolesKeys.map(key => `
        <option value="${key}">${obtenerLabelRol(key)}</option>
      `).join("");
    }

    function obtenerRolesNoAsignados(rolesAsignados) {
      return ROLES_DISPONIBLES.filter(rol => !rolesAsignados.includes(rol.key));
    }

    const OPCIONES_MENU = [
      ['docente', 'docente-crear', 'Crear Ticket'], ['docente', 'docente-mistickets', 'Mis Tickets'], ['docente', 'docente-reservar', 'Reservar Laboratorio'], ['docente', 'docente-mis', 'Mis Reservas'], ['docente', 'docente-vacaciones', 'Solicitar Vacaciones'], ['docente', 'docente-historial', 'Historial de Vacaciones'],
      ['soporte', 'soporte-autoticket', 'Autoticket'], ['soporte', 'soporte-tickets', 'Tickets de Soporte'], ['soporte', 'soporte-labs', 'Tickets Laboratorio'],
      ['mantenimiento', 'mantenimiento-autoticket', 'Autoticket'], ['mantenimiento', 'mantenimiento-tickets', 'Tickets de Mantenimiento'],
      ['admin', 'admin-dashboard', 'Dashboard'], ['admin', 'admin-usuarios', 'Usuarios'], ['admin', 'admin-tickets', 'Ver Tickets'], ['admin', 'admin-asignables', 'Tickets Asignables'], ['admin', 'admin-ciclos', 'Ciclos'], ['admin', 'admin-colegiatura', 'Colegiatura'], ['admin', 'admin-seguimientoAcademico', 'Seguimiento Academico'],
      ['rrhh', 'rrhh-solicitudes', 'Solicitudes Recibidas'], ['rrhh', 'rrhh-ticketsoporte', 'Crear Ticket'], ['rrhh', 'rrhh-mistickets', 'Mis Tickets'], ['rrhh', 'rrhh-gestiondias', 'Gestionar Fechas'], ['rrhh', 'rrhh-histDiasyTiempo', 'Historial Días y Tiempo'], ['rrhh', 'rrhh-RegistrarUsuario', 'Registrar usuario'],
      ['direccion', 'direccion-crear', 'Crear Ticket'], ['direccion', 'direccion-mistickets', 'Mis Tickets'], ['direccion', 'direccion-panelCalificaciones', 'Panel de Calificaciones'], ['direccion', 'direccion-subirCalificaciones', 'Subir Calificaciones'], ['direccion', 'direccion-seguimientoAcademico', 'Seguimiento Academico'], ['direccion', 'direccion-historial', 'Historial de Tickets'], ['direccion', 'direccion-ciclos', 'Ciclos'], ['direccion', 'direccion-colegiatura', 'Colegiatura'],
      ['subdireccion', 'subdireccion-crear', 'Crear Ticket'], ['subdireccion', 'subdireccion-mistickets', 'Mis Tickets'], ['subdireccion', 'subdireccion-revision', 'Revisar Vacaciones'], ['subdireccion', 'subdireccion-tiempo', 'Registrar Tiempo por Tiempo'], ['subdireccion', 'subdireccion-soltxt', 'Solicitudes TxT'], ['subdireccion', 'subdireccion-panelCalificaciones', 'Panel de Calificaciones'], ['subdireccion', 'subdireccion-subirCalificaciones', 'Subir Calificaciones'], ['subdireccion', 'subdireccion-seguimientoAcademico', 'Seguimiento Academico'], ['subdireccion', 'subdireccion-historial', 'Historial de Tickets'], ['subdireccion', 'subdireccion-ciclos', 'Ciclos'], ['subdireccion', 'subdireccion-colegiatura', 'Colegiatura'],
      ['finanzas', 'finanzas-dashboard', 'Dashboard'], ['finanzas', 'finanzas-crear', 'Crear Ticket'], ['finanzas', 'finanzas-archtickets', 'Tickets Archivados'], ['finanzas', 'finanzas-mistickets', 'Mis Tickets'], ['finanzas', 'finanzas-tickets', 'Ver Tickets'], ['finanzas', 'finanzas-historial', 'Historial de Tickets'], ['finanzas', 'finanzas-colegiatura', 'Colegiatura'], ['finanzas', 'finanzas-revision', 'Revisar Vacaciones'], ['finanzas', 'finanzas-tiempo', 'Registrar Tiempo por Tiempo'], ['finanzas', 'finanzas-revisiontiempo', 'Aprobar Tiempo por Tiempo'],
      ['almacen', 'almacen-dashboard', 'Dashboard Almacén'], ['almacen', 'almacen-productos', 'Catálogo Productos'], ['almacen', 'almacen-entradas', 'Entradas'], ['almacen', 'almacen-recibidos', 'Productos recibidos'], ['almacen', 'almacen-salidas', 'Salidas'], ['almacen', 'almacen-ajustes', 'Ajustes'], ['almacen', 'almacen-configuracion', 'Configuración'], ['almacen', 'almacen-asignacion-equipo', 'Asignación de Equipo'],
      ['coordinacionD', 'coordinacionD-crear', 'Crear Ticket'], ['coordinacionD', 'coordinacionD-mistickets', 'Mis Tickets'], ['coordinacionD', 'coordinacionD-reservas', 'Reservas de Laboratorios'],
      ['coordinador', 'coordinador-crear', 'Crear Ticket'], ['coordinador', 'coordinador-mistickets', 'Mis Tickets'], ['coordinador', 'coordinador-colegiatura', 'Colegiatura'], ['coordinador', 'coordinador-seguimientoAcademico', 'Seguimiento Academico'],
      ['caja', 'caja-crear', 'Crear Ticket'], ['caja', 'caja-mistickets', 'Mis Tickets'], ['caja', 'caja-colegiatura', 'Colegiatura']
    ];

    function opcionesMenuDisponibles(id) {
      const roles = rolesUsuarios[id] || [];
      return OPCIONES_MENU.filter(([rol]) => roles.includes(rol) || (rol === 'docente' && roles.includes('talleres')));
    }

    const TITULOS_MENU_POR_ROL = {
      docente: '🎓 Docente', soporte: '🖥️ Soporte', mantenimiento: '🔧 Mantenimiento',
      admin: '👨‍💼 Administración', rrhh: '🧑‍💼 Recursos Humanos', direccion: '🏫 Dirección',
      subdireccion: '📘 Subdirección', finanzas: '💰 Finanzas', almacen: '📦 Almacén',
      coordinacionD: '📘 Coordinación D', coordinador: '📘 Coordinación', caja: '🎟️ Caja'
    };

    async function cargarUsuarios() {
      try {
        const res = await fetch("/api/users", {
          headers: { Authorization: `Bearer ${token}` }
        });

        const usuarios = await res.json();
        const contenedor = document.getElementById("usuarios");

        let tabla = `
          <div class="users-table-shell">
          <table class="table table-bordered table-striped align-middle text-center users-table">
            <thead class="table-dark">
              <tr>
                <th class="col-name">Nombre</th>
                <th class="col-email">Correo</th>
                <th class="col-roles">Roles y menú</th>
                <th style="min-width:200px;">Nueva Contraseña</th>
                <th style="min-width:120px;">Acción</th>
              </tr>
            </thead>
            <tbody>
        `;

        usuarios.forEach(usuario => {
          rolesUsuarios[usuario._id] = [...(usuario.roles || [])];
          permisosMenuUsuarios[usuario._id] = Array.isArray(usuario.menuPermissions)
            ? [...usuario.menuPermissions]
            : null;
          usuariosPorId[usuario._id] = usuario;

          tabla += `
            <tr>
              <td>${usuario.nombre || ""}</td>
              <td id="correo-${usuario._id}">${usuario.correo || ""}</td>
              <td>${crearRolesUI(usuario._id)}</td>
              <td>
                <input
                  type="password"
                  class="form-control pass-input"
                  id="pass-${usuario._id}"
                  placeholder="Nueva contraseña"
                >
              </td>
              <td>
                <div class="action-buttons">
                  <button class="btn btn-outline-secondary btn-sm" onclick="abrirContacto('${usuario._id}')">
                    Contacto
                  </button>
                  <button class="btn btn-primary btn-sm" onclick="guardarCambios('${usuario._id}')">
                    Guardar
                  </button>
                </div>
              </td>
            </tr>
          `;
        });

        tabla += `
            </tbody>
          </table>
          </div>
        `;

        contenedor.innerHTML = tabla;

        usuarios.forEach(usuario => {
          renderDualList(usuario._id);
        });

        ajustarAltoTablaUsuarios();

      } catch (error) {
        console.error(error);
        alert("Error al cargar usuarios");
      }
    }

    function ajustarAltoTablaUsuarios() {
      const shell = document.querySelector(".users-table-shell");
      const header = document.querySelector(".users-table thead");
      const filas = Array.from(document.querySelectorAll(".users-table tbody tr"));

      if (!shell || !header || filas.length <= 5) return;

      const altoHeader = header.getBoundingClientRect().height;
      const altoFilas = filas
        .slice(0, 5)
        .reduce((total, fila) => total + fila.getBoundingClientRect().height, 0);

      shell.style.maxHeight = `${Math.ceil(altoHeader + altoFilas + 2)}px`;
    }

    function crearRolesUI(id) {
      return `
        <div class="roles-wrapper">
          <div class="roles-dual">
            <div class="roles-col">
              <div class="roles-title">Disponibles</div>
              <select multiple class="form-select roles-selectbox" id="roles-disponibles-${id}">
              </select>
            </div>

            <div class="roles-actions">
              <button type="button" class="btn btn-success btn-sm" onclick="agregarRoles('${id}')">&gt;</button>
              <button type="button" class="btn btn-danger btn-sm" onclick="quitarRoles('${id}')">&lt;</button>
            </div>

            <div class="roles-col">
              <div class="roles-title">Asignados</div>
              <select multiple class="form-select roles-selectbox" id="roles-asignados-${id}">
              </select>
            </div>
          </div>

          <div class="roles-extra">
            <button type="button" class="btn btn-secondary btn-sm" onclick="agregarTodos('${id}')">
              Agregar todos
            </button>
            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="quitarTodos('${id}')">
              Quitar todos
            </button>
          </div>

          <div class="menu-permissions">
            <div class="menu-permissions-title">Opciones de menú permitidas</div>
            <div id="menu-permissions-${id}"></div>
          </div>
        </div>
      `;
    }

    function renderDualList(id) {
      const asignados = rolesUsuarios[id] || [];
      const disponibles = obtenerRolesNoAsignados(asignados);

      const selectDisponibles = document.getElementById(`roles-disponibles-${id}`);
      const selectAsignados = document.getElementById(`roles-asignados-${id}`);

      if (!selectDisponibles || !selectAsignados) return;

      selectDisponibles.innerHTML = crearOpcionesRoles(disponibles);
      selectAsignados.innerHTML = crearOpcionesAsignadas(asignados);
      renderPermisosMenu(id);
    }

    function renderPermisosMenu(id) {
      const contenedor = document.getElementById(`menu-permissions-${id}`);
      if (!contenedor) return;

      const opciones = opcionesMenuDisponibles(id);
      const permisos = permisosMenuUsuarios[id];
      if (!opciones.length) {
        contenedor.innerHTML = '<span class="text-muted small">Asigna un rol para elegir sus opciones.</span>';
        return;
      }

      const permitidas = permisos === null ? opciones.length : permisos.filter(key => opciones.some(([, opcion]) => opcion === key)).length;
      contenedor.innerHTML = `
        <button type="button" class="btn btn-outline-primary btn-sm w-100" onclick="abrirPermisosMenu('${id}')">
          ⚙️ Configurar opciones de menú <span class="badge text-bg-primary ms-1">${permitidas}/${opciones.length}</span>
        </button>`;
    }

    function abrirPermisosMenu(id) {
      usuarioPermisosMenuActual = id;
      const usuario = usuariosPorId[id] || {};
      const contenedor = document.getElementById('permisos-menu-contenido');
      const subtitulo = document.getElementById('permisos-menu-usuario');
      const opciones = opcionesMenuDisponibles(id);
      const permisos = permisosMenuUsuarios[id];

      subtitulo.textContent = usuario.nombre || '';
      const porRol = opciones.reduce((grupos, opcion) => {
        (grupos[opcion[0]] ||= []).push(opcion);
        return grupos;
      }, {});

      contenedor.innerHTML = Object.entries(porRol).map(([rol, items]) => `
        <section class="menu-role-section">
          <h6 class="menu-role-title">${TITULOS_MENU_POR_ROL[rol] || rol}</h6>
          <div class="menu-permissions-grid">
            ${items.map(([, key, label]) => {
              const checked = permisos === null || permisos.includes(key);
              return `<label><input type="checkbox" class="form-check-input me-1" value="${key}" ${checked ? 'checked' : ''} onchange="cambiarPermisoMenu()">${label}</label>`;
            }).join('')}
          </div>
        </section>`).join('');

      modalPermisosMenu ||= new bootstrap.Modal(document.getElementById('modalPermisosMenu'));
      modalPermisosMenu.show();
    }

    function cambiarPermisoMenu() {
      const id = usuarioPermisosMenuActual;
      if (!id) return;
      const disponibles = opcionesMenuDisponibles(id).map(([, key]) => key);
      permisosMenuUsuarios[id] = Array.from(document.querySelectorAll('#permisos-menu-contenido input:checked'))
        .map(input => input.value)
        .filter(key => disponibles.includes(key));
      renderPermisosMenu(id);
    }

    function normalizarPermisosMenu(id, agregarNuevas = false) {
      if (permisosMenuUsuarios[id] === null) return;
      const disponibles = opcionesMenuDisponibles(id).map(([, key]) => key);
      const actuales = permisosMenuUsuarios[id] || [];
      permisosMenuUsuarios[id] = agregarNuevas
        ? disponibles
        : actuales.filter(key => disponibles.includes(key));
    }

    function obtenerSeleccionados(select) {
      return Array.from(select.selectedOptions).map(option => option.value);
    }

    function agregarRoles(id) {
      const selectDisponibles = document.getElementById(`roles-disponibles-${id}`);
      const seleccionados = obtenerSeleccionados(selectDisponibles);
      const opcionesAntes = new Set(opcionesMenuDisponibles(id).map(([, key]) => key));

      if (seleccionados.length === 0) {
        alert("Selecciona uno o más roles disponibles");
        return;
      }

      if (!rolesUsuarios[id]) {
        rolesUsuarios[id] = [];
      }

      seleccionados.forEach(rol => {
        if (!rolesUsuarios[id].includes(rol)) {
          rolesUsuarios[id].push(rol);
        }
      });

      if (Array.isArray(permisosMenuUsuarios[id])) {
        const disponibles = opcionesMenuDisponibles(id).map(([, key]) => key);
        permisosMenuUsuarios[id] = [
          ...permisosMenuUsuarios[id].filter(key => disponibles.includes(key)),
          ...disponibles.filter(key => !opcionesAntes.has(key))
        ];
      }
      renderDualList(id);
    }

    function quitarRoles(id) {
      const selectAsignados = document.getElementById(`roles-asignados-${id}`);
      const seleccionados = obtenerSeleccionados(selectAsignados);

      if (seleccionados.length === 0) {
        alert("Selecciona uno o más roles asignados");
        return;
      }

      rolesUsuarios[id] = (rolesUsuarios[id] || []).filter(rol => !seleccionados.includes(rol));
      normalizarPermisosMenu(id);
      renderDualList(id);
    }

    function agregarTodos(id) {
      rolesUsuarios[id] = ROLES_DISPONIBLES.map(rol => rol.key);
      normalizarPermisosMenu(id, true);
      renderDualList(id);
    }

    function quitarTodos(id) {
      rolesUsuarios[id] = [];
      normalizarPermisosMenu(id);
      renderDualList(id);
    }

    async function guardarCambios(id) {
      try {
        const roles = rolesUsuarios[id] || [];
        const nuevaContraseña = document.getElementById(`pass-${id}`).value.trim();

        const body = { roles };
        if (Array.isArray(permisosMenuUsuarios[id])) {
          body.menuPermissions = permisosMenuUsuarios[id];
        }

        if (nuevaContraseña !== "") {
          body.nuevaContraseña = nuevaContraseña;
        }

        const res = await fetch(`/api/users/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.mensaje || "Error al actualizar usuario");
          return;
        }

        alert(data.mensaje || "Usuario actualizado correctamente");
        document.getElementById(`pass-${id}`).value = "";

      } catch (error) {
        console.error(error);
        alert("Error al guardar cambios");
      }
    }

    function abrirContacto(id) {
      const usuario = usuariosPorId[id];
      if (!usuario) return;

      document.getElementById("contacto-user-id").value = id;
      document.getElementById("contacto-nombre").value = usuario.nombre || "";
      document.getElementById("contacto-correo").value = usuario.correo || "";
      document.getElementById("contacto-whatsapp").value = usuario.telefonoWhatsapp || "";

      modalContacto ||= new bootstrap.Modal(document.getElementById("modalContacto"));
      modalContacto.show();
    }

    async function guardarContacto() {
      const id = document.getElementById("contacto-user-id").value;
      const correo = document.getElementById("contacto-correo").value.trim();
      const telefonoWhatsapp = document.getElementById("contacto-whatsapp").value.trim();
      const btn = document.getElementById("btnGuardarContacto");

      if (!id) return;

      try {
        btn.disabled = true;
        btn.textContent = "Guardando...";

        const res = await fetch(`/api/users/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ correo, telefonoWhatsapp })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.mensaje || "Error al actualizar contacto");
          return;
        }

        usuariosPorId[id].correo = correo.toLowerCase();
        usuariosPorId[id].telefonoWhatsapp = telefonoWhatsapp.replace(/[^\d]/g, "");
        document.getElementById(`correo-${id}`).textContent = usuariosPorId[id].correo;
        modalContacto?.hide();
        alert(data.mensaje || "Contacto actualizado correctamente");
      } catch (error) {
        console.error(error);
        alert("Error al guardar contacto");
      } finally {
        btn.disabled = false;
        btn.textContent = "Guardar contacto";
      }
    }

    cargarUsuarios();
  </script>

</body>
